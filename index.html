<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>YOHAN OS / Pixel Calendar Embed</title>

  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#111;
      --muted:#9aa0a6;
      --line:#e8e8e8;
      --soft:#f7f7f7;
      --pink:#f09ab1;
      --pink2:#ffe2ea;
      --shadow:rgba(0,0,0,.06);

      --border:#1d1d1d;
      --radius:28px;

      /* ✅ base size (이 크기를 기준으로 자동 스케일) */
      --baseW:1060;
      --baseH:720;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:transparent; /* ✅ 노션 임베드 배경 */
      font-family:'Silkscreen', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--ink);
      overflow:hidden;
    }

    /* ✅ stage: iframe 안에서 꽉차게 + scale 대상 */
    .stage{
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      background:transparent;
    }

    /* ✅ scale wrapper */
    .scaleWrap{
      transform-origin: top left;
      will-change: transform;
    }

    .card{
      width: calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      background:#fff;
      border:3px solid var(--border);
      border-radius:var(--radius);
      box-shadow:8px 10px 0 var(--shadow);
      padding:16px 16px 12px;
      position:relative;
      overflow:hidden;
    }

    /* top */
    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:260px;
    }
    .dots{
      display:flex;
      gap:7px;
      margin-top:2px;
    }
    .dot{
      width:18px; height:18px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
    }

    .title{ line-height:1.1; }
    .title .mini{
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }
    .title .big{
      font-size:26px;
      letter-spacing:2px;
      margin-top:2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .btn{
      border:3px solid var(--border);
      background:#fff;
      border-radius:18px;
      padding:10px 16px;
      font-size:14px;
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
    }
    .btn:active{ transform:translateY(1px); box-shadow:2px 3px 0 var(--shadow); }
    .btn.icon{ width:54px; padding:10px 0; display:flex; justify-content:center; }

    .divider{
      width:100%;
      border-top:3px dashed var(--line);
      margin:10px 0 12px;
    }

    .main{
      display:grid;
      grid-template-columns: 1fr 340px;
      gap:14px;
      align-items:start;
      height: calc(100% - 110px);
    }

    /* left */
    .leftcol{
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-right:2px;
    }

    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .picked{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 14px;
      display:flex;
      gap:10px;
      align-items:center;
      width:fit-content;
      background:#fff;
    }
    .picked .k{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }
    .picked .v{
      font-size:14px;
      letter-spacing:1px;
    }

    .mode{
      border:3px solid var(--border);
      border-radius:20px;
      padding:10px 16px;
      background:var(--pink2);
      box-shadow:3px 4px 0 var(--shadow);
      font-size:14px;
      letter-spacing:1px;
    }

    .calendar{
      flex:1;
      overflow:hidden;
      padding:4px 6px 6px;
      display:flex;
      flex-direction:column;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
      padding:6px 10px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:2px;
      text-align:center;
    }

      .grid{
        flex:1;
        display:grid;
        grid-template-columns:repeat(7, 1fr);
        grid-auto-rows: 1fr;       /* ✅ 행도 자동으로 균등 분배 */
        gap:12px;
        padding:0 10px 6px;
      }  

    .cell{
      position:relative;
      border:3px solid var(--line);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      cursor:pointer;
      background:#fff;
      transition:transform .06s ease;
      user-select:none;
    }
    .cell:hover{ transform:translateY(-1px); }
    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color:var(--border);
      background:var(--pink2);
    }
    .cell.selected{
      border-color:var(--border);
      background:var(--pink);
      color:#fff;
    }
    .cell.sun{ color:#b84a5a; }
    .cell.sat{ color:#3b66d6; }

    /* ✅ 날짜 점 표시 */
    .cell.hasDot::after{
      content:"";
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--border);
      bottom:7px;
      left:50%;
      transform:translateX(-50%);
      opacity:.55;
    }
    .cell.selected.hasDot::after{
      background:#fff;
      opacity:.9;
    }

    /* right side */
    .side{
      border:3px solid var(--line);
      border-radius:24px;
      padding:14px;
      background:#fff;
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .side-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .side-head .h{
      font-size:16px;
      letter-spacing:2px;
    }
    .weekchip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:8px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
      background:#fff;
    }

    .routine{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .rbox{
      border:3px solid var(--line);
      border-radius:20px;
      padding:14px;
      display:flex;
      gap:12px;
      align-items:center;
      background:#fff;
    }

    .chk{
      width:24px; height:24px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
    }
    .chk.on{
      background:var(--pink2);
      position:relative;
    }
    .chk.on::after{
      content:"✔";
      font-size:14px;
      line-height:1;
    }

    .rtext .rt{
      font-size:14px;
      letter-spacing:2px;
    }
    .rtext .rd{
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      letter-spacing:1px;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .side-actions{
      display:flex;
      gap:12px;
    }
    .side-actions .btn{
      flex:1;
      padding:12px 10px;
    }

    /* ✅ 오늘의 루틴(선택 날짜 기준) */
    .todayPanel{
      border:3px solid var(--border);
      border-radius:22px;
      padding:12px;
      background:#fff;
      overflow:hidden;
      flex:1; /* ✅ 밑 공간 꽉 채워서 짤림 방지 */
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }
    .todayPanelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .todayPanelHead .t{
      font-size:14px;
      letter-spacing:2px;
    }
    .todayChip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:6px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
      background:#fff;
      max-width:130px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .todayList{
      overflow:auto; /* ✅ 여기만 스크롤 */
      display:flex;
      flex-direction:column;
      gap:10px;
      padding-right:2px;
      min-height:0;
    }

    /* foot */
    .foot{
      position:absolute;
      left:16px;
      right:16px;
      bottom:8px;
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:2px;
      pointer-events:none;
    }
    .foot .left{ flex:1; }
    .foot .right{ text-align:right; }

    /* ======================
       ✅ TASK MODAL (CENTER)
       ====================== */
    .dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.18);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease;
    }
    .dim.on{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -44%) scale(.98);
      width: min(760px, calc(100% - 36px));
      max-height: min(520px, calc(100% - 140px));
      background:#fff;
      border:3px solid var(--border);
      border-radius:24px;
      box-shadow:8px 10px 0 var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease, transform .14s ease;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .modal.open{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%, -50%) scale(1);
    }

    .modalHead{
      padding:12px 14px;
      border-bottom:3px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .modalHead .t{
      font-size:14px;
      letter-spacing:2px;
    }

    .modalBody{
      padding:12px 14px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .taskRow{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
    }

    .taskRow input{
      flex:1;
      border:none;
      outline:none;
      font-size:13px;
      letter-spacing:1px;
      background:transparent;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-width:0;
    }

    .taskDel{
      border:3px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:6px 10px;
      cursor:pointer;
      box-shadow:2px 3px 0 var(--shadow);
      font-size:12px;
      user-select:none;
    }
    .taskDel:active{ transform:translateY(1px); box-shadow:1px 2px 0 var(--shadow); }

    .modalActions{
      display:flex;
      gap:10px;
      padding:12px 14px;
      border-top:3px solid var(--line);
    }
    .modalActions .btn{
      flex:1;
      padding:12px 10px;
    }

    /* ✅ 모바일: 스케일 대신 그냥 세로 스크롤 */
    @media (max-width: 900px){
      html, body{ overflow:auto; }
      .stage{ height:auto; }
      .scaleWrap{ transform:none !important; }
      .card{
        width:100%;
        height:auto;
        min-height:720px;
      }
      .main{ grid-template-columns:1fr; height:auto; }
      .side{ height:auto; }
      .foot{ position:relative; left:auto; right:auto; bottom:auto; margin-top:10px; }
      .modal{
        position:fixed;
        left:50%;
        top:50%;
      }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="scaleWrap" id="scaleWrap">
      <div class="card" id="card">

        <!-- top -->
        <div class="topline">
          <div class="brand">
            <div class="dots">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="title">
              <div class="mini">YOHAN OS / DASHBOARD</div>
              <div class="big" id="monthLabel">----</div>
            </div>
          </div>

          <div class="controls">
            <button class="btn icon" id="prevBtn">◀</button>
            <button class="btn" id="todayBtn">TODAY</button>
            <button class="btn icon" id="nextBtn">▶</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="main">
          <!-- left -->
          <div class="leftcol">
            <div class="badge-row">
              <div class="picked">
                <div class="k">PICKED:</div>
                <div class="v" id="pickedLabel">NONE</div>
              </div>
              <div class="mode">MODE: YOHAN OS</div>
            </div>

            <div class="calendar">
              <div class="dow">
                <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
              </div>
              <div class="grid" id="grid"></div>
            </div>
          </div>

          <!-- right -->
          <div class="side">
            <div class="side-head">
              <div class="h">THIS WEEK ROUTINE</div>
              <div class="weekchip" id="weekChip">WEEK --</div>
            </div>

            <!-- weekly routine -->
            <div class="routine">
              <div class="rbox">
                <div class="chk" id="r_workout"></div>
                <div class="rtext">
                  <div class="rt">WORKOUT</div>
                  <div class="rd">운동 1회 이상</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" id="r_reading"></div>
                <div class="rtext">
                  <div class="rt">READING</div>
                  <div class="rd">독서 10P 이상</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" id="r_budget"></div>
                <div class="rtext">
                  <div class="rt">BUDGET</div>
                  <div class="rd">가계부 기록</div>
                </div>
              </div>
            </div>

            <div class="side-actions">
              <button class="btn" id="resetRoutineBtn">RESET</button>
              <button class="btn" id="allRoutineBtn">ALL</button>
            </div>

            <!-- ✅ today routine (선택 날짜 기준) -->
            <div class="todayPanel" id="todayPanel">
              <div class="todayPanelHead">
                <div class="t">TODAY ROUTINE</div>
                <div class="todayChip" id="todayChip">NO DATE</div>
              </div>

              <div class="todayList" id="todayList">
                <div class="rbox">
                  <div class="chk" data-daily="gratitude"></div>
                  <div class="rtext">
                    <div class="rt">GRATITUDE</div>
                    <div class="rd">감사 일기</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-daily="emotion"></div>
                  <div class="rtext">
                    <div class="rt">EMOTION</div>
                    <div class="rd">감정 일기</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-daily="sleep"></div>
                  <div class="rtext">
                    <div class="rt">SLEEP</div>
                    <div class="rd">하루 수면 분석</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-daily="morning"></div>
                  <div class="rtext">
                    <div class="rt">MORNING</div>
                    <div class="rd">아침 루티너리</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-daily="future"></div>
                  <div class="rtext">
                    <div class="rt">FUTURE</div>
                    <div class="rd">미래 모습 실천 기록</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- ✅ modal -->
        <div class="dim" id="dim"></div>

        <div class="modal" id="taskModal">
          <div class="modalHead">
            <div class="t" id="tasksTitle">TODAY TASKS</div>
            <button class="btn" id="closeTasksBtn">CLOSE</button>
          </div>

          <div class="modalBody" id="taskList">
            <!-- rows injected -->
          </div>

          <div class="modalActions">
            <button class="btn" id="addTaskBtn">+ ADD TASK</button>
            <button class="btn" id="clearDoneBtn">CLEAR DONE</button>
          </div>
        </div>

        <div class="foot">
          <div class="left">NOTION EMBED SAFE</div>
          <div class="right">v3.0</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function(){
      const $ = (id) => document.getElementById(id);

      /* =====================
         ✅ Auto Scaling
         ===================== */
      const scaleWrap = $("scaleWrap");
      const card = $("card");

function fit(){
  // 모바일은 scale 끔
  if (window.matchMedia("(max-width: 900px)").matches) {
    scaleWrap.style.transform = "none";
    return;
  }

  const baseW = Number(getComputedStyle(document.documentElement).getPropertyValue("--baseW")) || 1060;
  const baseH = Number(getComputedStyle(document.documentElement).getPropertyValue("--baseH")) || 720;

  const w = window.innerWidth;
  const h = window.innerHeight;

  // ✅ 테두리(카드 border) 보이게 최소 여백만 남김
  const SAFE = 6; // 4~10 사이 취향

  const sx = (w - SAFE * 2) / baseW;
  const sy = (h - SAFE * 2) / baseH;

  const s = Math.min(sx, sy);

  const tx = (w - baseW * s) / 2;
  const ty = (h - baseH * s) / 2;

  scaleWrap.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
}

      window.addEventListener("resize", fit);
      fit();

      /* =====================
         ✅ Calendar + State
         ===================== */
      const monthLabel = $("monthLabel");
      const pickedLabel = $("pickedLabel");
      const grid = $("grid");

      const prevBtn = $("prevBtn");
      const nextBtn = $("nextBtn");
      const todayBtn = $("todayBtn");

      const weekChip = $("weekChip");

      // weekly routine
      const rWorkout = $("r_workout");
      const rReading = $("r_reading");
      const rBudget = $("r_budget");
      const resetRoutineBtn = $("resetRoutineBtn");
      const allRoutineBtn = $("allRoutineBtn");

      // today routine
      const todayChip = $("todayChip");
      const todayPanel = $("todayPanel");
      const todayList = $("todayList");

      // tasks modal
      const dim = $("dim");
      const taskModal = $("taskModal");
      const tasksTitle = $("tasksTitle");
      const closeTasksBtn = $("closeTasksBtn");
      const taskList = $("taskList");
      const addTaskBtn = $("addTaskBtn");
      const clearDoneBtn = $("clearDoneBtn");

      const KEY = "yohan_os_calendar_v30";

      const months = [
        "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
        "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
      ];

      const pad2 = (n) => String(n).padStart(2,"0");
      const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

      function getWeekNumber(date){
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      }

      function load(){
        try { return JSON.parse(localStorage.getItem(KEY)) || null; }
        catch(e){ return null; }
      }

      function save(){
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      const now = new Date();
      let state = load() || {
        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),
        picked: null,

        // ✅ tasks: {date: [{text:"",done:false}, ...]}
        tasks: {},

        // ✅ weekly routine
        routine: { workout:false, reading:false, budget:false },

        // ✅ daily routine: {date: {gratitude:false, emotion:false, sleep:false, morning:false, future:false}}
        daily: {}
      };

      function ensureDaily(dateStr){
        if(!state.daily[dateStr]){
          state.daily[dateStr] = {
            gratitude:false,
            emotion:false,
            sleep:false,
            morning:false,
            future:false
          };
        }
        return state.daily[dateStr];
      }

      function ensureTasks(dateStr){
        if(!state.tasks[dateStr]){
          state.tasks[dateStr] = [
            { text:"", done:false },
            { text:"", done:false },
            { text:"", done:false }
          ];
        }
        return state.tasks[dateStr];
      }

      function hasAnyContent(dateStr){
        const t = state.tasks[dateStr];
        const d = state.daily[dateStr];

        const hasTask = Array.isArray(t) && t.some(x => (x.text && x.text.trim()) || x.done);
        const hasDaily = d && Object.values(d).some(Boolean);
        return hasTask || hasDaily;
      }

      function setRoutineUI(){
        rWorkout.classList.toggle("on", !!state.routine.workout);
        rReading.classList.toggle("on", !!state.routine.reading);
        rBudget.classList.toggle("on", !!state.routine.budget);
      }

      function setWeekChip(){
        const ref = state.picked ? new Date(state.picked) : new Date(state.viewYear, state.viewMonth, 1);
        const w = getWeekNumber(ref);
        weekChip.textContent = `WEEK ${pad2(w)}`;
      }

      /* =====================
         ✅ Today Routine Panel
         ===================== */
      function renderTodayRoutine(){
        if(!state.picked){
          todayChip.textContent = "NO DATE";
          // 선택 날짜 없으면 패널은 유지하되 체크는 비활성 느낌
          [...todayList.querySelectorAll('.chk[data-daily]')].forEach(chk=>{
            chk.classList.remove("on");
          });
          return;
        }

        todayChip.textContent = state.picked;
        const d = ensureDaily(state.picked);

        [...todayList.querySelectorAll('.chk[data-daily]')].forEach(chk=>{
          const key = chk.getAttribute("data-daily");
          chk.classList.toggle("on", !!d[key]);
        });
      }

      todayList.addEventListener("click", (e)=>{
        const chk = e.target.closest('.chk[data-daily]');
        if(!chk) return;
        if(!state.picked) return;

        const key = chk.getAttribute("data-daily");
        const d = ensureDaily(state.picked);
        d[key] = !d[key];
        chk.classList.toggle("on", d[key]);
        save();
        render(); // dot 업데이트
      });

      /* =====================
         ✅ TASK MODAL
         ===================== */
      function openTasks(dateStr){
        state.picked = dateStr;
        pickedLabel.textContent = dateStr;
        save();

        tasksTitle.textContent = `TODAY TASKS / ${dateStr}`;
        dim.classList.add("on");
        taskModal.classList.add("open");

        buildTaskList(dateStr);
        renderTodayRoutine();
        render(); // 선택/점 반영
      }

      function closeTasks(){
        dim.classList.remove("on");
        taskModal.classList.remove("open");
      }

      function buildTaskList(dateStr){
        const list = ensureTasks(dateStr);
        taskList.innerHTML = "";

        list.forEach((item, idx)=>{
          const row = document.createElement("div");
          row.className = "taskRow";

          const chk = document.createElement("div");
          chk.className = "chk";
          if(item.done) chk.classList.add("on");
          chk.addEventListener("click", ()=>{
            item.done = !item.done;
            chk.classList.toggle("on", item.done);
            save();
            render(); // dot update
          });

          const input = document.createElement("input");
          input.type = "text";
          input.value = item.text || "";
          input.placeholder = `TASK ${idx+1}`;
          input.addEventListener("input", ()=>{
            item.text = input.value;
            save();
            render(); // dot update
          });

          const del = document.createElement("button");
          del.className = "taskDel";
          del.textContent = "X";
          del.title = "삭제";
          del.addEventListener("click", ()=>{
            // 최소 1개는 유지
            list.splice(idx, 1);
            if(list.length === 0){
              list.push({text:"",done:false});
            }
            save();
            buildTaskList(dateStr);
            render();
          });

          row.appendChild(chk);
          row.appendChild(input);
          row.appendChild(del);

          taskList.appendChild(row);
        });
      }

      addTaskBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        list.push({text:"", done:false});
        save();
        buildTaskList(state.picked);
        render();
      });

      clearDoneBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        const filtered = list.filter(x => !x.done);
        state.tasks[state.picked] = filtered.length ? filtered : [{text:"",done:false}];
        save();
        buildTaskList(state.picked);
        render();
      });

      closeTasksBtn.addEventListener("click", closeTasks);
      dim.addEventListener("click", closeTasks);

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeTasks();
      });

      /* =====================
         ✅ Calendar Render
         ===================== */
      function render(){
        monthLabel.textContent = `${state.viewYear} ${months[state.viewMonth]}`;
        pickedLabel.textContent = state.picked ? state.picked : "NONE";
        setWeekChip();

        const first = new Date(state.viewYear, state.viewMonth, 1);
        const firstDay = first.getDay();
        const lastDate = new Date(state.viewYear, state.viewMonth+1, 0).getDate();
        const todayStr = fmt(new Date());

        grid.innerHTML = "";

        for(let i=0;i<firstDay;i++){
          const e = document.createElement("div");
          e.className = "cell empty";
          grid.appendChild(e);
        }

        for(let d=1; d<=lastDate; d++){
          const dateObj = new Date(state.viewYear, state.viewMonth, d);
          const dateStr = fmt(dateObj);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = d;

          const dow = dateObj.getDay();
          if(dow === 0) cell.classList.add("sun");
          if(dow === 6) cell.classList.add("sat");

          if(dateStr === todayStr) cell.classList.add("today");
          if(state.picked === dateStr) cell.classList.add("selected");

          // ✅ 점 표시
          if(hasAnyContent(dateStr)) cell.classList.add("hasDot");

          cell.addEventListener("click", ()=>{
            openTasks(dateStr);
          });

          grid.appendChild(cell);
        }

        // ✅ 오른쪽 today routine도 최신 상태 반영
        renderTodayRoutine();
      }

      /* =====================
         ✅ Month Controls
         ===================== */
      prevBtn.addEventListener("click", ()=>{
        state.viewMonth--;
        if(state.viewMonth < 0){
          state.viewMonth = 11;
          state.viewYear--;
        }
        save();
        render();
      });

      nextBtn.addEventListener("click", ()=>{
        state.viewMonth++;
        if(state.viewMonth > 11){
          state.viewMonth = 0;
          state.viewYear++;
        }
        save();
        render();
      });

      todayBtn.addEventListener("click", ()=>{
        const t = new Date();
        state.viewYear = t.getFullYear();
        state.viewMonth = t.getMonth();
        const d = fmt(t);
        save();
        render();
        openTasks(d);
      });

      /* =====================
         ✅ Weekly Routine
         ===================== */
      rWorkout.addEventListener("click", ()=>{ state.routine.workout = !state.routine.workout; setRoutineUI(); save(); });
      rReading.addEventListener("click", ()=>{ state.routine.reading = !state.routine.reading; setRoutineUI(); save(); });
      rBudget.addEventListener("click", ()=>{ state.routine.budget = !state.routine.budget; setRoutineUI(); save(); });

      resetRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=false;
        state.routine.reading=false;
        state.routine.budget=false;
        setRoutineUI(); save();
      });

      allRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=true;
        state.routine.reading=true;
        state.routine.budget=true;
        setRoutineUI(); save();
      });

      // init
      setRoutineUI();
      render();

      // ✅ 처음 접속 시: 오늘 날짜 자동 선택하고 싶으면 아래 주석 해제
      // openTasks(fmt(new Date()));

    })();
  </script>
</body>
</html>
