<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Yohan OS Calendar v2.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#1f1f1f;
      --muted:#9aa0a6;

      --panel:#ffffff;
      --border:#202124;
      --shadow:#e9e9e9;

      --pink:#ff6fa4;
      --pinkSoft:#ffe3ee;
      --chip:#f7f7f7;

      --cellBorder:#ececec;
      --cellHover:#fff3f8;

      --radius:16px;
      --radiusSm:12px;

      --pad:10px;

      --blue:#3c66b4;
      --red:#b43c64;
      --gridGap:8px;

      --glow: 0 0 0 2px rgba(255,111,164,0.30), 0 0 0 6px rgba(255,111,164,0.14);
    }

    /* ✅ 노션 임베드 내부 스크롤 방지 */
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background: var(--bg);
      color: var(--ink);
      font-family:'Silkscreen', cursive;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .os{
      width:min(760px, 100%);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 6px 6px 0 var(--shadow);
      padding: var(--pad);
      position:relative;
      overflow:hidden;
    }

    /* ===== Topbar ===== */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 8px 10px 8px;
      border-bottom: 2px dashed #efefef;
      margin-bottom: 10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dots{ display:flex; gap:6px; }
    .dot{
      width:10px; height:10px;
      border:2px solid var(--border);
      border-radius: 4px;
      background:#fff;
      box-shadow:2px 2px 0 var(--shadow);
    }
    .dot.pink{ background: var(--pinkSoft); }

    .titlewrap{
      display:flex;
      flex-direction:column;
      line-height:1.05;
      min-width:0;
    }

    .osname{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .monthyear{
      font-size:18px;
      letter-spacing:0.6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .btn{
      border:2px solid var(--border);
      background:#fff;
      border-radius: 14px;
      padding: 7px 10px;
      font-family:'Silkscreen', cursive;
      font-size:12px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
    }
    .btn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }
    .btn.today{
      background: var(--chip);
      min-width:74px;
    }

    /* ===== Status row ===== */
    .status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 0 8px 10px 8px;
      flex-wrap:wrap;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:2px solid #efefef;
      background:#fff;
      padding:7px 10px;
      border-radius: 999px;
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .chip b{ color:var(--ink); font-weight:700; }

    .accent{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius: 999px;
      border:2px solid var(--border);
      background: var(--pinkSoft);
      box-shadow: 3px 3px 0 var(--shadow);
      font-size:11px;
      color:#6b1b39;
      white-space:nowrap;
    }

    /* ===== Mobile Tabs ===== */
    .tabs{
      display:none;
      padding: 0 8px 10px 8px;
      gap:8px;
    }
    .tabBtn{
      flex:1;
      border:2px solid var(--border);
      background:#fff;
      border-radius: 14px;
      padding: 8px 10px;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:6px;
    }
    .tabBtn.active{
      background: var(--pinkSoft);
      box-shadow: 3px 3px 0 var(--shadow), var(--glow);
    }
    .tabBtn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }

    /* ===== Main Layout ===== */
    .main{
      display:flex;
      gap:10px;
      padding: 0 6px 6px 6px;
      align-items:flex-start;
    }

    .cal{
      flex: 1 1 420px;
      min-width: 320px;
    }

    /* ===== DOW Chips ===== */
    .dowGrid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gridGap);
      margin-bottom: 8px;
    }
    .dowChip{
      border:2px solid #f0f0f0;
      background:#fff;
      border-radius: 999px;
      padding: 6px 0;
      text-align:center;
      font-size:10px;
      color: var(--muted);
      user-select:none;
      box-shadow: 2px 2px 0 var(--shadow);
    }
    .dowChip.sun{ color: var(--red); border-color:#ffd7e6; background:#fff8fb; }
    .dowChip.sat{ color: var(--blue); border-color:#dbe6ff; background:#f7faff; }

    /* ===== Calendar cells ===== */
    .daysGrid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gridGap);
    }

    .cell{
      height:36px;
      border:2px solid var(--cellBorder);
      border-radius: var(--radiusSm);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      background:#fff;
      transition: 0.08s;
      position:relative;
    }
    .cell:hover{
      background: var(--cellHover);
      border-color:#ffd1e2;
      transform: translateY(-1px);
    }

    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }

    /* ✅ 오늘(today) */
    .cell.today{
      border-color: var(--border);
      background: var(--pink);
      color:#fff;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    }

    /* ✅ 선택(selected) - 더 강하게 */
    .cell.selected{
      border-color: var(--border);
      background: var(--pinkSoft);
      box-shadow: 2px 2px 0 var(--shadow), var(--glow);
      transform: translateY(-1px);
    }

    /* ✅ 선택 점 표시 */
    .cell.selected::after{
      content:"";
      position:absolute;
      bottom:6px;
      width:6px;
      height:6px;
      border-radius:2px;
      background: var(--pink);
      box-shadow: 1px 1px 0 rgba(0,0,0,0.10);
    }

    .cell.sun{ color: var(--red); }
    .cell.sat{ color: var(--blue); }

    /* ===== Side Routine Panel ===== */
    .side{
      width: 240px;
      flex: 0 0 240px;
      border:2px solid #efefef;
      border-radius: var(--radius);
      padding:10px;
      background:#fff;
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .sideTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      gap:10px;
    }

    .sideTitle h3{
      margin:0;
      font-size:12px;
      color: var(--ink);
      letter-spacing:0.3px;
      white-space:nowrap;
    }

    .weekBadge{
      font-size:10px;
      color:var(--muted);
      border:2px solid #f0f0f0;
      border-radius:999px;
      padding:5px 8px;
      background:#fff;
      white-space:nowrap;
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .rlist{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .ritem{
      display:flex;
      align-items:center;
      gap:10px;
      border:2px solid #f3f3f3;
      background:#fff;
      padding:10px 10px;
      border-radius:14px;
      position:relative;
      transition: 0.08s;
    }
    .ritem:hover{
      border-color:#ffd7e6;
      background:#fff8fb;
    }

    /* ✅ 픽셀 체크박스 커스텀 */
    .pxCheck{
      width:18px;
      height:18px;
      border:2px solid var(--border);
      border-radius:5px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      box-shadow: 2px 2px 0 var(--shadow);
      background:#fff;
      flex-shrink:0;
      position:relative;
    }
    .pxCheck input{
      position:absolute;
      inset:0;
      opacity:0;
      margin:0;
      cursor:pointer;
    }
    .pxCheck .mark{
      width:10px;
      height:10px;
      border-radius:3px;
      background: transparent;
      transition: 0.08s;
    }
    .pxCheck input:checked + .mark{
      background: var(--pink);
      box-shadow: 0 0 0 2px rgba(255,111,164,0.18);
    }

    .rlabel{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }
    .rlabel b{
      font-size:11px;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:0.2px;
    }
    .rlabel span{
      font-size:9px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* ✅ 체크되면 카드도 핑크 강조 */
    .ritem.checked{
      border-color: var(--border);
      background: var(--pinkSoft);
      box-shadow: 2px 2px 0 var(--shadow), var(--glow);
    }

    .miniBtnRow{
      display:flex;
      gap:10px;
      margin-top:12px;
    }

    .miniBtn{
      flex:1;
      border:2px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:8px 10px;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
    }
    .miniBtn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }
    .miniBtn.primary{
      background: var(--chip);
    }

    /* ===== Footer ===== */
    .foot{
      padding: 6px 8px 2px 8px;
      font-size:9px;
      color:#c0c0c0;
      user-select:none;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    /* ===== TODO Modal ===== */
    .todoOverlay{
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display:none;
      align-items:center;
      justify-content:center;
      z-index: 9999;
      padding: 14px;
    }

    .todoModal{
      width: min(560px, 100%);
      background:#fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 6px 6px 0 var(--shadow);
      padding: 12px;
      max-height: min(520px, 90vh);
      overflow:auto;
    }

    .todoHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
      padding-bottom:10px;
      border-bottom: 2px dashed #efefef;
    }

    .todoHead h3{
      margin:0;
      font-size:12px;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      letter-spacing:0.3px;
    }

    .closeBtn{
      border:2px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:7px 10px;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
      white-space:nowrap;
    }
    .closeBtn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .tlist{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top: 10px;
    }

    .titem{
      display:flex;
      align-items:center;
      gap:10px;
      border:2px solid #f3f3f3;
      border-radius:14px;
      padding:10px 10px;
      background:#fff;
      transition: 0.08s;
    }
    .titem:hover{
      border-color:#ffd7e6;
      background:#fff8fb;
    }

    .titem input[type="text"]{
      border:none;
      outline:none;
      width:100%;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      background:transparent;
      color:var(--ink);
      min-width:0;
    }
    .titem input[type="text"]::placeholder{
      color:#c2c2c2;
    }

    /* ===== Responsive ===== */
    @media (max-width: 720px){
      .tabs{ display:flex; }

      /* 모바일에서는 탭으로 번갈아 보여주기 */
      .main{ flex-direction:column; }
      .side{
        width:100%;
        flex: 1 1 auto;
        display:none; /* 기본 숨김, 탭으로 표시 */
      }
      .cal{
        min-width: 0;
      }
    }

    @media (max-width: 360px){
      .monthyear{ font-size:16px; }
      .cell{ height:34px; font-size:11px; }
      .btn{ padding:6px 8px; min-width:40px; }
      .btn.today{ min-width:68px; }
    }
  </style>
</head>

<body>
  <div class="os" role="application" aria-label="Yohan OS Calendar v2.1">

    <!-- Topbar -->
    <div class="topbar">
      <div class="brand">
        <div class="dots" aria-hidden="true">
          <div class="dot pink"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="titlewrap">
          <div class="osname">YOHAN OS / DASHBOARD</div>
          <div class="monthyear" id="monthyear">2026 JANUARY</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prev" aria-label="Previous Month">◀</button>
        <button class="btn today" id="todayBtn" aria-label="Go Today">TODAY</button>
        <button class="btn" id="next" aria-label="Next Month">▶</button>
      </div>
    </div>

    <!-- Status -->
    <div class="status">
      <div class="chip">PICKED: <b id="pickedText">NONE</b></div>
      <div class="accent">MODE: YOHAN OS</div>
    </div>

    <!-- Mobile Tabs -->
    <div class="tabs" id="tabs">
      <button class="tabBtn active" data-tab="calendar">CALENDAR</button>
      <button class="tabBtn" data-tab="routine">ROUTINE</button>
      <button class="tabBtn" data-tab="todo">TODO</button>
    </div>

    <!-- Main -->
    <div class="main">
      <!-- Calendar -->
      <section class="cal" id="calendarSection">
        <div class="dowGrid" id="dow"></div>
        <div class="daysGrid" id="days"></div>
      </section>

      <!-- Routine -->
      <aside class="side" id="routineSection">
        <div class="sideTitle">
          <h3>THIS WEEK ROUTINE</h3>
          <div class="weekBadge" id="weekBadge">WEEK --</div>
        </div>

        <div class="rlist">
          <div class="ritem" id="card_workout">
            <label class="pxCheck" aria-label="workout checkbox">
              <input type="checkbox" id="wk_workout">
              <span class="mark"></span>
            </label>
            <div class="rlabel">
              <b>WORKOUT</b>
              <span>운동 1회 이상</span>
            </div>
          </div>

          <div class="ritem" id="card_reading">
            <label class="pxCheck" aria-label="reading checkbox">
              <input type="checkbox" id="wk_reading">
              <span class="mark"></span>
            </label>
            <div class="rlabel">
              <b>READING</b>
              <span>독서 10p 이상</span>
            </div>
          </div>

          <div class="ritem" id="card_budget">
            <label class="pxCheck" aria-label="budget checkbox">
              <input type="checkbox" id="wk_budget">
              <span class="mark"></span>
            </label>
            <div class="rlabel">
              <b>BUDGET</b>
              <span>가계부 기록</span>
            </div>
          </div>
        </div>

        <div class="miniBtnRow">
          <button class="miniBtn" id="resetWeek">RESET</button>
          <button class="miniBtn primary" id="fillWeek">ALL</button>
        </div>
      </aside>
    </div>

    <div class="foot">
      <span>NOTION EMBED SAFE</span>
      <span>v2.1</span>
    </div>
  </div>

  <!-- ✅ TODO Modal Overlay -->
  <div class="todoOverlay" id="todoOverlay" aria-hidden="true">
    <section class="todoModal" id="todoPanel" aria-label="Todo Modal">
      <div class="todoHead">
        <h3 id="todoTitle">TODAY TASKS</h3>
        <button class="closeBtn" id="closeTodo">CLOSE</button>
      </div>

      <div class="tlist">
        <div class="titem">
          <label class="pxCheck" aria-label="todo 1 checkbox">
            <input type="checkbox" id="t1_done">
            <span class="mark"></span>
          </label>
          <input type="text" id="t1_text" placeholder="Task 1 (클릭해서 입력)" maxlength="40">
        </div>

        <div class="titem">
          <label class="pxCheck" aria-label="todo 2 checkbox">
            <input type="checkbox" id="t2_done">
            <span class="mark"></span>
          </label>
          <input type="text" id="t2_text" placeholder="Task 2" maxlength="40">
        </div>

        <div class="titem">
          <label class="pxCheck" aria-label="todo 3 checkbox">
            <input type="checkbox" id="t3_done">
            <span class="mark"></span>
          </label>
          <input type="text" id="t3_text" placeholder="Task 3" maxlength="40">
        </div>
      </div>
    </section>
  </div>

  <script>
    // ========= Helpers =========
    const pad2 = (n) => String(n).padStart(2,"0");
    const keyOf = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;

    function isSameDay(a, b){
      return a.getFullYear()===b.getFullYear() &&
        a.getMonth()===b.getMonth() &&
        a.getDate()===b.getDate();
    }

    // ISO Week Number
    function getISOWeek(date){
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return { year: d.getUTCFullYear(), week: weekNo };
    }

    // localStorage wrapper
    const store = {
      get(k, fallback=null){
        try{
          const v = localStorage.getItem(k);
          return v ? JSON.parse(v) : fallback;
        }catch(e){
          return fallback;
        }
      },
      set(k, v){
        localStorage.setItem(k, JSON.stringify(v));
      }
    };

    // ========= Elements =========
    const monthyearEl = document.getElementById("monthyear");
    const pickedText = document.getElementById("pickedText");

    const dowEl = document.getElementById("dow");
    const daysEl = document.getElementById("days");

    const todoOverlay = document.getElementById("todoOverlay");
    const todoTitle = document.getElementById("todoTitle");
    const closeTodoBtn = document.getElementById("closeTodo");

    const t1_done = document.getElementById("t1_done");
    const t2_done = document.getElementById("t2_done");
    const t3_done = document.getElementById("t3_done");
    const t1_text = document.getElementById("t1_text");
    const t2_text = document.getElementById("t2_text");
    const t3_text = document.getElementById("t3_text");

    const weekBadge = document.getElementById("weekBadge");
    const wk_workout = document.getElementById("wk_workout");
    const wk_reading = document.getElementById("wk_reading");
    const wk_budget  = document.getElementById("wk_budget");
    const resetWeekBtn = document.getElementById("resetWeek");
    const fillWeekBtn  = document.getElementById("fillWeek");

    const card_workout = document.getElementById("card_workout");
    const card_reading = document.getElementById("card_reading");
    const card_budget  = document.getElementById("card_budget");

    // Tabs
    const tabs = document.getElementById("tabs");
    const tabBtns = tabs ? Array.from(document.querySelectorAll(".tabBtn")) : [];
    const calendarSection = document.getElementById("calendarSection");
    const routineSection  = document.getElementById("routineSection");

    // ========= Calendar state =========
    const DOW = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const MONTHS = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

    const view = new Date();
    const realToday = new Date();
    let selectedKey = "";

    // ========= Weekly Routine =========
    function getWeekKey(){
      const w = getISOWeek(new Date());
      return `yohan_week_${w.year}_W${pad2(w.week)}`;
    }

    function applyRoutineCardStates(){
      card_workout.classList.toggle("checked", wk_workout.checked);
      card_reading.classList.toggle("checked", wk_reading.checked);
      card_budget.classList.toggle("checked", wk_budget.checked);
    }

    function loadWeeklyRoutine(){
      const w = getISOWeek(new Date());
      weekBadge.textContent = `WEEK ${pad2(w.week)}`;

      const wkKey = getWeekKey();
      const data = store.get(wkKey, { workout:false, reading:false, budget:false });

      wk_workout.checked = !!data.workout;
      wk_reading.checked = !!data.reading;
      wk_budget.checked  = !!data.budget;

      applyRoutineCardStates();
    }

    function saveWeeklyRoutine(){
      const wkKey = getWeekKey();
      store.set(wkKey, {
        workout: wk_workout.checked,
        reading: wk_reading.checked,
        budget: wk_budget.checked
      });
      applyRoutineCardStates();
    }

    wk_workout.addEventListener("change", saveWeeklyRoutine);
    wk_reading.addEventListener("change", saveWeeklyRoutine);
    wk_budget.addEventListener("change", saveWeeklyRoutine);

    resetWeekBtn.addEventListener("click", () => {
      wk_workout.checked = false;
      wk_reading.checked = false;
      wk_budget.checked  = false;
      saveWeeklyRoutine();
    });

    fillWeekBtn.addEventListener("click", () => {
      wk_workout.checked = true;
      wk_reading.checked = true;
      wk_budget.checked  = true;
      saveWeeklyRoutine();
    });

    // ========= Todo (per date) =========
    function todoStorageKey(dateKey){
      return `yohan_todo_${dateKey}`;
    }

    function loadTodo(dateKey){
      const data = store.get(todoStorageKey(dateKey), {
        t1:{done:false,text:""},
        t2:{done:false,text:""},
        t3:{done:false,text:""}
      });

      t1_done.checked = !!data.t1.done;
      t2_done.checked = !!data.t2.done;
      t3_done.checked = !!data.t3.done;

      t1_text.value = data.t1.text || "";
      t2_text.value = data.t2.text || "";
      t3_text.value = data.t3.text || "";
    }

    function saveTodo(dateKey){
      store.set(todoStorageKey(dateKey), {
        t1:{ done: t1_done.checked, text: t1_text.value.trim() },
        t2:{ done: t2_done.checked, text: t2_text.value.trim() },
        t3:{ done: t3_done.checked, text: t3_text.value.trim() }
      });
    }

    function bindTodoAutosave(){
      const handler = () => {
        if(!selectedKey) return;
        saveTodo(selectedKey);
      };

      t1_done.addEventListener("change", handler);
      t2_done.addEventListener("change", handler);
      t3_done.addEventListener("change", handler);

      t1_text.addEventListener("input", handler);
      t2_text.addEventListener("input", handler);
      t3_text.addEventListener("input", handler);
    }

    function openTodoFor(dateKey){
      todoTitle.textContent = `TODAY TASKS / ${dateKey}`;
      todoOverlay.style.display = "flex";
      todoOverlay.setAttribute("aria-hidden", "false");
      loadTodo(dateKey);
    }

    function closeTodo(){
      todoOverlay.style.display = "none";
      todoOverlay.setAttribute("aria-hidden", "true");
    }

    closeTodoBtn.addEventListener("click", closeTodo);

    // overlay 바깥 클릭 닫기
    todoOverlay.addEventListener("click", (e) => {
      if(e.target === todoOverlay) closeTodo();
    });

    // ESC 닫기
    window.addEventListener("keydown", (e) => {
      if(e.key === "Escape" && todoOverlay.style.display === "flex"){
        closeTodo();
      }
      // 월 이동 단축키
      if(e.key === "ArrowLeft"){
        view.setMonth(view.getMonth() - 1);
        renderCalendar();
      }
      if(e.key === "ArrowRight"){
        view.setMonth(view.getMonth() + 1);
        renderCalendar();
      }
    });

    // ========= Render =========
    function renderDOW(){
      dowEl.innerHTML = "";
      DOW.forEach((d, idx) => {
        const div = document.createElement("div");
        div.className = "dowChip";
        div.textContent = d;

        if(idx === 0) div.classList.add("sun");
        if(idx === 6) div.classList.add("sat");

        dowEl.appendChild(div);
      });
    }

    function renderCalendar(){
      const y = view.getFullYear();
      const = view.getMonth();

      monthyearEl.textContent = `${y} ${MONTHS[m]}`;

      const firstDay = new Date(y, m, 1).getDay();
      const lastDate = new Date(y, m + 1, 0).getDate();

      daysEl.innerHTML = "";

      // blanks
      for(let i=0;i<firstDay;i++){
        const div = document.createElement("div");
        div.className = "cell empty";
        daysEl.appendChild(div);
      }

      // days
      for(let d=1; d<=lastDate; d++){
        const dateObj = new Date(y, m, d);
        const div = document.createElement("div");
        div.className = "cell";
        div.textContent = d;

        const dow = dateObj.getDay();
        if(dow===0) div.classList.add("sun");
        if(dow===6) div.classList.add("sat");

        if(isSameDay(dateObj, realToday)){
          div.classList.add("today");
        }

        const k = keyOf(y,m,d);
        if(k === selectedKey){
          div.classList.add("selected");
        }

        div.addEventListener("click", () => {
          selectedKey = k;
          pickedText.textContent = k;
          renderCalendar();
          openTodoFor(k);

          // 모바일 탭이 TODO로 자동 전환되게(원하면)
          if(window.matchMedia("(max-width: 720px)").matches){
            setActiveTab("todo");
          }
        });

        daysEl.appendChild(div);
      }
    }

    // ========= Buttons =========
    document.getElementById("prev").addEventListener("click", () => {
      view.setMonth(view.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("next").addEventListener("click", () => {
      view.setMonth(view.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      view.setFullYear(realToday.getFullYear());
      view.setMonth(realToday.getMonth());
      selectedKey = keyOf(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
      pickedText.textContent = selectedKey;
      renderCalendar();
      openTodoFor(selectedKey);

      if(window.matchMedia("(max-width: 720px)").matches){
        setActiveTab("todo");
      }
    });

    // ========= Mobile Tabs Logic =========
    function setActiveTab(tabName){
      // tabName: calendar | routine | todo
      tabBtns.forEach(b => b.classList.toggle("active", b.dataset.tab === tabName));

      if(tabName === "calendar"){
        calendarSection.style.display = "block";
        routineSection.style.display  = "none";
        closeTodo();
      }
      if(tabName === "routine"){
        calendarSection.style.display = "none";
        routineSection.style.display  = "block";
        closeTodo();
      }
      if(tabName === "todo"){
        // 캘린더는 보조로 숨기고, TODO는 모달을 열어주기
        calendarSection.style.display = "block";
        routineSection.style.display  = "none";
        if(selectedKey){
          openTodoFor(selectedKey);
        }else{
          // 선택 없으면 오늘로 자동 선택
          selectedKey = keyOf(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
          pickedText.textContent = selectedKey;
          view.setFullYear(realToday.getFullYear());
          view.setMonth(realToday.getMonth());
          renderCalendar();
          openTodoFor(selectedKey);
        }
      }
    }

    tabBtns.forEach(btn => {
      btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
    });

    function syncLayoutForScreen(){
      const isMobile = window.matchMedia("(max-width: 720px)").matches;
      if(isMobile){
        // 탭 UI 활성화, 기본은 calendar
        setActiveTab("calendar");
      }else{
        // 데스크탑: 둘 다 표시
        calendarSection.style.display = "block";
        routineSection.style.display  = "block";
        // 탭 버튼 상태 초기화
        tabBtns.forEach(b => b.classList.remove("active"));
        if(tabBtns[0]) tabBtns[0].classList.add("active");
      }
    }

    window.addEventListener("resize", syncLayoutForScreen);

    // ========= Init =========
    renderDOW();
    renderCalendar();
    loadWeeklyRoutine();
    bindTodoAutosave();
    syncLayoutForScreen();
  </script>
</body>
</html>
