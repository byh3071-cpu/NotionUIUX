<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yohan OS Calendar v2</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#1f1f1f;
      --muted:#9aa0a6;

      --panel:#ffffff;
      --border:#202124;
      --shadow:#e9e9e9;

      --pink:#ff6fa4;
      --pinkSoft:#ffe3ee;
      --chip:#f7f7f7;

      --cellBorder:#ececec;
      --cellHover:#fff3f8;

      --radius:16px;
      --radiusSm:12px;

      --pad:10px;
    }

    /* ✅ 노션/임베드에서 내부 스크롤 금지 */
    html, body{
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      overflow:hidden;
      background: var(--bg);
      color: var(--ink);
      font-family:'Silkscreen', cursive;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .os{
      width:min(760px, 100%);
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 6px 6px 0 var(--shadow);
      padding: var(--pad);
      position:relative;
      overflow:hidden; /* 내부에서도 스크롤 금지 */
    }

    /* ✅ 상단 OS 바 */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 8px 8px 10px 8px;
      border-bottom: 2px dashed #efefef;
      margin-bottom: 10px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .dots{ display:flex; gap:6px; }
    .dot{
      width:10px; height:10px;
      border:2px solid var(--border);
      border-radius: 4px;
      background:#fff;
      box-shadow:2px 2px 0 var(--shadow);
    }
    .dot.pink{ background: var(--pinkSoft); }

    .titlewrap{
      display:flex;
      flex-direction:column;
      line-height:1.05;
      min-width:0;
    }

    .osname{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .monthyear{
      font-size:18px;
      letter-spacing:0.6px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .controls{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .btn{
      border:2px solid var(--border);
      background:#fff;
      border-radius: 14px;
      padding: 7px 10px;
      font-family:'Silkscreen', cursive;
      font-size:12px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      min-width:44px;
    }
    .btn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }
    .btn.today{
      background: var(--chip);
      min-width:74px;
    }

    /* ✅ 상태바 */
    .status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding: 0 8px 10px 8px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border:2px solid #efefef;
      background:#fff;
      padding:7px 10px;
      border-radius: 999px;
      font-size:11px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .chip b{ color:var(--ink); font-weight:700; }

    .accent{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius: 999px;
      border:2px solid var(--border);
      background: var(--pinkSoft);
      box-shadow: 3px 3px 0 var(--shadow);
      font-size:11px;
      color:#6b1b39;
      white-space:nowrap;
    }

    /* ✅ 메인 레이아웃: 달력 + 주간루틴 */
    .main{
      display:flex;
      gap:10px;
      padding: 0 6px 6px 6px;
      align-items:flex-start;
    }

    /* 왼쪽: 달력 */
    .cal{
      flex: 1 1 420px;
      min-width: 320px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .dow{
      font-size:10px;
      color: var(--muted);
      text-align:center;
      padding:6px 0;
      user-select:none;
    }

    .cell{
      height:34px;
      border:2px solid var(--cellBorder);
      border-radius: var(--radiusSm);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      cursor:pointer;
      user-select:none;
      background:#fff;
      transition: 0.08s;
      position:relative;
    }
    .cell:hover{
      background: var(--cellHover);
      border-color:#ffd1e2;
      transform: translateY(-1px);
    }
    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color: var(--border);
      background: var(--pink);
      color:#fff;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.12);
    }
    .cell.selected{
      border-color: var(--border);
      background: var(--pinkSoft);
      box-shadow: 2px 2px 0 var(--shadow);
    }
    .cell.sun{ color:#b43c64; }
    .cell.sat{ color:#3c66b4; }

    /* ✅ 오른쪽: 이번 주 루틴 체크 */
    .side{
      width: 240px;
      flex: 0 0 240px;
      border:2px solid #efefef;
      border-radius: var(--radius);
      padding:10px;
      background:#fff;
    }

    .sideTitle{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:8px;
      gap:10px;
    }

    .sideTitle h3{
      margin:0;
      font-size:12px;
      color: var(--ink);
      letter-spacing:0.3px;
      white-space:nowrap;
    }

    .weekBadge{
      font-size:10px;
      color:var(--muted);
      border:2px solid #f0f0f0;
      border-radius:999px;
      padding:5px 8px;
      background:#fff;
      white-space:nowrap;
    }

    .rlist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .ritem{
      display:flex;
      align-items:center;
      gap:10px;
      border:2px solid #f3f3f3;
      background:#fff;
      padding:8px 10px;
      border-radius:14px;
    }

    .ritem input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color: var(--pink);
      cursor:pointer;
    }

    .rlabel{
      display:flex;
      flex-direction:column;
      gap:2px;
      min-width:0;
    }

    .rlabel b{
      font-size:11px;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rlabel span{
      font-size:9px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .miniBtnRow{
      display:flex;
      gap:8px;
      margin-top:10px;
    }

    .miniBtn{
      flex:1;
      border:2px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:7px 10px;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
    }
    .miniBtn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }

    /* ✅ 아래: 오늘의 할 일 3개 패널 */
    .todoPanel{
      margin: 6px 6px 0 6px;
      border:2px solid #efefef;
      border-radius: var(--radius);
      padding:10px;
      background:#fff;
      display:none; /* 날짜 클릭하면 열림 */
    }

    .todoHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }

    .todoHead h3{
      margin:0;
      font-size:12px;
      color:var(--ink);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .todoHead .closeBtn{
      border:2px solid var(--border);
      background:#fff;
      border-radius:14px;
      padding:6px 10px;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      cursor:pointer;
      box-shadow: 3px 3px 0 var(--shadow);
      user-select:none;
      white-space:nowrap;
    }
    .todoHead .closeBtn:active{
      transform: translate(1px,1px);
      box-shadow: 2px 2px 0 var(--shadow);
    }

    .tlist{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .titem{
      display:flex;
      align-items:center;
      gap:10px;
      border:2px solid #f3f3f3;
      border-radius:14px;
      padding:8px 10px;
      background:#fff;
    }

    .titem input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color: var(--pink);
      cursor:pointer;
      flex-shrink:0;
    }

    .titem input[type="text"]{
      border:none;
      outline:none;
      width:100%;
      font-family:'Silkscreen', cursive;
      font-size:11px;
      background:transparent;
      color:var(--ink);
      min-width:0;
    }

    .titem input[type="text"]::placeholder{
      color:#c2c2c2;
    }

    .foot{
      padding: 6px 8px 2px 8px;
      font-size:9px;
      color:#c0c0c0;
      user-select:none;
      display:flex;
      justify-content:space-between;
      gap:8px;
    }

    /* ✅ 작아지면 사이드가 아래로 내려가게 */
    @media (max-width: 720px){
      .main{ flex-direction:column; }
      .side{ width:100%; flex: 1 1 auto; }
    }

    @media (max-width: 360px){
      .monthyear{ font-size:16px; }
      .cell{ height:32px; font-size:11px; }
      .btn{ padding:6px 8px; min-width:40px; }
      .btn.today{ min-width:68px; }
    }
  </style>
</head>

<body>
  <div class="os" role="application" aria-label="Yohan OS Calendar v2">

    <div class="topbar">
      <div class="brand">
        <div class="dots" aria-hidden="true">
          <div class="dot pink"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="titlewrap">
          <div class="osname">YOHAN OS / DASHBOARD</div>
          <div class="monthyear" id="monthyear">2026 JANUARY</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn" id="prev" aria-label="Previous Month">◀</button>
        <button class="btn today" id="todayBtn" aria-label="Go Today">TODAY</button>
        <button class="btn" id="next" aria-label="Next Month">▶</button>
      </div>
    </div>

    <div class="status">
      <div class="chip">
        PICKED: <b id="pickedText">NONE</b>
      </div>
      <div class="accent">MODE: YOHAN OS</div>
    </div>

    <div class="main">
      <!-- 왼쪽: 달력 -->
      <section class="cal">
        <div class="grid" id="dow"></div>
        <div class="grid" id="days"></div>
      </section>

      <!-- 오른쪽: 이번 주 루틴 -->
      <aside class="side">
        <div class="sideTitle">
          <h3>THIS WEEK ROUTINE</h3>
          <div class="weekBadge" id="weekBadge">WEEK --</div>
        </div>

        <div class="rlist">
          <label class="ritem">
            <input type="checkbox" id="wk_workout">
            <div class="rlabel">
              <b>WORKOUT</b>
              <span>운동 1회 이상</span>
            </div>
          </label>

          <label class="ritem">
            <input type="checkbox" id="wk_reading">
            <div class="rlabel">
              <b>READING</b>
              <span>독서 10p 이상</span>
            </div>
          </label>

          <label class="ritem">
            <input type="checkbox" id="wk_budget">
            <div class="rlabel">
              <b>BUDGET</b>
              <span>가계부 기록</span>
            </div>
          </label>
        </div>

        <div class="miniBtnRow">
          <button class="miniBtn" id="resetWeek">RESET</button>
          <button class="miniBtn" id="fillWeek">ALL</button>
        </div>
      </aside>
    </div>

    <!-- 아래: 오늘의 할 일 3개 -->
    <section class="todoPanel" id="todoPanel">
      <div class="todoHead">
        <h3 id="todoTitle">TODAY TASKS</h3>
        <button class="closeBtn" id="closeTodo">CLOSE</button>
      </div>

      <div class="tlist">
        <div class="titem">
          <input type="checkbox" id="t1_done">
          <input type="text" id="t1_text" placeholder="Task 1 (클릭해서 입력)" maxlength="40">
        </div>

        <div class="titem">
          <input type="checkbox" id="t2_done">
          <input type="text" id="t2_text" placeholder="Task 2" maxlength="40">
        </div>

        <div class="titem">
          <input type="checkbox" id="t3_done">
          <input type="text" id="t3_text" placeholder="Task 3" maxlength="40">
        </div>
      </div>
    </section>

    <div class="foot">
      <span>NOTION EMBED SAFE</span>
      <span>v2.0</span>
    </div>
  </div>

  <script>
    // -----------------------------
    // Helpers
    // -----------------------------
    const pad2 = (n) => String(n).padStart(2,"0");
    const keyOf = (y,m,d) => `${y}-${pad2(m+1)}-${pad2(d)}`;

    function isSameDay(a, b){
      return a.getFullYear()===b.getFullYear() &&
        a.getMonth()===b.getMonth() &&
        a.getDate()===b.getDate();
    }

    // ISO Week Number (간단 구현)
    function getISOWeek(date){
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return { year: d.getUTCFullYear(), week: weekNo };
    }

    // localStorage wrapper
    const store = {
      get(k, fallback=null){
        try{
          const v = localStorage.getItem(k);
          return v ? JSON.parse(v) : fallback;
        }catch(e){
          return fallback;
        }
      },
      set(k, v){
        localStorage.setItem(k, JSON.stringify(v));
      }
    };

    // -----------------------------
    // Elements
    // -----------------------------
    const monthyearEl = document.getElementById("monthyear");
    const dowEl = document.getElementById("dow");
    const daysEl = document.getElementById("days");
    const pickedText = document.getElementById("pickedText");

    const todoPanel = document.getElementById("todoPanel");
    const todoTitle = document.getElementById("todoTitle");
    const closeTodoBtn = document.getElementById("closeTodo");

    const t1_done = document.getElementById("t1_done");
    const t2_done = document.getElementById("t2_done");
    const t3_done = document.getElementById("t3_done");
    const t1_text = document.getElementById("t1_text");
    const t2_text = document.getElementById("t2_text");
    const t3_text = document.getElementById("t3_text");

    const weekBadge = document.getElementById("weekBadge");
    const wk_workout = document.getElementById("wk_workout");
    const wk_reading = document.getElementById("wk_reading");
    const wk_budget  = document.getElementById("wk_budget");
    const resetWeekBtn = document.getElementById("resetWeek");
    const fillWeekBtn  = document.getElementById("fillWeek");

    // -----------------------------
    // Calendar state
    // -----------------------------
    const DOW = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const MONTHS = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

    const view = new Date();
    const realToday = new Date();
    let selectedKey = ""; // YYYY-MM-DD

    // -----------------------------
    // Routine (weekly) storage
    // -----------------------------
    function getWeekKey(){
      const w = getISOWeek(new Date());
      return `yohan_week_${w.year}_W${pad2(w.week)}`;
    }

    function loadWeeklyRoutine(){
      const w = getISOWeek(new Date());
      weekBadge.textContent = `WEEK ${pad2(w.week)}`;

      const wkKey = getWeekKey();
      const data = store.get(wkKey, { workout:false, reading:false, budget:false });

      wk_workout.checked = !!data.workout;
      wk_reading.checked = !!data.reading;
      wk_budget.checked  = !!data.budget;
    }

    function saveWeeklyRoutine(){
      const wkKey = getWeekKey();
      store.set(wkKey, {
        workout: wk_workout.checked,
        reading: wk_reading.checked,
        budget: wk_budget.checked
      });
    }

    wk_workout.addEventListener("change", saveWeeklyRoutine);
    wk_reading.addEventListener("change", saveWeeklyRoutine);
    wk_budget.addEventListener("change", saveWeeklyRoutine);

    resetWeekBtn.addEventListener("click", () => {
      wk_workout.checked = false;
      wk_reading.checked = false;
      wk_budget.checked  = false;
      saveWeeklyRoutine();
    });

    fillWeekBtn.addEventListener("click", () => {
      wk_workout.checked = true;
      wk_reading.checked = true;
      wk_budget.checked  = true;
      saveWeeklyRoutine();
    });

    // -----------------------------
    // Todo (per date) storage
    // -----------------------------
    function todoStorageKey(dateKey){
      return `yohan_todo_${dateKey}`;
    }

    function loadTodo(dateKey){
      const data = store.get(todoStorageKey(dateKey), {
        t1:{done:false,text:""},
        t2:{done:false,text:""},
        t3:{done:false,text:""}
      });

      t1_done.checked = !!data.t1.done;
      t2_done.checked = !!data.t2.done;
      t3_done.checked = !!data.t3.done;

      t1_text.value = data.t1.text || "";
      t2_text.value = data.t2.text || "";
      t3_text.value = data.t3.text || "";
    }

    function saveTodo(dateKey){
      store.set(todoStorageKey(dateKey), {
        t1:{ done: t1_done.checked, text: t1_text.value.trim() },
        t2:{ done: t2_done.checked, text: t2_text.value.trim() },
        t3:{ done: t3_done.checked, text: t3_text.value.trim() }
      });
    }

    function bindTodoAutosave(){
      const handler = () => {
        if(!selectedKey) return;
        saveTodo(selectedKey);
      };

      t1_done.addEventListener("change", handler);
      t2_done.addEventListener("change", handler);
      t3_done.addEventListener("change", handler);

      t1_text.addEventListener("input", handler);
      t2_text.addEventListener("input", handler);
      t3_text.addEventListener("input", handler);
    }

    function openTodoFor(dateKey){
      todoTitle.textContent = `TODAY TASKS / ${dateKey}`;
      todoPanel.style.display = "block";
      loadTodo(dateKey);
    }

    closeTodoBtn.addEventListener("click", () => {
      todoPanel.style.display = "none";
    });

    // -----------------------------
    // Render Calendar
    // -----------------------------
    function renderDOW(){
      dowEl.innerHTML = "";
      DOW.forEach(d => {
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = d;
        dowEl.appendChild(div);
      });
    }

    function renderCalendar(){
      const y = view.getFullYear();
      const m = view.getMonth();

      monthyearEl.textContent = `${y} ${MONTHS[m]}`;

      const firstDay = new Date(y, m, 1).getDay();
      const lastDate = new Date(y, m + 1, 0).getDate();

      daysEl.innerHTML = "";

      for(let i=0;i<firstDay;i++){
        const div = document.createElement("div");
        div.className = "cell empty";
        daysEl.appendChild(div);
      }

      for(let d=1; d<=lastDate; d++){
        const dateObj = new Date(y, m, d);
        const div = document.createElement("div");
        div.className = "cell";
        div.textContent = d;

        const dow = new Date(y, m, d).getDay();
        if(dow===0) div.classList.add("sun");
        if(dow===6) div.classList.add("sat");

        if(isSameDay(dateObj, realToday)){
          div.classList.add("today");
        }

        const k = keyOf(y,m,d);
        if(k === selectedKey){
          div.classList.add("selected");
        }

        div.addEventListener("click", () => {
          selectedKey = k;
          pickedText.textContent = k;
          renderCalendar();
          openTodoFor(k); // ✅ 날짜 클릭하면 아래 패널 열림
        });

        daysEl.appendChild(div);
      }
    }

    // -----------------------------
    // Buttons
    // -----------------------------
    document.getElementById("prev").addEventListener("click", () => {
      view.setMonth(view.getMonth() - 1);
      renderCalendar();
    });

    document.getElementById("next").addEventListener("click", () => {
      view.setMonth(view.getMonth() + 1);
      renderCalendar();
    });

    document.getElementById("todayBtn").addEventListener("click", () => {
      view.setFullYear(realToday.getFullYear());
      view.setMonth(realToday.getMonth());
      selectedKey = keyOf(realToday.getFullYear(), realToday.getMonth(), realToday.getDate());
      pickedText.textContent = selectedKey;
      renderCalendar();
      openTodoFor(selectedKey);
    });

    // -----------------------------
    // Init
    // -----------------------------
    renderDOW();
    renderCalendar();
    loadWeeklyRoutine();
    bindTodoAutosave();
  </script>
</body>
</html>
