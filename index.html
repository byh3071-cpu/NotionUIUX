<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>YOHAN OS / Pixel Calendar Embed</title>

  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#111;
      --muted:#9aa0a6;
      --line:#e8e8e8;
      --soft:#f7f7f7;
      --pink:#f09ab1;
      --pink2:#ffe2ea;
      --shadow:rgba(0,0,0,.06);

      --border:#1d1d1d;
      --radius:28px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#ffffff;
      font-family:'Silkscreen', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--ink);
      overflow:hidden;
    }

    /* ✅ iframe 100% 채우기 */
    .stage{
      width:100vw;
      height:100vh;
      padding:0;
      margin:0;
      background:#fff;
    }

    /* ✅ 카드 = 화면 꽉 채움 + 테두리 유지 */
    .card{
      width:100%;
      height:100%;
      background:#fff;
      border:3px solid var(--border);
      border-radius:var(--radius);
      box-shadow:none;
      padding:14px 14px 10px;
      position:relative;
      overflow:hidden;
    }

    /* top */
    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:260px;
    }
    .dots{
      display:flex;
      gap:7px;
      margin-top:2px;
    }
    .dot{
      width:18px; height:18px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
    }

    .title{ line-height:1.1; }
    .title .mini{
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }
    .title .big{
      font-size:26px;
      letter-spacing:2px;
      margin-top:2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .btn{
      border:3px solid var(--border);
      background:#fff;
      border-radius:18px;
      padding:10px 16px;
      font-size:14px;
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
    }
    .btn:active{ transform:translateY(1px); box-shadow:2px 3px 0 var(--shadow); }
    .btn.icon{ width:54px; padding:10px 0; display:flex; justify-content:center; }

    .divider{
      width:100%;
      border-top:3px dashed var(--line);
      margin:10px 0 12px;
    }

    /* ✅ 달력만 꽉 채우기 */
    .main{
      height: calc(100% - 112px);
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex:0 0 auto;
    }

    .picked{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 14px;
      display:flex;
      gap:10px;
      align-items:center;
      width:fit-content;
      background:#fff;
    }
    .picked .k{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }
    .picked .v{
      font-size:14px;
      letter-spacing:1px;
    }

    .mode{
      border:3px solid var(--border);
      border-radius:20px;
      padding:10px 16px;
      background:var(--pink2);
      box-shadow:3px 4px 0 var(--shadow);
      font-size:14px;
      letter-spacing:1px;
    }

    .calendar{
      flex:1;
      overflow:hidden;
      padding:4px 6px 6px;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
      padding:4px 8px 8px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:2px;
      text-align:center;
      flex:0 0 auto;
    }

    .grid{
      flex:1;
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      grid-auto-rows:1fr;
      gap:12px;
      padding:0 10px 6px;
      min-height:0;
    }

    .cell{
      position:relative;
      border:3px solid var(--line);
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      cursor:pointer;
      background:#fff;
      transition:transform .06s ease;
      user-select:none;
      min-height:42px;
    }
    .cell:hover{ transform:translateY(-1px); }

    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color:var(--border);
      background:var(--pink2);
    }
    .cell.selected{
      border-color:var(--border);
      background:var(--pink);
      color:#fff;
    }
    .cell.sun{ color:#b84a5a; }
    .cell.sat{ color:#3b66d6; }

    /* ✅ 할 일 존재 점 표시 */
    .cell.hasDot::after{
      content:"";
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--border);
      bottom:7px;
      left:50%;
      transform:translateX(-50%);
      opacity:.55;
    }
    .cell.selected.hasDot::after{
      background:#fff;
      opacity:.9;
    }

    /* foot */
    .foot{
      position:absolute;
      left:16px;
      right:16px;
      bottom:8px;
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:2px;
      pointer-events:none;
    }
    .foot .left{ flex:1; }
    .foot .right{ text-align:right; }

    /* ======================
       ✅ TASK MODAL (CENTER)
       ====================== */
    .dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.18);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease;
      z-index:10;
    }
    .dim.on{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(.98);
      width: min(760px, calc(100% - 36px));
      max-height: min(520px, calc(100% - 140px));
      background:#fff;
      border:3px solid var(--border);
      border-radius:24px;
      box-shadow:8px 10px 0 var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease, transform .14s ease;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      z-index:11;
    }

    .modal.open{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%, -50%) scale(1);
    }

    .modalHead{
      padding:12px 14px;
      border-bottom:3px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .modalHead .t{
      font-size:14px;
      letter-spacing:2px;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      min-width:0;
    }

    .modalBody{
      padding:12px 14px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }

    .taskRow{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
    }

    .chk{
      width:24px; height:24px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
    }
    .chk.on{
      background:var(--pink2);
      position:relative;
    }
    .chk.on::after{
      content:"✔";
      font-size:14px;
      line-height:1;
    }

    .taskRow input{
      flex:1;
      border:none;
      outline:none;
      font-size:13px;
      letter-spacing:1px;
      background:transparent;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-width:0;
    }

    .taskDel{
      border:3px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:6px 10px;
      cursor:pointer;
      box-shadow:2px 3px 0 var(--shadow);
      font-size:12px;
      user-select:none;
    }
    .taskDel:active{ transform:translateY(1px); box-shadow:1px 2px 0 var(--shadow); }

    .modalActions{
      display:flex;
      gap:10px;
      padding:12px 14px;
      border-top:3px solid var(--line);
    }
    .modalActions .btn{
      flex:1;
      padding:12px 10px;
    }

    /* ✅ 작은 화면: 세로 스크롤 허용 */
    @media (max-width: 980px){
      html, body{ overflow:auto; }
      .stage{ height:auto; }
      .card{
        height:auto;
        min-height:720px;
      }
      .main{ height:auto; }
      .foot{
        position:relative;
        left:auto; right:auto; bottom:auto;
        margin-top:10px;
      }
      .modal{ position:fixed; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="card" id="card">

      <!-- top -->
      <div class="topline">
        <div class="brand">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <div class="title">
            <div class="mini">YOHAN OS / DASHBOARD</div>
            <div class="big" id="monthLabel">----</div>
          </div>
        </div>

        <div class="controls">
          <button class="btn icon" id="prevBtn">◀</button>
          <button class="btn" id="todayBtn">TODAY</button>
          <button class="btn icon" id="nextBtn">▶</button>
        </div>
      </div>

      <div class="divider"></div>

      <!-- ✅ calendar only -->
      <div class="main">
        <div class="badge-row">
          <div class="picked">
            <div class="k">PICKED:</div>
            <div class="v" id="pickedLabel">NONE</div>
          </div>
          <div class="mode">MODE: YOHAN OS</div>
        </div>

        <div class="calendar">
          <div class="dow">
            <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
          </div>
          <div class="grid" id="grid"></div>
        </div>
      </div>

      <!-- ✅ modal -->
      <div class="dim" id="dim"></div>

      <div class="modal" id="taskModal">
        <div class="modalHead">
          <div class="t" id="tasksTitle">TODAY TASKS</div>
          <button class="btn" id="closeTasksBtn">CLOSE</button>
        </div>

        <div class="modalBody" id="taskList"></div>

        <div class="modalActions">
          <button class="btn" id="addTaskBtn">+ ADD TASK</button>
          <button class="btn" id="clearDoneBtn">CLEAR DONE</button>
        </div>
      </div>

      <div class="foot">
        <div class="left">NOTION EMBED SAFE</div>
        <div class="right">v4.0</div>
      </div>

    </div>
  </div>

  <script>
    (function(){
      const $ = (id) => document.getElementById(id);

      const monthLabel = $("monthLabel");
      const pickedLabel = $("pickedLabel");
      const grid = $("grid");

      const prevBtn = $("prevBtn");
      const nextBtn = $("nextBtn");
      const todayBtn = $("todayBtn");

      // tasks modal
      const dim = $("dim");
      const taskModal = $("taskModal");
      const tasksTitle = $("tasksTitle");
      const closeTasksBtn = $("closeTasksBtn");
      const taskList = $("taskList");
      const addTaskBtn = $("addTaskBtn");
      const clearDoneBtn = $("clearDoneBtn");

      const KEY = "yohan_os_calendar_tasks_v40";

      const months = [
        "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
        "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
      ];

      const pad2 = (n) => String(n).padStart(2,"0");
      const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

      function load(){
        try { return JSON.parse(localStorage.getItem(KEY)) || null; }
        catch(e){ return null; }
      }

      function save(){
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      const now = new Date();
      let state = load() || {
        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),
        picked: null,
        tasks: {} // {date: [{text:"",done:false}, ...]}
      };

      function ensureTasks(dateStr){
        if(!state.tasks[dateStr]){
          state.tasks[dateStr] = [
            { text:"", done:false },
            { text:"", done:false },
            { text:"", done:false }
          ];
        }
        return state.tasks[dateStr];
      }

      function hasAnyTaskContent(dateStr){
        const t = state.tasks[dateStr];
        return Array.isArray(t) && t.some(x => (x.text && x.text.trim()) || x.done);
      }

      /* =====================
         ✅ TASK MODAL
         ===================== */
      function openTasks(dateStr){
        state.picked = dateStr;
        pickedLabel.textContent = dateStr;
        save();

        tasksTitle.textContent = `TODAY TASKS / ${dateStr}`;
        dim.classList.add("on");
        taskModal.classList.add("open");

        buildTaskList(dateStr);
        render(); // 선택/점 반영
      }

      function closeTasks(){
        dim.classList.remove("on");
        taskModal.classList.remove("open");
      }

      function buildTaskList(dateStr){
        const list = ensureTasks(dateStr);
        taskList.innerHTML = "";

        list.forEach((item, idx)=>{
          const row = document.createElement("div");
          row.className = "taskRow";

          const chk = document.createElement("div");
          chk.className = "chk";
          if(item.done) chk.classList.add("on");
          chk.addEventListener("click", ()=>{
            item.done = !item.done;
            chk.classList.toggle("on", item.done);
            save();
            render();
          });

          const input = document.createElement("input");
          input.type = "text";
          input.value = item.text || "";
          input.placeholder = `TASK ${idx+1}`;
          input.addEventListener("input", ()=>{
            item.text = input.value;
            save();
            render();
          });

          const del = document.createElement("button");
          del.className = "taskDel";
          del.textContent = "X";
          del.title = "삭제";
          del.addEventListener("click", ()=>{
            list.splice(idx, 1);
            if(list.length === 0){
              list.push({text:"",done:false});
            }
            save();
            buildTaskList(dateStr);
            render();
          });

          row.appendChild(chk);
          row.appendChild(input);
          row.appendChild(del);

          taskList.appendChild(row);
        });
      }

      addTaskBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        list.push({text:"", done:false});
        save();
        buildTaskList(state.picked);
        render();
      });

      clearDoneBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        const filtered = list.filter(x => !x.done);
        state.tasks[state.picked] = filtered.length ? filtered : [{text:"",done:false}];
        save();
        buildTaskList(state.picked);
        render();
      });

      closeTasksBtn.addEventListener("click", closeTasks);
      dim.addEventListener("click", closeTasks);

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeTasks();
      });

      /* =====================
         ✅ Calendar Render
         ===================== */
      function render(){
        monthLabel.textContent = `${state.viewYear} ${months[state.viewMonth]}`;
        pickedLabel.textContent = state.picked ? state.picked : "NONE";

        const first = new Date(state.viewYear, state.viewMonth, 1);
        const firstDay = first.getDay();
        const lastDate = new Date(state.viewYear, state.viewMonth+1, 0).getDate();
        const todayStr = fmt(new Date());

        grid.innerHTML = "";

        for(let i=0;i<firstDay;i++){
          const e = document.createElement("div");
          e.className = "cell empty";
          grid.appendChild(e);
        }

        for(let d=1; d<=lastDate; d++){
          const dateObj = new Date(state.viewYear, state.viewMonth, d);
          const dateStr = fmt(dateObj);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = d;

          const dow = dateObj.getDay();
          if(dow === 0) cell.classList.add("sun");
          if(dow === 6) cell.classList.add("sat");

          if(dateStr === todayStr) cell.classList.add("today");
          if(state.picked === dateStr) cell.classList.add("selected");

          if(hasAnyTaskContent(dateStr)) cell.classList.add("hasDot");

          // ✅ 날짜 클릭 = 바로 tasks 팝업
          cell.addEventListener("click", ()=>{
            openTasks(dateStr);
          });

          grid.appendChild(cell);
        }
      }

      /* =====================
         ✅ Month Controls
         ===================== */
      prevBtn.addEventListener("click", ()=>{
        state.viewMonth--;
        if(state.viewMonth < 0){
          state.viewMonth = 11;
          state.viewYear--;
        }
        save();
        render();
      });

      nextBtn.addEventListener("click", ()=>{
        state.viewMonth++;
        if(state.viewMonth > 11){
          state.viewMonth = 0;
          state.viewYear++;
        }
        save();
        render();
      });

      todayBtn.addEventListener("click", ()=>{
        const t = new Date();
        state.viewYear = t.getFullYear();
        state.viewMonth = t.getMonth();
        const d = fmt(t);
        save();
        render();
        openTasks(d);
      });

      // init
      render();
    })();
  </script>
</body>
</html>
