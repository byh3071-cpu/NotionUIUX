<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yohan Pixel Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#ffffff;
      --border:#2b2b2b;
      --shadow:#e8e8e8;
      --pink:#ff8fb1;
      --pink2:#ffe3ec;
      --text:#444;
      --muted:#999;
    }

    *{ box-sizing:border-box; }
html, body{
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; /* ✅ 스크롤 제거 */
}

body{
  font-family:'Silkscreen', cursive;
  background:#fff;
  color:#444;
  display:flex;
  justify-content:center;
  align-items:center;
}

.wrap{
  width:100%;
  max-width:420px;
  border:2px solid #2b2b2b;
  box-shadow:4px 4px 0 #e8e8e8;
  border-radius:12px;
  padding:10px; /* ✅ 14px → 10px로 줄임 */
  background:#fff;
}

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .title{
      font-size:18px;
      letter-spacing:0.5px;
      user-select:none;
    }

    .btns{
      display:flex;
      gap:8px;
    }

    button{
      font-family:'Silkscreen', cursive;
      border:2px solid var(--border);
      background:#fff;
      padding:6px 10px;
      border-radius:10px;
      box-shadow:2px 2px 0 var(--shadow);
      cursor:pointer;
    }
    button:active{
      transform:translate(1px,1px);
      box-shadow:1px 1px 0 var(--shadow);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:6px;
    }

    .dow{
      font-size:11px;
      color:var(--muted);
      text-align:center;
      padding:6px 0;
      user-select:none;
    }

    .cell{
      height:36px;
      border:2px solid #eee;
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      cursor:pointer;
      user-select:none;
      transition:0.08s;
    }

    .cell:hover{
      background:var(--pink2);
      border-color:#ffd3e1;
    }

    .empty{
      border:2px solid transparent;
      cursor:default;
      background:transparent;
    }

    .today{
      background:var(--pink);
      color:#fff;
      border-color:var(--border);
      box-shadow:2px 2px 0 rgba(0,0,0,0.12);
    }

    .hint{
      display:none;
      margin-top:10px;
      font-size:10px;
      color:var(--muted);
      user-select:none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title" id="title">2026 JANUARY</div>
      <div class="btns">
        <button id="prev">◀</button>
        <button id="todayBtn">TODAY</button>
        <button id="next">▶</button>
      </div>
    </div>

    <div class="grid" id="dow"></div>
    <div class="grid" id="days"></div>

    <div class="hint">* Notion embed friendly / Pixel UI</div>
  </div>

  <script>
    const titleEl = document.getElementById("title");
    const dowEl = document.getElementById("dow");
    const daysEl = document.getElementById("days");

    const DOW = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const MONTHS = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE","JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];

    const view = new Date(); // 현재 보고있는 달
    const realToday = new Date();

    function renderDOW(){
      dowEl.innerHTML = "";
      DOW.forEach(d => {
        const div = document.createElement("div");
        div.className = "dow";
        div.textContent = d;
        dowEl.appendChild(div);
      });
    }

    function isSameDay(a, b){
      return a.getFullYear()===b.getFullYear() &&
             a.getMonth()===b.getMonth() &&
             a.getDate()===b.getDate();
    }

    function render(){
      titleEl.textContent = `${view.getFullYear()} ${MONTHS[view.getMonth()]}`;

      const year = view.getFullYear();
      const month = view.getMonth();

      const firstDay = new Date(year, month, 1).getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      daysEl.innerHTML = "";

      // 빈칸
      for(let i=0;i<firstDay;i++){
        const div = document.createElement("div");
        div.className = "cell empty";
        daysEl.appendChild(div);
      }

      for(let d=1; d<=lastDate; d++){
        const dateObj = new Date(year, month, d);
        const div = document.createElement("div");
        div.className = "cell";
        div.textContent = d;

        if(isSameDay(dateObj, realToday)) div.classList.add("today");

        // 클릭 확장(나중에 노션 연동/투두 팝업 붙이기 좋음)
        div.addEventListener("click", () => {
          alert(`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
        });

        daysEl.appendChild(div);
      }
    }

    document.getElementById("prev").addEventListener("click", () => {
      view.setMonth(view.getMonth()-1);
      render();
    });
    document.getElementById("next").addEventListener("click", () => {
      view.setMonth(view.getMonth()+1);
      render();
    });
    document.getElementById("todayBtn").addEventListener("click", () => {
      view.setFullYear(realToday.getFullYear());
      view.setMonth(realToday.getMonth());
      render();
    });

    renderDOW();
    render();
  </script>
</body>
</html>
