<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>YOHAN OS / Pixel Calendar Embed</title>

  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#111;
      --muted:#9aa0a6;
      --line:#e7e7e7;
      --pink:#f09ab1;
      --pink2:#ffe2ea;
      --shadow:rgba(0,0,0,.06);
    }

    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      font-family:'Silkscreen', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--ink);
      overflow:hidden;
    }

    /* =========================================
       ✅ 노션 임베드 "자동 스케일링" 핵심 구조
       - stage는 고정 디자인 사이즈
       - viewport에 맞춰 JS가 scale 조정
       ========================================= */
    #viewport{
      width:100vw;
      height:100vh;
      overflow:hidden;
      position:relative;
      background:var(--bg);
    }
    #stage{
      position:absolute;
      left:0; top:0;
      transform-origin: top left;
      will-change: transform;
    }

    /* ✅ 고정 디자인 원본 크기 (여기 기준으로 스케일됨) */
    .card{
      width: 1020px;
      height: 680px;

      background:#fff;
      border:3px solid #1d1d1d;
      border-radius:28px;
      box-shadow:8px 10px 0 var(--shadow);
      padding:12px 12px 10px;
      position:relative;
      overflow:hidden;
    }

    /* top */
    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:260px;
    }
    .dots{
      display:flex;
      gap:7px;
      margin-top:2px;
    }
    .dot{
      width:18px; height:18px;
      border:3px solid #1d1d1d;
      border-radius:7px;
      background:#fff;
    }
    .title{ line-height:1.1; }
    .title .mini{
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }
    .title .big{
      font-size:24px;
      letter-spacing:2px;
      margin-top:2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .btn{
      border:3px solid #1d1d1d;
      background:#fff;
      border-radius:18px;
      padding:9px 14px;
      font-size:14px;
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
    }
    .btn:active{
      transform:translateY(1px);
      box-shadow:2px 3px 0 var(--shadow);
    }
    .btn.icon{
      width:52px;
      padding:9px 0;
      display:flex;
      justify-content:center;
    }

    .divider{
      width:100%;
      border-top:3px dashed var(--line);
      margin:8px 0 10px;
    }

    .main{
      display:grid;
      grid-template-columns: 1fr 320px;
      gap:10px;
      align-items:start;
      height: calc(100% - 104px);
      overflow:hidden;
    }

    /* left */
    .leftcol{
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
    }
    .picked{
      border:3px solid var(--line);
      border-radius:18px;
      padding:8px 12px;
      display:flex;
      gap:10px;
      align-items:center;
      width:fit-content;
      background:#fff;
    }
    .picked .k{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }
    .picked .v{
      font-size:14px;
      letter-spacing:1px;
    }

    .mode{
      border:3px solid #1d1d1d;
      border-radius:20px;
      padding:8px 14px;
      background:var(--pink2);
      box-shadow:3px 4px 0 var(--shadow);
      font-size:14px;
      letter-spacing:1px;
      white-space:nowrap;
    }

    .calendar{
      padding:6px 4px 4px;
      flex:1;
      overflow:hidden;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
      padding:6px 8px 8px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:2px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
      padding:0 8px 8px;
    }

    /* ✅ 날짜칸 */
    .cell{
      height:50px;
      border:3px solid var(--line);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:15px;
      cursor:pointer;
      background:#fff;
      transition:transform .06s ease;
      user-select:none;
      position:relative; /* ✅ 점 표시용 */
    }
    .cell:hover{ transform:translateY(-1px); }

    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color:#1d1d1d;
      background:var(--pink2);
    }
    .cell.selected{
      border-color:#1d1d1d;
      background:var(--pink);
      color:#fff;
    }
    .cell.weekend{ color:#7b7b7b; }
    .cell.sun{ color:#b84a5a; }
    .cell.sat{ color:#3b66d6; }

    /* ✅ 할 일 존재하면 작은 점 표시 */
    .cell.hasDot::after{
      content:"";
      position:absolute;
      bottom:6px;
      left:50%;
      transform:translateX(-50%);
      width:7px;
      height:7px;
      border-radius:50%;
      background:#111;
      opacity:.35;
    }
    /* 선택된 날짜는 점이 더 잘 보이게 */
    .cell.selected.hasDot::after{
      opacity:.6;
      background:#fff;
    }

    /* right */
    .side{
      border:3px solid var(--line);
      border-radius:24px;
      padding:12px;
      background:#fff;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .side-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:6px;
    }
    .side-head .h{
      font-size:15px;
      letter-spacing:2px;
    }
    .weekchip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:7px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
      background:#fff;
    }

    .routine{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .rbox{
      border:3px solid var(--line);
      border-radius:20px;
      padding:12px;
      display:flex;
      gap:12px;
      align-items:center;
      background:#fff;
    }

    .chk{
      width:24px; height:24px;
      border:3px solid #1d1d1d;
      border-radius:7px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
      user-select:none;
    }
    .chk.on{
      background:var(--pink2);
      position:relative;
    }
    .chk.on::after{
      content:"✔";
      font-size:14px;
      line-height:1;
    }

    .rtext .rt{
      font-size:14px;
      letter-spacing:2px;
    }
    .rtext .rd{
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      letter-spacing:1px;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .side-actions{
      display:flex;
      gap:10px;
      margin-top:2px;
    }
    .side-actions .btn{
      flex:1;
      padding:11px 10px;
    }

    /* ✅ 오늘의 루틴 박스(선택 날짜 있을 때만 표시) */
    .todayBox{
      border:3px solid #1d1d1d;
      border-radius:24px;
      padding:12px;
      background:#fff;
      display:none;
    }
    .todayBox.show{ display:block; }

    .todayHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .todayHead .t{
      font-size:14px;
      letter-spacing:2px;
    }
    .todayDate{
      border:3px solid var(--line);
      border-radius:16px;
      padding:6px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }

    /* footer */
    .foot{
      position:absolute;
      left:12px;
      right:12px;
      bottom:8px;
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:2px;
      pointer-events:none;
    }
    .foot .left{ flex:1; }
    .foot .right{ text-align:right; }

    /* =========================
       ✅ TODAY TASKS 중앙 모달
       ========================= */
    .dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.14);
      opacity:0;
      pointer-events:none;
      transition:opacity .15s ease;
      z-index:4;
    }
    .dim.on{
      opacity:1;
      pointer-events:auto;
    }

    .tasks-modal{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.98);
      width:900px;
      max-height:420px;
      background:#fff;
      border:3px solid #1d1d1d;
      border-radius:24px;
      box-shadow:10px 12px 0 var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:opacity .16s ease, transform .16s ease;
      overflow:hidden;
      z-index:5;
    }
    .tasks-modal.open{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .tasks-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px;
      border-bottom:3px solid var(--line);
    }

    .tasks-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }

    .tasks-head .t{
      font-size:14px;
      letter-spacing:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:420px;
    }

    /* ✅ TASK 추가/삭제 버튼 */
    .miniBtns{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .miniBtn{
      border:3px solid #1d1d1d;
      background:#fff;
      border-radius:14px;
      padding:7px 10px;
      font-size:12px;
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
      white-space:nowrap;
    }
    .miniBtn:active{
      transform:translateY(1px);
      box-shadow:2px 3px 0 var(--shadow);
    }

    .tasks-body{
      padding:12px;
      overflow:auto;
      max-height:340px;
    }

    .tasklist{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .task{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      background:#fff;
    }

    .task input[type="text"]{
      width:100%;
      border:none;
      outline:none;
      font-size:13px;
      letter-spacing:1px;
      background:transparent;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
  </style>
</head>

<body>
  <div id="viewport">
    <div id="stage">
      <div class="card">

        <div class="topline">
          <div class="brand">
            <div class="dots">
              <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            </div>
            <div class="title">
              <div class="mini">YOHAN OS / DASHBOARD</div>
              <div class="big" id="monthLabel">----</div>
            </div>
          </div>

          <div class="controls">
            <button class="btn icon" id="prevBtn">◀</button>
            <button class="btn" id="todayBtn">TODAY</button>
            <button class="btn icon" id="nextBtn">▶</button>
          </div>
        </div>

        <div class="divider"></div>

        <div class="main">
          <!-- left -->
          <div class="leftcol">
            <div class="badge-row">
              <div class="picked">
                <div class="k">PICKED:</div>
                <div class="v" id="pickedLabel">NONE</div>
              </div>
              <div class="mode">MODE: YOHAN OS</div>
            </div>

            <div class="calendar">
              <div class="dow">
                <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
              </div>
              <div class="grid" id="grid"></div>
            </div>
          </div>

          <!-- right -->
          <div class="side">
            <div>
              <div class="side-head">
                <div class="h">THIS WEEK ROUTINE</div>
                <div class="weekchip" id="weekChip">WEEK --</div>
              </div>

              <div class="routine">
                <div class="rbox">
                  <div class="chk" id="r_workout"></div>
                  <div class="rtext">
                    <div class="rt">WORKOUT</div>
                    <div class="rd">운동 1회 이상</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" id="r_reading"></div>
                  <div class="rtext">
                    <div class="rt">READING</div>
                    <div class="rd">독서 10P 이상</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" id="r_budget"></div>
                  <div class="rtext">
                    <div class="rt">BUDGET</div>
                    <div class="rd">가계부 기록</div>
                  </div>
                </div>
              </div>

              <div class="side-actions">
                <button class="btn" id="resetRoutineBtn">RESET</button>
                <button class="btn" id="allRoutineBtn">ALL</button>
              </div>
            </div>

            <!-- ✅ 선택한 날짜일 때만 보이는 "오늘의 루틴(5개)" -->
            <div class="todayBox" id="todayBox">
              <div class="todayHead">
                <div class="t">TODAY ROUTINE</div>
                <div class="todayDate" id="todayDateChip">----</div>
              </div>

              <div class="routine">
                <div class="rbox">
                  <div class="chk" data-today="gratitude"></div>
                  <div class="rtext">
                    <div class="rt">GRATITUDE</div>
                    <div class="rd">감사 일기</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-today="emotion"></div>
                  <div class="rtext">
                    <div class="rt">EMOTION</div>
                    <div class="rd">감정 일기</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-today="sleep"></div>
                  <div class="rtext">
                    <div class="rt">SLEEP</div>
                    <div class="rd">하루 수면 분석</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-today="morning"></div>
                  <div class="rtext">
                    <div class="rt">MORNING</div>
                    <div class="rd">아침 루티너리</div>
                  </div>
                </div>

                <div class="rbox">
                  <div class="chk" data-today="future"></div>
                  <div class="rtext">
                    <div class="rt">FUTURE</div>
                    <div class="rd">미래 모습 실천 기록</div>
                  </div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- dim + modal -->
        <div class="dim" id="dim"></div>

        <div class="tasks-modal" id="tasksPanel">
          <div class="tasks-head">
            <div class="tasks-left">
              <div class="t" id="tasksTitle">TODAY TASKS</div>

              <!-- ✅ 사용자가 직접 TASK 입력칸을 늘리고 줄일 수 있게 -->
              <div class="miniBtns">
                <button class="miniBtn" id="addTaskBtn">+ TASK</button>
                <button class="miniBtn" id="removeTaskBtn">- TASK</button>
              </div>
            </div>

            <button class="btn" id="closeTasksBtn">CLOSE</button>
          </div>

          <div class="tasks-body">
            <div class="tasklist" id="taskList"></div>
          </div>
        </div>

        <div class="foot">
          <div class="left">NOTION EMBED SAFE</div>
          <div class="right">v2.8</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    (function(){
      /* ================================
         ✅ 1) 자동 스케일링 (노션 임베드 꽉 차게)
         ================================ */
      const BASE_W = 1020;
      const BASE_H = 680;

      const viewport = document.getElementById("viewport");
      const stage = document.getElementById("stage");

      function fitStage(){
        const vw = viewport.clientWidth;
        const vh = viewport.clientHeight;

        // 꽉 차게 하되, 비율 유지
        const scale = Math.min(vw / BASE_W, vh / BASE_H);

        // 가운데 정렬 (남는 공간 중앙)
        const x = (vw - BASE_W * scale) / 2;
        const y = (vh - BASE_H * scale) / 2;

        stage.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
      }

      window.addEventListener("resize", fitStage);
      fitStage();


      /* ================================
         ✅ 2) 앱 로직
         ================================ */
      const $ = (id) => document.getElementById(id);

      const monthLabel = $("monthLabel");
      const pickedLabel = $("pickedLabel");
      const grid = $("grid");

      const prevBtn = $("prevBtn");
      const nextBtn = $("nextBtn");
      const todayBtn = $("todayBtn");

      const tasksPanel = $("tasksPanel");
      const tasksTitle = $("tasksTitle");
      const closeTasksBtn = $("closeTasksBtn");
      const dim = $("dim");

      const addTaskBtn = $("addTaskBtn");
      const removeTaskBtn = $("removeTaskBtn");
      const taskListEl = $("taskList");

      const rWorkout = $("r_workout");
      const rReading = $("r_reading");
      const rBudget = $("r_budget");
      const resetRoutineBtn = $("resetRoutineBtn");
      const allRoutineBtn = $("allRoutineBtn");
      const weekChip = $("weekChip");

      const todayBox = $("todayBox");
      const todayDateChip = $("todayDateChip");

      const KEY = "yohan_os_calendar_v28";

      const months = [
        "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
        "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
      ];

      const pad2 = (n) => String(n).padStart(2,"0");
      const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

      function getWeekNumber(date){
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      }

      function load(){
        try{ return JSON.parse(localStorage.getItem(KEY)) || null; }
        catch(e){ return null; }
      }

      function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }

      const now = new Date();

      let state = load() || {
        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),
        picked: null,

        // ✅ 날짜별 TASK: 배열 길이가 유동 (사용자가 직접 늘림)
        tasks: {
          // "YYYY-MM-DD": { text:[], done:[] }
        },

        // 주간 루틴(공통)
        routine: { workout:false, reading:false, budget:false },

        // ✅ 날짜별 오늘의 루틴 5개
        todayRoutine: {
          // "YYYY-MM-DD": { gratitude:false, emotion:false, sleep:false, morning:false, future:false }
        }
      };

      /* ====== UI helpers ====== */
      function setRoutineUI(){
        rWorkout.classList.toggle("on", !!state.routine.workout);
        rReading.classList.toggle("on", !!state.routine.reading);
        rBudget.classList.toggle("on", !!state.routine.budget);
      }

      function setWeekChip(){
        const ref = state.picked ? new Date(state.picked) : new Date(state.viewYear, state.viewMonth, 1);
        const w = getWeekNumber(ref);
        weekChip.textContent = `WEEK ${pad2(w)}`;
      }

      function ensureTask(dateStr){
        if(!state.tasks[dateStr]){
          // 기본 3칸
          state.tasks[dateStr] = { text:["","",""], done:[false,false,false] };
        }
        // 안정성: 길이 맞추기
        if(!Array.isArray(state.tasks[dateStr].text)) state.tasks[dateStr].text = ["","",""];
        if(!Array.isArray(state.tasks[dateStr].done)) state.tasks[dateStr].done = state.tasks[dateStr].text.map(()=>false);

        // text/done 길이 동기화
        while(state.tasks[dateStr].done.length < state.tasks[dateStr].text.length) state.tasks[dateStr].done.push(false);
        while(state.tasks[dateStr].done.length > state.tasks[dateStr].text.length) state.tasks[dateStr].done.pop();

        return state.tasks[dateStr];
      }

      function ensureTodayRoutine(dateStr){
        if(!state.todayRoutine[dateStr]){
          state.todayRoutine[dateStr] = {
            gratitude:false, emotion:false, sleep:false, morning:false, future:false
          };
        }
        return state.todayRoutine[dateStr];
      }

      function hasAnyTask(dateStr){
        const t = state.tasks[dateStr];
        if(!t) return false;
        const anyText = (t.text || []).some(v => String(v || "").trim().length > 0);
        const anyDone = (t.done || []).some(Boolean);
        return anyText || anyDone;
      }

      /* ====== Calendar render ====== */
      function render(){
        monthLabel.textContent = `${state.viewYear} ${months[state.viewMonth]}`;
        pickedLabel.textContent = state.picked ? state.picked : "NONE";
        setWeekChip();

        const first = new Date(state.viewYear, state.viewMonth, 1);
        const firstDay = first.getDay();
        const lastDate = new Date(state.viewYear, state.viewMonth+1, 0).getDate();

        const todayStr = fmt(new Date());
        grid.innerHTML = "";

        for(let i=0;i<firstDay;i++){
          const e = document.createElement("div");
          e.className = "cell empty";
          grid.appendChild(e);
        }

        for(let d=1; d<=lastDate; d++){
          const dateObj = new Date(state.viewYear, state.viewMonth, d);
          const dateStr = fmt(dateObj);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = d;

          const dow = dateObj.getDay();
          if(dow === 0) cell.classList.add("sun");
          if(dow === 6) cell.classList.add("sat");
          if(dow === 0 || dow === 6) cell.classList.add("weekend");

          if(dateStr === todayStr) cell.classList.add("today");
          if(state.picked === dateStr) cell.classList.add("selected");

          // ✅ 할 일 점 표시
          if(hasAnyTask(dateStr)) cell.classList.add("hasDot");

          cell.addEventListener("click", ()=>{
            state.picked = dateStr;
            save();
            render();
            openTasks(dateStr);
            showTodayRoutine(dateStr);
          });

          grid.appendChild(cell);
        }

        // 선택 날짜 없으면 todayRoutine 숨김
        if(!state.picked){
          todayBox.classList.remove("show");
        }else{
          showTodayRoutine(state.picked);
        }
      }

      /* ====== Today Routine Panel (Right) ====== */
      function showTodayRoutine(dateStr){
        if(!dateStr){
          todayBox.classList.remove("show");
          return;
        }
        todayBox.classList.add("show");
        todayDateChip.textContent = dateStr;

        const r = ensureTodayRoutine(dateStr);

        // 체크 상태 반영
        todayBox.querySelectorAll(".chk[data-today]").forEach(chk=>{
          const key = chk.getAttribute("data-today");
          chk.classList.toggle("on", !!r[key]);
        });
      }

      todayBox.addEventListener("click", (e)=>{
        const chk = e.target.closest(".chk[data-today]");
        if(!chk) return;
        if(!state.picked) return;

        const key = chk.getAttribute("data-today");
        const r = ensureTodayRoutine(state.picked);
        r[key] = !r[key];
        chk.classList.toggle("on", r[key]);
        save();
      });

      /* ====== TASK Modal ====== */
      function openTasks(dateStr){
        const t = ensureTask(dateStr);
        tasksTitle.textContent = `TODAY TASKS / ${dateStr}`;

        tasksPanel.classList.add("open");
        dim.classList.add("on");

        renderTaskList(dateStr);
      }

      function closeTasks(){
        tasksPanel.classList.remove("open");
        dim.classList.remove("on");
      }

      function renderTaskList(dateStr){
        const t = ensureTask(dateStr);
        taskListEl.innerHTML = "";

        t.text.forEach((val, idx)=>{
          const row = document.createElement("div");
          row.className = "task";

          const chk = document.createElement("div");
          chk.className = "chk";
          chk.setAttribute("data-taskcheck", String(idx));
          if(t.done[idx]) chk.classList.add("on");

          const input = document.createElement("input");
          input.type = "text";
          input.value = val || "";
          input.placeholder = `TASK ${idx+1}`;

          input.addEventListener("input", ()=>{
            const tt = ensureTask(dateStr);
            tt.text[idx] = input.value;
            save();
            render(); // ✅ 점 표시 즉시 갱신
          });

          chk.addEventListener("click", ()=>{
            const tt = ensureTask(dateStr);
            tt.done[idx] = !tt.done[idx];
            chk.classList.toggle("on", tt.done[idx]);
            save();
            render(); // ✅ 점 표시 즉시 갱신
          });

          row.appendChild(chk);
          row.appendChild(input);
          taskListEl.appendChild(row);
        });
      }

      // ✅ +TASK 버튼: 사용자가 직접 입력칸 늘림
      addTaskBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const t = ensureTask(state.picked);
        t.text.push("");
        t.done.push(false);
        save();
        renderTaskList(state.picked);
      });

      // ✅ -TASK 버튼: 마지막 칸 삭제 (최소 1칸은 유지)
      removeTaskBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const t = ensureTask(state.picked);
        if(t.text.length <= 1) return; // 최소 1개는 남김
        t.text.pop();
        t.done.pop();
        save();
        renderTaskList(state.picked);
        render();
      });

      /* ====== Month Controls ====== */
      prevBtn.addEventListener("click", ()=>{
        state.viewMonth--;
        if(state.viewMonth < 0){ state.viewMonth = 11; state.viewYear--; }
        save(); render();
      });

      nextBtn.addEventListener("click", ()=>{
        state.viewMonth++;
        if(state.viewMonth > 11){ state.viewMonth = 0; state.viewYear++; }
        save(); render();
      });

      todayBtn.addEventListener("click", ()=>{
        const t = new Date();
        state.viewYear = t.getFullYear();
        state.viewMonth = t.getMonth();
        state.picked = fmt(t);
        save();
        render();
        openTasks(state.picked);
        showTodayRoutine(state.picked);
      });

      closeTasksBtn.addEventListener("click", closeTasks);
      dim.addEventListener("click", closeTasks);

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeTasks();
      });

      /* ====== Weekly Routine Toggles ====== */
      rWorkout.addEventListener("click", ()=>{ state.routine.workout = !state.routine.workout; setRoutineUI(); save(); });
      rReading.addEventListener("click", ()=>{ state.routine.reading = !state.routine.reading; setRoutineUI(); save(); });
      rBudget.addEventListener("click", ()=>{ state.routine.budget = !state.routine.budget; setRoutineUI(); save(); });

      resetRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=false;
        state.routine.reading=false;
        state.routine.budget=false;
        setRoutineUI(); save();
      });

      allRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=true;
        state.routine.reading=true;
        state.routine.budget=true;
        setRoutineUI(); save();
      });

      /* init */
      setRoutineUI();
      render();
      fitStage();
    })();
  </script>
</body>
</html>
