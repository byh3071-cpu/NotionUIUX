<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Calendar (Tasks Only)</title>

  <!-- 픽셀 느낌 폰트(원하면 삭제 가능) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0b0c10;
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;
      --accent:#7cc7ff;
      --today:#ffe08a;
      --danger:#ff6b6b;

      --w: 360px;     /* ✅ 초기 크기 유지 */
      --h: 440px;
      --cell: 46px;   /* 7열 * 46px = 322px + 갭/패딩 */
      --gap: 4px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      background:transparent;
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    }

    /* ✅ 노션 임베드에서 중앙정렬 필요 없으면 제거 가능 */
    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;              /* ✅ 사각형 */
      overflow:hidden;
      position:relative;
    }

    /* 상단 바 */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;              /* ✅ 여백 최소화 */
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
    }

    .leftBtns, .rightBtns{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .btn{
      height:32px;
      padding:0 10px;
      background:#0e1016;
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;              /* ✅ 사각형 */
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }

    .monthTitle{
      flex:1;
      text-align:center;
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* 요일 */
    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      padding:8px 8px 6px;
      border-bottom:2px solid var(--line2);
      background:#0e1016;
    }
    .dow div{
      text-align:center;
      font-size:9px;
      color:var(--muted);
      padding:6px 0;
      border:2px solid var(--line);
      border-radius:0;              /* ✅ 사각형 */
      background:#0b0c10;
    }

    /* 달력 그리드 */
    .grid{
      padding:8px;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      background:var(--panel);
    }

    .day{
      height: var(--cell);
      border:2px solid var(--line);
      border-radius:0;              /* ✅ 사각형 */
      background:#0b0c10;
      position:relative;
      cursor:pointer;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:6px;
      user-select:none;
      transition: border-color .12s ease;
      overflow:hidden;
    }
    .day:hover{
      border-color:var(--accent);
    }

    .day.disabled{
      opacity:.35;
      cursor:default;
    }

    .num{
      font-size:10px;
      color:var(--text);
    }

    .badge{
      position:absolute;
      bottom:6px;
      left:6px;
      right:6px;
      height:12px;
      display:flex;
      gap:4px;
      align-items:center;
      justify-content:flex-start;
      overflow:hidden;
    }

    .dot{
      width:6px; height:6px;
      border:2px solid var(--accent);
      background:transparent;
      border-radius:0;              /* ✅ 픽셀 느낌 */
      flex: 0 0 auto;
    }

    .today{
      border-color: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(255,224,138,.25);
    }

    /* ✅ 모달 */
    .modalBack{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:10px;
    }
    .modalBack.show{ display:flex; }

    .modal{
      width: 100%;
      max-width: 340px;
      height: 320px;
      background: #0e1016;
      border: 2px solid var(--line2);
      border-radius:0;              /* ✅ 사각형 */
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .modalHeader{
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:2px solid var(--line2);
      background:#0b0c10;
      gap:8px;
    }
    .modalTitle{
      font-size:10px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .closeBtn{
      width:32px;
      height:32px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      border-radius:0;              /* ✅ 사각형 */
      cursor:pointer;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .closeBtn:hover{ border-color:var(--danger); }

    .modalBody{
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:100%;
      min-height:0;
    }

    .addRow{
      display:flex;
      gap:6px;
    }
    .taskInput{
      flex:1;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      outline:none;
      padding:0 8px;
      font-size:10px;
    }
    .taskInput::placeholder{ color:#7b8497; }

    .addBtn{
      width:70px;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
    }
    .addBtn:hover{ border-color:var(--accent); }

    /* ✅ 스크롤 가능한 리스트 */
    .taskList{
      border:2px solid var(--line2);
      background:#0b0c10;
      border-radius:0;
      padding:6px;
      overflow:auto;
      flex:1;
      min-height:0;
    }

    .taskItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px;
      border:2px solid var(--line);
      border-radius:0;
      margin-bottom:6px;
      background:#0e1016;
    }
    .taskText{
      font-size:10px;
      color:var(--text);
      line-height:1.25;
      word-break:break-word;
      flex:1;
    }
    .taskActions{
      display:flex;
      gap:6px;
      flex:0 0 auto;
    }
    .iconBtn{
      width:30px;
      height:28px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
    }
    .iconBtn:hover{ border-color:var(--accent); }
    .iconBtn.delete:hover{ border-color:var(--danger); }

    /* 노션 임베드에서 텍스트 너무 커지면 폰트만 바꿔도 해결됨 */
    .help{
      font-size:9px;
      color:var(--muted);
      opacity:.9;
      line-height:1.4;
    }

    /* 스크롤바(선택) */
    .taskList::-webkit-scrollbar{ width:10px; }
    .taskList::-webkit-scrollbar-thumb{
      background:#1c2230;
      border:2px solid var(--line2);
    }
    .taskList::-webkit-scrollbar-track{ background:#0b0c10; }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="topbar">
      <div class="leftBtns">
        <button class="btn" id="prevBtn">◀</button>
        <button class="btn" id="nextBtn">▶</button>
      </div>

      <div class="monthTitle" id="monthTitle">2026-01</div>

      <div class="rightBtns">
        <button class="btn" id="todayBtn">TODAY</button>
      </div>
    </div>

    <div class="dow">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
    </div>

    <div class="grid" id="grid"></div>

    <!-- ✅ Task Modal -->
    <div class="modalBack" id="modalBack" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true">
        <div class="modalHeader">
          <div class="modalTitle" id="modalTitle">TASK</div>
          <button class="closeBtn" id="closeBtn">X</button>
        </div>

        <div class="modalBody">
          <div class="addRow">
            <input class="taskInput" id="taskInput" placeholder="할 일 입력" maxlength="60" />
            <button class="addBtn" id="addBtn">추가</button>
          </div>

          <div class="taskList" id="taskList"></div>

          <div class="help">날짜 클릭 → TASK만 뜸 / 저장은 자동(LocalStorage)</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /**
     * ✅ Notion Embed Pixel Calendar (Tasks Only)
     * - 날짜별 task 저장: localStorage
     * - 클릭 시 task 모달만
     */

    const $ = (sel) => document.querySelector(sel);

    const gridEl = $("#grid");
    const monthTitleEl = $("#monthTitle");

    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const todayBtn = $("#todayBtn");

    const modalBack = $("#modalBack");
    const closeBtn = $("#closeBtn");
    const modalTitle = $("#modalTitle");

    const taskInput = $("#taskInput");
    const addBtn = $("#addBtn");
    const taskList = $("#taskList");

    // ✅ 상태
    const state = {
      viewDate: new Date(),       // 현재 보고 있는 달
      selectedISO: null           // 선택한 날짜 (YYYY-MM-DD)
    };

    const pad2 = (n) => String(n).padStart(2, "0");
    const toISO = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;

    const isSameDay = (a, b) =>
      a.getFullYear() === b.getFullYear() &&
      a.getMonth() === b.getMonth() &&
      a.getDate() === b.getDate();

    // ✅ 로컬 저장 구조
    // key: "pixel_calendar_tasks_v1"
    // value: { "YYYY-MM-DD": ["task1","task2"] }
    const STORE_KEY = "pixel_calendar_tasks_v1";

    function loadAll(){
      try{
        return JSON.parse(localStorage.getItem(STORE_KEY)) || {};
      }catch(e){
        return {};
      }
    }
    function saveAll(obj){
      localStorage.setItem(STORE_KEY, JSON.stringify(obj));
    }

    function getTasks(iso){
      const all = loadAll();
      return Array.isArray(all[iso]) ? all[iso] : [];
    }
    function setTasks(iso, list){
      const all = loadAll();
      all[iso] = list;
      saveAll(all);
    }

    // ✅ 렌더
    function render(){
      gridEl.innerHTML = "";

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth(); // 0~11

      monthTitleEl.textContent = `${y}-${pad2(m+1)}`;

      // 1일 요일
      const first = new Date(y, m, 1);
      const firstDow = first.getDay();

      // 해당 달 마지막 날짜
      const last = new Date(y, m+1, 0);
      const lastDay = last.getDate();

      // 전달 마지막 날짜
      const prevLast = new Date(y, m, 0).getDate();

      // 총 6주(42칸) 고정 렌더 (크기 유지 안정)
      const totalCells = 42;

      for(let i=0; i<totalCells; i++){
        const cell = document.createElement("div");
        cell.className = "day";

        // 날짜 계산
        const dayNum = i - firstDow + 1;

        let cellDate;
        let disabled = false;
        let displayNum;

        if(dayNum < 1){
          // 전달
          displayNum = prevLast + dayNum;
          cellDate = new Date(y, m-1, displayNum);
          disabled = true;
        }else if(dayNum > lastDay){
          // 다음달
          displayNum = dayNum - lastDay;
          cellDate = new Date(y, m+1, displayNum);
          disabled = true;
        }else{
          // 이번달
          displayNum = dayNum;
          cellDate = new Date(y, m, displayNum);
        }

        const iso = toISO(cellDate.getFullYear(), cellDate.getMonth()+1, cellDate.getDate());

        if(disabled){
          cell.classList.add("disabled");
        }

        // Today 강조
        const now = new Date();
        if(isSameDay(cellDate, now) && !disabled){
          cell.classList.add("today");
        }

        // 숫자
        const num = document.createElement("div");
        num.className = "num";
        num.textContent = displayNum;
        cell.appendChild(num);

        // task dot 표시(최대 6개)
        const tasks = getTasks(iso);
        if(tasks.length > 0){
          const badge = document.createElement("div");
          badge.className = "badge";
          const dots = Math.min(tasks.length, 6);
          for(let d=0; d<dots; d++){
            const dot = document.createElement("div");
            dot.className = "dot";
            badge.appendChild(dot);
          }
          cell.appendChild(badge);
        }

        // ✅ 클릭: TASK 팝업만
        cell.addEventListener("click", () => {
          if(disabled) return; // 전달/다음달 클릭 비활성
          openModal(iso);
        });

        gridEl.appendChild(cell);
      }
    }

    // ✅ 모달
    function openModal(iso){
      state.selectedISO = iso;
      modalTitle.textContent = `TASK · ${iso}`;
      taskInput.value = "";
      renderTaskList();

      modalBack.classList.add("show");
      modalBack.setAttribute("aria-hidden", "false");

      // 입력 포커스
      setTimeout(() => taskInput.focus(), 0);
    }

    function closeModal(){
      modalBack.classList.remove("show");
      modalBack.setAttribute("aria-hidden", "true");
      state.selectedISO = null;
    }

    function renderTaskList(){
      const iso = state.selectedISO;
      if(!iso) return;

      const tasks = getTasks(iso);
      taskList.innerHTML = "";

      if(tasks.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "등록된 TASK 없음";
        taskList.appendChild(empty);
        return;
      }

      tasks.forEach((t, idx) => {
        const item = document.createElement("div");
        item.className = "taskItem";

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = t;

        const actions = document.createElement("div");
        actions.className = "taskActions";

        // 수정
        const edit = document.createElement("button");
        edit.className = "iconBtn";
        edit.textContent = "✎";
        edit.title = "수정";
        edit.addEventListener("click", () => {
          const next = prompt("TASK 수정", t);
          if(next === null) return;
          const trimmed = next.trim();
          if(!trimmed) return;

          const list = getTasks(iso);
          list[idx] = trimmed;
          setTasks(iso, list);
          renderTaskList();
          render(); // dot 갱신
        });

        // 삭제
        const del = document.createElement("button");
        del.className = "iconBtn delete";
        del.textContent = "⌫";
        del.title = "삭제";
        del.addEventListener("click", () => {
          const list = getTasks(iso);
          list.splice(idx, 1);
          setTasks(iso, list);
          renderTaskList();
          render(); // dot 갱신
        });

        actions.appendChild(edit);
        actions.appendChild(del);

        item.appendChild(text);
        item.appendChild(actions);
        taskList.appendChild(item);
      });
    }

    function addTask(){
      const iso = state.selectedISO;
      if(!iso) return;

      const val = taskInput.value.trim();
      if(!val) return;

      const list = getTasks(iso);
      list.unshift(val); // 최신이 위로
      setTasks(iso, list);

      taskInput.value = "";
      renderTaskList();
      render(); // dot 갱신
    }

    // ✅ 이벤트
    prevBtn.addEventListener("click", () => {
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() - 1);
      state.viewDate = d;
      render();
    });

    nextBtn.addEventListener("click", () => {
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() + 1);
      state.viewDate = d;
      render();
    });

    todayBtn.addEventListener("click", () => {
      state.viewDate = new Date();
      render();
    });

    closeBtn.addEventListener("click", closeModal);

    // 모달 바깥 클릭 닫기
    modalBack.addEventListener("click", (e) => {
      if(e.target === modalBack) closeModal();
    });

    // 엔터로 추가
    taskInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") addTask();
      if(e.key === "Escape") closeModal();
    });

    addBtn.addEventListener("click", addTask);

    // ✅ 최초 렌더
    render();
  </script>
</body>
</html>
