<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>YOHAN OS / Pixel Calendar Embed</title>

  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#111;
      --muted:#9aa0a6;
      --line:#e8e8e8;
      --soft:#f7f7f7;
      --pink:#f09ab1;
      --pink2:#ffe2ea;
      --shadow:rgba(0,0,0,.06);

      --border:#1d1d1d;
      --radius:28px;
    }

    *{ box-sizing:border-box; }

    html, body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#ffffff;
      font-family:'Silkscreen', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--ink);
      overflow:hidden;
    }

    /* ✅ iframe 100% */
    .stage{
      width:100vw;
      height:100vh;
      padding:0;
      margin:0;
      background:#fff;
    }

    /* ✅ 카드 = 화면 꽉 채움 + 테두리 유지 */
    .card{
      width:100%;
      height:100%;
      background:#fff;
      border:3px solid var(--border);
      border-radius:var(--radius);
      box-shadow:none;
      padding:12px 12px 10px;   /* ✅ 전체 크기 살짝 축소 */
      position:relative;
      overflow:hidden;
    }

    /* top */
    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:8px;        /* ✅ 조금 줄임 */
    }
    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:260px;
    }
    .dots{
      display:flex;
      gap:7px;
      margin-top:2px;
    }
    .dot{
      width:18px; height:18px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
    }

    .title{ line-height:1.1; }
    .title .mini{
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }
    .title .big{
      font-size:24px;           /* ✅ 26 → 24 : 전체 밸런스 다운 */
      letter-spacing:2px;
      margin-top:2px;
      /* ✅ 축소될 때 글씨 흐림 방지용 살짝 보정 */
      text-shadow: 0 1px 0 rgba(0,0,0,0.08);
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .btn{
      border:3px solid var(--border);
      background:#fff;
      border-radius:18px;
      padding:9px 14px;         /* ✅ 살짝 축소 */
      font-size:13px;           /* ✅ 14 → 13 */
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
    }
    .btn:active{ transform:translateY(1px); box-shadow:2px 3px 0 var(--shadow); }
    .btn.icon{ width:52px; padding:9px 0; display:flex; justify-content:center; }

    .divider{
      width:100%;
      border-top:3px dashed var(--line);
      margin:8px 0 10px;        /* ✅ 줄임 */
    }

    /* ✅ 메인 영역 “진짜 꽉 차게” */
    .main{
      display:grid;
      grid-template-columns: 1fr 310px; /* ✅ 320 → 310 : 오른쪽 살짝 컴팩트 */
      gap:12px;
      align-items:start;
      height: calc(100% - 104px); /* ✅ top+divider 높이 재계산 */
      min-height:0;
    }

    /* left */
    .leftcol{
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:8px;                 /* ✅ 10 → 8 */
      padding-right:2px;
      min-height:0;
    }

    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
    }

    .picked{
      border:3px solid var(--line);
      border-radius:18px;
      padding:9px 12px;        /* ✅ 축소 */
      display:flex;
      gap:10px;
      align-items:center;
      width:fit-content;
      background:#fff;
      flex:0 0 auto;
    }
    .picked .k{
      color:var(--muted);
      font-size:11px;          /* ✅ 12 → 11 */
      letter-spacing:1px;
    }
    .picked .v{
      font-size:13px;          /* ✅ 14 → 13 */
      letter-spacing:1px;
    }

    .mode{
      border:3px solid var(--border);
      border-radius:20px;
      padding:9px 14px;        /* ✅ 축소 */
      background:var(--pink2);
      box-shadow:3px 4px 0 var(--shadow);
      font-size:13px;          /* ✅ 14 → 13 */
      letter-spacing:1px;
    }

    .calendar{
      flex:1;
      overflow:hidden;
      padding:2px 4px 4px;     /* ✅ 조금 줄임 */
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:8px;
      padding:4px 8px 6px;
      color:var(--muted);
      font-size:10px;          /* ✅ 11 → 10 */
      letter-spacing:2px;
      text-align:center;
      flex:0 0 auto;
    }

    .grid{
      flex:1;
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      grid-auto-rows:1fr;
      gap:10px;                /* ✅ 12 → 10 : 달력 셀 “덩치” 축소 */
      padding:0 8px 4px;       /* ✅ 줄임 */
      min-height:0;
    }

    .cell{
      position:relative;
      border:3px solid var(--line);
      border-radius:14px;      /* ✅ 15 → 14 */
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:14px;          /* ✅ 15 → 14 */
      cursor:pointer;
      background:#fff;
      transition:transform .06s ease;
      user-select:none;
      min-height:40px;         /* ✅ 42 → 40 */
    }
    .cell:hover{ transform:translateY(-1px); }
    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color:var(--border);
      background:var(--pink2);
    }
    .cell.selected{
      border-color:var(--border);
      background:var(--pink);
      color:#fff;
    }
    .cell.sun{ color:#b84a5a; }
    .cell.sat{ color:#3b66d6; }

    .cell.hasDot::after{
      content:"";
      position:absolute;
      width:7px;
      height:7px;
      border-radius:50%;
      background:var(--border);
      bottom:6px;              /* ✅ 살짝 위로 */
      left:50%;
      transform:translateX(-50%);
      opacity:.55;
    }
    .cell.selected.hasDot::after{
      background:#fff;
      opacity:.9;
    }

    /* right */
    .side{
      border:3px solid var(--line);
      border-radius:24px;
      padding:12px;            /* ✅ 14 → 12 */
      background:#fff;
      height:100%;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      gap:10px;                /* ✅ 12 → 10 */
      min-height:0;
    }

    .side-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
      min-width:0;
    }
    .side-head .h{
      font-size:15px;          /* ✅ 16 → 15 */
      letter-spacing:2px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.08);
    }
    .weekchip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:7px 9px;         /* ✅ 축소 */
      color:var(--muted);
      font-size:11px;          /* ✅ 12 → 11 */
      letter-spacing:1px;
      background:#fff;
      flex:0 0 auto;
    }

    .routine{
      display:flex;
      flex-direction:column;
      gap:9px;                 /* ✅ 살짝 줄임 */
      flex:0 0 auto;
    }

    .rbox{
      border:3px solid var(--line);
      border-radius:18px;
      padding:11px;            /* ✅ 12 → 11 */
      display:flex;
      gap:12px;
      align-items:center;
      background:#fff;
      min-width:0;
    }

    .chk{
      width:24px; height:24px;
      border:3px solid var(--border);
      border-radius:7px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
    }
    .chk.on{
      background:var(--pink2);
      position:relative;
    }
    .chk.on::after{
      content:"✔";
      font-size:14px;
      line-height:1;
    }

    .rtext{
      min-width:0;
    }
    .rtext .rt{
      font-size:12px;          /* ✅ 13 → 12 */
      letter-spacing:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .rtext .rd{
      margin-top:5px;
      font-size:10px;
      color:var(--muted);
      letter-spacing:1px;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .side-actions{
      display:flex;
      gap:10px;
      flex:0 0 auto;
    }
    .side-actions .btn{
      flex:1;
      padding:10px 10px;
      font-size:13px;
    }

    /* ✅ TODAY ROUTINE */
    .todayPanel{
      border:3px solid var(--border);
      border-radius:22px;
      padding:12px;
      background:#fff;
      overflow:hidden;

      flex:1;
      min-height:0;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .todayPanelHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex:0 0 auto;
      min-width:0; /* ✅ 날짜칩 잘림 방지 핵심 */
    }

    .todayPanelHead .t{
      font-size:13px;          /* ✅ 14 → 13 */
      letter-spacing:2px;
      text-shadow: 0 1px 0 rgba(0,0,0,0.08);
      flex:0 0 auto;
    }

    /* ✅ 날짜칩: "가려짐" 완전 방지 세팅 */
    .todayChip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:6px 9px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:1px;
      background:#fff;

      flex:1 1 auto;           /* ✅ 핵심: 남는 공간만큼 확장/축소 */
      min-width:0;             /* ✅ ellipsis 적용 */
      max-width:140px;         /* ✅ 너무 커지지 않게 */
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      text-align:right;
    }

    .todayList{
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:9px;
      padding-right:2px;
      min-height:0;
    }

    /* foot */
    .foot{
      position:absolute;
      left:14px;
      right:14px;
      bottom:6px;             /* ✅ 하단 여백 더 줄임 */
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:10px;         /* ✅ 11 → 10 */
      letter-spacing:2px;
      pointer-events:none;
    }
    .foot .left{ flex:1; }
    .foot .right{ text-align:right; }

    /* dim + modal */
    .dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.18);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease;
      z-index:10;
    }
    .dim.on{
      opacity:1;
      pointer-events:auto;
    }

    .modal{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%, -50%) scale(.98);
      width: min(740px, calc(100% - 34px));
      max-height: min(520px, calc(100% - 140px));
      background:#fff;
      border:3px solid var(--border);
      border-radius:24px;
      box-shadow:8px 10px 0 var(--shadow);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease, transform .14s ease;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      z-index:11;
    }

    .modal.open{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%, -50%) scale(1);
    }

    .modalHead{
      padding:12px 14px;
      border-bottom:3px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .modalHead .t{
      font-size:14px;
      letter-spacing:2px;
    }

    .modalBody{
      padding:12px 14px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
    }

    .taskRow{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
    }

    .taskRow input{
      flex:1;
      border:none;
      outline:none;
      font-size:13px;
      letter-spacing:1px;
      background:transparent;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      min-width:0;
    }

    .taskDel{
      border:3px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:6px 10px;
      cursor:pointer;
      box-shadow:2px 3px 0 var(--shadow);
      font-size:12px;
      user-select:none;
    }
    .taskDel:active{ transform:translateY(1px); box-shadow:1px 2px 0 var(--shadow); }

    .modalActions{
      display:flex;
      gap:10px;
      padding:12px 14px;
      border-top:3px solid var(--line);
    }
    .modalActions .btn{
      flex:1;
      padding:12px 10px;
    }

    /* ✅ 작은 화면 대응 */
    @media (max-width: 980px){
      html, body{ overflow:auto; }
      .stage{ height:auto; }
      .card{
        height:auto;
        min-height:720px;
      }
      .main{
        grid-template-columns:1fr;
        height:auto;
      }
      .side{ height:auto; }
      .foot{ position:relative; left:auto; right:auto; bottom:auto; margin-top:10px; }
      .modal{ position:fixed; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="card" id="card">

      <!-- top -->
      <div class="topline">
        <div class="brand">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <div class="title">
            <div class="mini">YOHAN OS / DASHBOARD</div>
            <div class="big" id="monthLabel">----</div>
          </div>
        </div>

        <div class="controls">
          <button class="btn icon" id="prevBtn">◀</button>
          <button class="btn" id="todayBtn">TODAY</button>
          <button class="btn icon" id="nextBtn">▶</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="main">
        <!-- left -->
        <div class="leftcol">
          <div class="badge-row">
            <div class="picked">
              <div class="k">PICKED:</div>
              <div class="v" id="pickedLabel">NONE</div>
            </div>
            <div class="mode">MODE: YOHAN OS</div>
          </div>

          <div class="calendar">
            <div class="dow">
              <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
            </div>
            <div class="grid" id="grid"></div>
          </div>
        </div>

        <!-- right -->
        <div class="side">
          <div class="side-head">
            <div class="h">THIS WEEK ROUTINE</div>
            <div class="weekchip" id="weekChip">WEEK --</div>
          </div>

          <!-- weekly routine -->
          <div class="routine">
            <div class="rbox">
              <div class="chk" id="r_workout"></div>
              <div class="rtext">
                <div class="rt">WORKOUT</div>
                <div class="rd">운동 1회 이상</div>
              </div>
            </div>

            <div class="rbox">
              <div class="chk" id="r_reading"></div>
              <div class="rtext">
                <div class="rt">READING</div>
                <div class="rd">독서 10P 이상</div>
              </div>
            </div>

            <div class="rbox">
              <div class="chk" id="r_budget"></div>
              <div class="rtext">
                <div class="rt">BUDGET</div>
                <div class="rd">가계부 기록</div>
              </div>
            </div>
          </div>

          <div class="side-actions">
            <button class="btn" id="resetRoutineBtn">RESET</button>
            <button class="btn" id="allRoutineBtn">ALL</button>
          </div>

          <!-- today routine -->
          <div class="todayPanel" id="todayPanel">
            <div class="todayPanelHead">
              <div class="t">TODAY ROUTINE</div>
              <div class="todayChip" id="todayChip">NO DATE</div>
            </div>

            <div class="todayList" id="todayList">
              <div class="rbox">
                <div class="chk" data-daily="gratitude"></div>
                <div class="rtext">
                  <div class="rt">GRATITUDE</div>
                  <div class="rd">감사 일기</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" data-daily="emotion"></div>
                <div class="rtext">
                  <div class="rt">EMOTION</div>
                  <div class="rd">감정 일기</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" data-daily="sleep"></div>
                <div class="rtext">
                  <div class="rt">SLEEP</div>
                  <div class="rd">하루 수면 분석</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" data-daily="morning"></div>
                <div class="rtext">
                  <div class="rt">MORNING</div>
                  <div class="rd">아침 루티너리</div>
                </div>
              </div>

              <div class="rbox">
                <div class="chk" data-daily="future"></div>
                <div class="rtext">
                  <div class="rt">FUTURE</div>
                  <div class="rd">미래 모습 실천 기록</div>
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- modal -->
      <div class="dim" id="dim"></div>

      <div class="modal" id="taskModal">
        <div class="modalHead">
          <div class="t" id="tasksTitle">TODAY TASKS</div>
          <button class="btn" id="closeTasksBtn">CLOSE</button>
        </div>

        <div class="modalBody" id="taskList"></div>

        <div class="modalActions">
          <button class="btn" id="addTaskBtn">+ ADD TASK</button>
          <button class="btn" id="clearDoneBtn">CLEAR DONE</button>
        </div>
      </div>

      <div class="foot">
        <div class="left">NOTION EMBED SAFE</div>
        <div class="right">v3.2</div>
      </div>

    </div>
  </div>

  <script>
    (function(){
      const $ = (id) => document.getElementById(id);

      const monthLabel = $("monthLabel");
      const pickedLabel = $("pickedLabel");
      const grid = $("grid");

      const prevBtn = $("prevBtn");
      const nextBtn = $("nextBtn");
      const todayBtn = $("todayBtn");

      const weekChip = $("weekChip");

      const rWorkout = $("r_workout");
      const rReading = $("r_reading");
      const rBudget = $("r_budget");
      const resetRoutineBtn = $("resetRoutineBtn");
      const allRoutineBtn = $("allRoutineBtn");

      const todayChip = $("todayChip");
      const todayList = $("todayList");

      const dim = $("dim");
      const taskModal = $("taskModal");
      const tasksTitle = $("tasksTitle");
      const closeTasksBtn = $("closeTasksBtn");
      const taskList = $("taskList");
      const addTaskBtn = $("addTaskBtn");
      const clearDoneBtn = $("clearDoneBtn");

      const KEY = "yohan_os_calendar_v32";

      const months = [
        "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
        "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
      ];

      const pad2 = (n) => String(n).padStart(2,"0");
      const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

      function getWeekNumber(date){
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      }

      function load(){
        try { return JSON.parse(localStorage.getItem(KEY)) || null; }
        catch(e){ return null; }
      }

      function save(){
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      const now = new Date();
      let state = load() || {
        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),
        picked: null,
        tasks: {},
        routine: { workout:false, reading:false, budget:false },
        daily: {}
      };

      function ensureDaily(dateStr){
        if(!state.daily[dateStr]){
          state.daily[dateStr] = {
            gratitude:false,
            emotion:false,
            sleep:false,
            morning:false,
            future:false
          };
        }
        return state.daily[dateStr];
      }

      function ensureTasks(dateStr){
        if(!state.tasks[dateStr]){
          state.tasks[dateStr] = [
            { text:"", done:false },
            { text:"", done:false },
            { text:"", done:false }
          ];
        }
        return state.tasks[dateStr];
      }

      function hasAnyContent(dateStr){
        const t = state.tasks[dateStr];
        const d = state.daily[dateStr];
        const hasTask = Array.isArray(t) && t.some(x => (x.text && x.text.trim()) || x.done);
        const hasDaily = d && Object.values(d).some(Boolean);
        return hasTask || hasDaily;
      }

      function setRoutineUI(){
        rWorkout.classList.toggle("on", !!state.routine.workout);
        rReading.classList.toggle("on", !!state.routine.reading);
        rBudget.classList.toggle("on", !!state.routine.budget);
      }

      function setWeekChip(){
        const ref = state.picked ? new Date(state.picked) : new Date(state.viewYear, state.viewMonth, 1);
        const w = getWeekNumber(ref);
        weekChip.textContent = `WEEK ${pad2(w)}`;
      }

      function renderTodayRoutine(){
        if(!state.picked){
          todayChip.textContent = "NO DATE";
          [...todayList.querySelectorAll('.chk[data-daily]')].forEach(chk=>{
            chk.classList.remove("on");
          });
          return;
        }

        todayChip.textContent = state.picked;
        const d = ensureDaily(state.picked);

        [...todayList.querySelectorAll('.chk[data-daily]')].forEach(chk=>{
          const key = chk.getAttribute("data-daily");
          chk.classList.toggle("on", !!d[key]);
        });
      }

      todayList.addEventListener("click", (e)=>{
        const chk = e.target.closest('.chk[data-daily]');
        if(!chk) return;
        if(!state.picked) return;

        const key = chk.getAttribute("data-daily");
        const d = ensureDaily(state.picked);
        d[key] = !d[key];
        chk.classList.toggle("on", d[key]);
        save();
        render();
      });

      function openTasks(dateStr){
        state.picked = dateStr;
        pickedLabel.textContent = dateStr;
        save();

        tasksTitle.textContent = `TODAY TASKS / ${dateStr}`;
        dim.classList.add("on");
        taskModal.classList.add("open");

        buildTaskList(dateStr);
        renderTodayRoutine();
        render();
      }

      function closeTasks(){
        dim.classList.remove("on");
        taskModal.classList.remove("open");
      }

      function buildTaskList(dateStr){
        const list = ensureTasks(dateStr);
        taskList.innerHTML = "";

        list.forEach((item, idx)=>{
          const row = document.createElement("div");
          row.className = "taskRow";

          const chk = document.createElement("div");
          chk.className = "chk";
          if(item.done) chk.classList.add("on");
          chk.addEventListener("click", ()=>{
            item.done = !item.done;
            chk.classList.toggle("on", item.done);
            save();
            render();
          });

          const input = document.createElement("input");
          input.type = "text";
          input.value = item.text || "";
          input.placeholder = `TASK ${idx+1}`;
          input.addEventListener("input", ()=>{
            item.text = input.value;
            save();
            render();
          });

          const del = document.createElement("button");
          del.className = "taskDel";
          del.textContent = "X";
          del.title = "삭제";
          del.addEventListener("click", ()=>{
            list.splice(idx, 1);
            if(list.length === 0){
              list.push({text:"",done:false});
            }
            save();
            buildTaskList(dateStr);
            render();
          });

          row.appendChild(chk);
          row.appendChild(input);
          row.appendChild(del);

          taskList.appendChild(row);
        });
      }

      addTaskBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        list.push({text:"", done:false});
        save();
        buildTaskList(state.picked);
        render();
      });

      clearDoneBtn.addEventListener("click", ()=>{
        if(!state.picked) return;
        const list = ensureTasks(state.picked);
        const filtered = list.filter(x => !x.done);
        state.tasks[state.picked] = filtered.length ? filtered : [{text:"",done:false}];
        save();
        buildTaskList(state.picked);
        render();
      });

      closeTasksBtn.addEventListener("click", closeTasks);
      dim.addEventListener("click", closeTasks);

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeTasks();
      });

      function render(){
        monthLabel.textContent = `${state.viewYear} ${months[state.viewMonth]}`;
        pickedLabel.textContent = state.picked ? state.picked : "NONE";
        setWeekChip();

        const first = new Date(state.viewYear, state.viewMonth, 1);
        const firstDay = first.getDay();
        const lastDate = new Date(state.viewYear, state.viewMonth+1, 0).getDate();
        const todayStr = fmt(new Date());

        grid.innerHTML = "";

        for(let i=0;i<firstDay;i++){
          const e = document.createElement("div");
          e.className = "cell empty";
          grid.appendChild(e);
        }

        for(let d=1; d<=lastDate; d++){
          const dateObj = new Date(state.viewYear, state.viewMonth, d);
          const dateStr = fmt(dateObj);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = d;

          const dow = dateObj.getDay();
          if(dow === 0) cell.classList.add("sun");
          if(dow === 6) cell.classList.add("sat");

          if(dateStr === todayStr) cell.classList.add("today");
          if(state.picked === dateStr) cell.classList.add("selected");

          if(hasAnyContent(dateStr)) cell.classList.add("hasDot");

          cell.addEventListener("click", ()=>{
            openTasks(dateStr);
          });

          grid.appendChild(cell);
        }

        renderTodayRoutine();
      }

      prevBtn.addEventListener("click", ()=>{
        state.viewMonth--;
        if(state.viewMonth < 0){
          state.viewMonth = 11;
          state.viewYear--;
        }
        save();
        render();
      });

      nextBtn.addEventListener("click", ()=>{
        state.viewMonth++;
        if(state.viewMonth > 11){
          state.viewMonth = 0;
          state.viewYear++;
        }
        save();
        render();
      });

      todayBtn.addEventListener("click", ()=>{
        const t = new Date();
        state.viewYear = t.getFullYear();
        state.viewMonth = t.getMonth();
        const d = fmt(t);
        save();
        render();
        openTasks(d);
      });

      rWorkout.addEventListener("click", ()=>{ state.routine.workout = !state.routine.workout; setRoutineUI(); save(); });
      rReading.addEventListener("click", ()=>{ state.routine.reading = !state.routine.reading; setRoutineUI(); save(); });
      rBudget.addEventListener("click", ()=>{ state.routine.budget = !state.routine.budget; setRoutineUI(); save(); });

      resetRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=false;
        state.routine.reading=false;
        state.routine.budget=false;
        setRoutineUI(); save();
      });

      allRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=true;
        state.routine.reading=true;
        state.routine.budget=true;
        setRoutineUI(); save();
      });

      setRoutineUI();
      render();
    })();
  </script>
</body>
</html>
