<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock</title>

  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;
      --accent:#7cc7ff;

      --baseW: 360;
      --baseH: 156;
      --scale: 1;

      --stageBg: transparent; /* 투명 유지 */
    }

    *{ box-sizing:border-box; }
    html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background: var(--panel);         /* ✅ 흰 여백 제거 */
    color:var(--text);
    font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow:hidden;                  /* ✅ 바깥 스크롤 방지 */
    }
    
    /* ✅ iframe 남는 영역도 패널로 채우고 싶으면 body를 flex로 */
    body{
    display:flex;
    align-items:flex-start;           /* top 고정(원하면 center로) */
    justify-content:flex-start;       /* left 고정(원하면 center로) */
    }
    
    .stage{
    width:100%;
    height:100%;
    background: var(--panel);
    display:flex;
    align-items:flex-start;   /* top 유지면 그대로 */
    justify-content:center;   /* 가운데로 */
    overflow:hidden;
    padding: 8px;             /* 테두리 잘림 방지 */
    }

    .wrap{
      width: calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      zoom: var(--scale);

      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;

      pointer-events:auto; /* ✅ 여기부터 클릭 받기 */
      position:relative;
    }

    @supports not (zoom: 1){
      .wrap{ transform: scale(var(--scale)); transform-origin: top left; }
    }

    .top{
      height:36px;
      display:flex;
      align-items:center;
      padding:6px 8px;
      padding-right:26px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:8px;

      pointer-events:auto; /* ✅ 재강제 */
    }

    .title{
      font-size:9px;
      color:var(--muted);
      letter-spacing:0.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
      pointer-events:none;
      flex:1;
    }

    /* ✅ div 대신 button: 노션에서 안정적 */
    .chip{
      height:24px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      line-height:1;

      pointer-events:auto !important;  /* ✅ 강제 */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;

      outline:none;
      appearance:none;
      -webkit-appearance:none;
    }
    .chip:hover{ border-color:var(--accent); }
    .chip.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.12);
      color:var(--accent);
    }

    .main{
      flex:1;
      display:flex;
      align-items:stretch;
      justify-content:space-between;
      padding:10px;
      gap:10px;
      min-height:0;
      pointer-events:auto;
    }

    .leftBox{
      flex:1;
      border:2px solid var(--line);
      background:#0b0c10;
      padding:12px;
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      overflow:hidden;
    }
    .dateRow{
      font-size:9px;
      color:var(--muted);
      line-height:1.45;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:8px;
    }
    .timeRow{ display:flex; align-items:center; gap:10px; white-space:nowrap; overflow:hidden; }
    .time{ font-size:18px; letter-spacing:1px; line-height:1.45; padding:2px 0 6px; }
    .cursor{ font-size:14px; color:var(--accent); line-height:1.45; padding:2px 0 6px; user-select:none; pointer-events:none; }
    .note{ margin-top:10px; font-size:8px; color:rgba(233,238,247,.75); line-height:1.45; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .rightBox{
      width:112px;
      border:2px solid var(--line);
      background:#0b0c10;
      padding:8px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
      overflow:hidden;
    }
    .meterLabel{ font-size:8px; color:var(--muted); line-height:1; user-select:none; }
    .meter{ height:10px; border:2px solid var(--line2); background:#0e1016; position:relative; overflow:hidden; }
    .bar{ position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--accent); }
    .meterText{ font-size:8px; color:rgba(233,238,247,.75); line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-height:10px; }

    @media (max-width: 340px){ .rightBox{ display:none; } }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap">
      <div class="top">
        <button class="chip on" id="modeBtn" type="button">24H</button>
        <button class="chip" id="openTodayBtn" type="button">OPEN</button>
        <div class="title">PIXEL CLOCK</div>
      </div>

      <div class="main">
        <div class="leftBox">
          <div class="dateRow" id="dateText">0000-00-00 (월) · TODAY 0/0</div>
          <div class="timeRow">
            <div class="time" id="timeText">00:00</div>
            <div class="cursor" id="cursor">■</div>
          </div>
          <div class="note" id="noteText">오늘 할 일: 0 / 0</div>
        </div>

        <div class="rightBox">
          <div class="meterLabel">DAY</div>
          <div class="meter"><div class="bar" id="dayBar"></div></div>

          <div class="meterLabel">TODAY TASK</div>
          <div class="meter"><div class="bar" id="taskBar"></div></div>
          <div class="meterText" id="taskPctText">0/0 · 0%</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    const dateText  = $("#dateText");
    const timeText  = $("#timeText");
    const cursorEl  = $("#cursor");
    const noteText  = $("#noteText");
    const dayBar    = $("#dayBar");
    const taskBar   = $("#taskBar");
    const taskPctText = $("#taskPctText");
    const modeBtn   = $("#modeBtn");
    const openTodayBtn = $("#openTodayBtn");

    const state = { is24h: true };
    const DOW_KR = ["일","월","화","수","목","금","토"];

    const STORE_KEYS = [
      "pixel_calendar_tasks_v6",
      "pixel_calendar_tasks_v5_backup_hideDone",
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview",
    ];

    const pad2 = (n) => String(n).padStart(2,"0");
    const toISO = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const safeParse = (json) => { try { return JSON.parse(json); } catch(e){ return null; } };

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object") return { text: String(x.text ?? ""), done: Boolean(x.done) };
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function loadAllFromAnyKey(){
      for(const k of STORE_KEYS){
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const parsed = safeParse(raw);
        if(parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      }
      return {};
    }

    function getTodayProgress(iso){
      const data = loadAllFromAnyKey();
      const list = normalizeList(data[iso]);
      const total = list.length;
      const done = list.filter(t => t.done).length;
      return { done, total };
    }

    function formatTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      if(!state.is24h){
        const ampm = h < 12 ? "AM" : "PM";
        h = h % 12; if(h === 0) h = 12;
        return `${pad2(h)}:${pad2(m)} ${ampm}`;
      }
      return `${pad2(h)}:${pad2(m)}`;
    }

    function calcDayProgress(d){
      const total = 24*60*60;
      const now = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      return Math.max(0, Math.min(1, now/total));
    }

    function fitToFrame(){
      const baseW = 360, baseH = 156;
      const vw = (window.visualViewport?.width) ?? window.innerWidth;
      const vh = (window.visualViewport?.height) ?? window.innerHeight;
      const availW = Math.max(1, vw - 24);
      const availH = Math.max(1, vh - 24);
      let scale = Math.min(availW / baseW, availH / baseH);
      if(!isFinite(scale) || scale <= 0) scale = 1;
      scale = Math.min(3, Math.max(0.55, scale));
      scale = Math.floor(scale * 100) / 100;
      document.documentElement.style.setProperty("--scale", String(scale));
    }

    function tick(){
      const d = new Date();
      const iso = toISO(d);

      const y = d.getFullYear();
      const mo = d.getMonth() + 1;
      const da = d.getDate();
      const dow = DOW_KR[d.getDay()];

      const { done, total } = getTodayProgress(iso);

      dateText.textContent = `${y}-${pad2(mo)}-${pad2(da)} (${dow}) · TODAY ${done}/${total}`;
      timeText.textContent = formatTime(d);
      cursorEl.style.opacity = (d.getSeconds() % 2 === 0) ? "1" : "0.15";

      dayBar.style.width = `${Math.round(calcDayProgress(d) * 100)}%`;

      const pct = total === 0 ? 0 : Math.round((done / total) * 100);
      taskBar.style.width = `${pct}%`;
      taskPctText.textContent = `${done}/${total} · ${pct}%`;

      noteText.textContent = `오늘 할 일: ${done} / ${total}`;
    }

    function stopAll(e){
      e.preventDefault();
      e.stopPropagation();
      if(e.stopImmediatePropagation) e.stopImmediatePropagation();
    }

    function toggleMode(){
      state.is24h = !state.is24h;
      modeBtn.textContent = state.is24h ? "24H" : "12H";
      modeBtn.classList.toggle("on", state.is24h);
      tick();
    }

    // ✅ 같은 폴더 calendar.html로 "현재 자리 이동" (팝업 사용 안함)
    function buildCalendarUrl(iso){
      const base = new URL(".", window.location.href);
      const cal = new URL("calendar.html", base);
      cal.searchParams.set("date", iso);
      cal.searchParams.set("open", "1");
      cal.searchParams.set("from", "clock");
      cal.searchParams.set("v", String(Date.now())); // 캐시 탈출
      return cal.toString();
    }

    function openToday(){
      // ✅ 클릭이 먹었는지 시각 확인
      const original = openTodayBtn.textContent;
      openTodayBtn.textContent = "...";

      const iso = toISO(new Date());
      const url = buildCalendarUrl(iso);

      // ✅ 무조건 같은 자리 이동
      window.location.href = url;

      // 이동이 막힐 경우 대비(아예 아무 반응 없을 때 복구)
      setTimeout(()=>{ openTodayBtn.textContent = original; }, 800);
    }

    function bindHard(el, fn){
      ["pointerdown","mousedown","touchstart","click"].forEach(type=>{
        el.addEventListener(type, (e)=>{ stopAll(e); fn(); }, { capture:true, passive:false });
      });
    }

    bindHard(modeBtn, toggleMode);
    bindHard(openTodayBtn, openToday);

    fitToFrame();
    window.addEventListener("resize", fitToFrame);
    window.visualViewport?.addEventListener("resize", fitToFrame);
    setInterval(fitToFrame, 500);

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
