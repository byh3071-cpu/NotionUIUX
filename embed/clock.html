<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      /* ===== DARK ===== */
      --panel:#111319;
      --panel2:#0f1117;
      --card:#0b0c10;
      --card2:#0e1016;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;
      --accent:#7cc7ff;

      /* ===== LAYOUT ===== */
      --baseW: 360;
      --baseH: 520;
      --scale: 1;
    }

    html[data-theme="light"]{
      --panel:#e3e6ec;
      --panel2:#d6dae2;
      --card:#f7f8fb;
      --card2:#eef1f6;
      --line:#c8cdd8;
      --line2:#9aa3b5;
      --text:#141821;
      --muted:#5b6476;
      --accent:#2f66ff;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      width:100%; height:100%;
      background:var(--panel);
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow:hidden;
    }

    .stage{
      width:100%; height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--panel);
      overflow:hidden;
      padding:0;
    }
    .scaler{
      width: calc(var(--baseW) * 1px * var(--scale));
      height: calc(var(--baseH) * 1px * var(--scale));
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }
    .wrap{
      width: calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      transform: scale(var(--scale));
      transform-origin: top left;

      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;

      display:flex;
      flex-direction:column;
      position:relative;
    }

    /* ===== TOP BAR ===== */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:8px;
      flex:0 0 auto;
    }
    .title{
      flex:1;
      text-align:center;
      font-size:11px;
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .btn{
      height:32px;
      padding:0 10px;
      background:var(--card2);
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      min-width:76px;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }

    /* ===== BODY ===== */
    .body{
      flex:1 1 auto;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      background:var(--panel);
    }

    .clockCard{
      width:100%;
      border:2px solid var(--line2);
      background:linear-gradient(180deg, var(--card2), var(--card));
      padding:18px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .time{
      font-size:24px;
      letter-spacing:1px;
      text-align:center;
      user-select:none;
    }

    .date{
      font-size:10px;
      color:var(--muted);
      text-align:center;
      user-select:none;
    }

    .metaRow{
      display:flex;
      gap:10px;
      margin-top:4px;
    }
    .metaBox{
      flex:1;
      border:2px solid var(--line2);
      background:var(--card2);
      padding:10px 8px;
      text-align:center;
      font-size:10px;
      color:var(--text);
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .metaBox span{
      color:var(--accent);
    }

    /* ===== BOTTOM BAR ===== */
    .bottomBar{
      flex:0 0 auto;
      height:74px;
      border-top:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      display:flex;
      align-items:center;
      justify-content:flex-end;
      padding:10px;
      gap:10px;
    }
    .bigBtn{
      width:120px;
      height:46px;
      border:2px solid var(--line2);
      background:var(--card2);
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .bigBtn:hover{ border-color:var(--accent); }
    .bigBtn.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
      color:var(--accent);
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="scaler" id="scaler">
      <div class="wrap">
        <div class="topbar">
          <button class="btn" id="todayBtn">TODAY</button>
          <div class="title">CLOCK</div>
          <div style="width:76px;"></div>
        </div>

        <div class="body">
          <div class="clockCard">
            <div class="time" id="timeText">00:00:00</div>
            <div class="date" id="dateText">0000-00-00 (DAY)</div>
            <div class="metaRow">
              <div class="metaBox" id="weekText">WEEK <span>00</span></div>
              <div class="metaBox" id="tzText">TZ <span>KST</span></div>
            </div>
          </div>
        </div>

        <div class="bottomBar">
          <button class="bigBtn" id="lightBtn">LIGHT</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    const timeText = $("#timeText");
    const dateText = $("#dateText");
    const weekText = $("#weekText");
    const tzText = $("#tzText");
    const todayBtn = $("#todayBtn");
    const lightBtn = $("#lightBtn");

    const UI_KEY = "pixel_clock_ui_v1";

    const pad2 = (n) => String(n).padStart(2, "0");
    const dayNames = ["SUN","MON","TUE","WED","THU","FRI","SAT"];

    function safeParse(s){
      try{ return JSON.parse(s); }catch(e){ return null; }
    }

    function applyTheme(isLight){
      document.documentElement.setAttribute("data-theme", isLight ? "light" : "dark");
      lightBtn.classList.toggle("on", isLight);
      lightBtn.textContent = isLight ? "DARK" : "LIGHT";
    }

    function loadUI(){
      const ui = safeParse(localStorage.getItem(UI_KEY)) || {};
      const isLight = Boolean(ui.isLight);
      applyTheme(isLight);
    }

    function saveUI(){
      const isLight = document.documentElement.getAttribute("data-theme") === "light";
      localStorage.setItem(UI_KEY, JSON.stringify({ isLight }));
    }

    function getISOWeek(d){
      // ISO week number
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
      const weekNo = Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
      return weekNo;
    }

    function renderNow(){
      const now = new Date();
      const hh = pad2(now.getHours());
      const mm = pad2(now.getMinutes());
      const ss = pad2(now.getSeconds());
      timeText.textContent = `${hh}:${mm}:${ss}`;

      const y = now.getFullYear();
      const m = pad2(now.getMonth() + 1);
      const da = pad2(now.getDate());
      const dn = dayNames[now.getDay()];
      dateText.textContent = `${y}-${m}-${da} (${dn})`;

      const wk = pad2(getISOWeek(now));
      weekText.innerHTML = `WEEK <span>${wk}</span>`;
      tzText.innerHTML = `TZ <span>KST</span>`;
    }

    function fitToFrame(){
      const rootStyle = getComputedStyle(document.documentElement);
      const baseW = Number(rootStyle.getPropertyValue("--baseW")) || 360;
      const baseH = Number(rootStyle.getPropertyValue("--baseH")) || 520;

      const vw = (window.visualViewport && window.visualViewport.width) ? window.visualViewport.width : window.innerWidth;
      const vh = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;

      const availW = Math.max(1, vw);
      const availH = Math.max(1, vh);

      let scale = Math.min(availW / baseW, availH / baseH);
      if(!isFinite(scale) || scale <= 0) scale = 1;
      scale = Math.min(3, Math.max(0.55, scale));
      scale = Math.floor(scale * 100) / 100;

      document.documentElement.style.setProperty("--scale", String(scale));
    }

    // events
    todayBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      renderNow();
    }, { passive:false });

    lightBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const cur = document.documentElement.getAttribute("data-theme") === "light";
      applyTheme(!cur);
      saveUI();
    }, { passive:false });

    // boot
    loadUI();
    renderNow();
    fitToFrame();
    window.addEventListener("resize", fitToFrame);
    setInterval(fitToFrame, 500);
    setInterval(renderNow, 250);
  </script>
</body>
</html>
