<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      /* ===== DARK ===== */
      --panel:#111319;
      --panel2:#0f1117;
      --card:#0b0c10;
      --card2:#0e1016;

      --line:#2a2f3a;
      --line2:#3a4150;

      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;

      /* ===== LAYOUT ===== */
      --baseW: 360;
      --baseH: 520;
      --scale: 1;
    }

    html[data-theme="light"]{
      --panel:#e3e6ec;
      --panel2:#d6dae2;
      --card:#f7f8fb;
      --card2:#eef1f6;

      --line:#c8cdd8;
      --line2:#9aa3b5;

      --text:#141821;
      --muted:#5b6476;

      --accent:#2f66ff;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background: var(--panel);
      color: var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;

      /* ✅ 축소 금지 정책 때문에 iframe이 작으면 스크롤 */
      overflow:auto;
    }

    .stage{
      min-width:100%;
      min-height:100%;
      background: var(--panel);
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:0;
    }

    .wrap{
      width:  calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      transform: scale(var(--scale));
      transform-origin: top left;

      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;

      display:flex;
      flex-direction:column;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
      flex:0 0 auto;
    }

    .btn{
      height:32px;
      padding:0 10px;
      background:var(--card2);
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ border-color:var(--accent); }
    .btn:active{ transform: translateY(1px); }

    .title{
      flex:1;
      text-align:center;
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    .center{
      flex:1 1 auto;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:16px;
      padding:14px;
      min-height:0;
      background: var(--panel);
    }

    .clock{
      width:calc(100% - 24px);
      border:2px solid var(--line2);
      background:linear-gradient(180deg, var(--card2), var(--card));
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
      justify-content:center;
    }

    .time{
      font-size:28px;
      letter-spacing:1px;
    }

    .date{
      font-size:11px;
      color:var(--muted);
    }

    .hint{
      font-size:9px;
      color:var(--muted);
      line-height:1.45;
      text-align:center;
      opacity:.95;
    }

    .bottomBar{
      flex:0 0 auto;
      height:74px;
      border-top:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel), var(--panel2));
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px;
      gap:10px;
    }

    .bigBtn{
      width:120px;
      height:46px;
      border:2px solid var(--line2);
      background:var(--card2);
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .bigBtn:hover{ border-color:var(--accent); }

    .bigBtn.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
      color:var(--accent);
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="app">

      <div class="topbar">
        <button class="btn" id="calBtn">CAL</button>
        <div class="title">CLOCK</div>
        <button class="btn" id="todayOpenBtn">OPEN</button>
      </div>

      <div class="center">
        <div class="clock">
          <div class="time" id="time">00:00</div>
          <div class="date" id="date">0000-00-00</div>
        </div>
        <div class="hint">
          OPEN = 오늘 TASK 모달 바로 열기<br>
          CAL = 캘린더만 이동
        </div>
      </div>

      <div class="bottomBar">
        <button class="bigBtn" id="lightBtn">LIGHT</button>
        <button class="bigBtn" id="openBtn">OPEN</button>
        <button class="bigBtn" id="goCalBtn">CALENDAR</button>
      </div>

    </div>
  </div>

  <script>
    const UI_KEY = "pixel_calendar_ui_v6";
    const $ = (id) => document.getElementById(id);

    const timeEl = $("time");
    const dateEl = $("date");

    const lightBtn = $("lightBtn");
    const calBtn = $("calBtn");
    const todayOpenBtn = $("todayOpenBtn");
    const openBtn = $("openBtn");
    const goCalBtn = $("goCalBtn");

    const pad2 = (n) => String(n).padStart(2, "0");

    function safeParse(s){
      try{ return JSON.parse(s); }catch(e){ return null; }
    }

    function applyTheme(isLight){
      document.documentElement.setAttribute("data-theme", isLight ? "light" : "dark");
      lightBtn.classList.toggle("on", isLight);
      lightBtn.textContent = isLight ? "DARK" : "LIGHT";
    }

    function loadUI(){
      const ui = safeParse(localStorage.getItem(UI_KEY)) || {};
      const isLight = Boolean(ui.isLight);
      applyTheme(isLight);
      return isLight;
    }

    function saveUI(isLight){
      const ui = safeParse(localStorage.getItem(UI_KEY)) || {};
      ui.isLight = Boolean(isLight);
      localStorage.setItem(UI_KEY, JSON.stringify(ui));
      applyTheme(isLight);
    }

    function tick(){
      const d = new Date();
      timeEl.textContent = `${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
      dateEl.textContent = `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function toISO(d){
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    // ✅ “축소 금지” : scale < 1 만들지 않음 (작으면 스크롤로 해결)
    function fitToFrame(){
      const baseW = 360, baseH = 520;
      const vw = (window.visualViewport?.width) ?? window.innerWidth;
      const vh = (window.visualViewport?.height) ?? window.innerHeight;

      let scale = Math.min(vw / baseW, vh / baseH);
      if(!isFinite(scale) || scale <= 0) scale = 1;

      scale = Math.max(1, Math.min(3, Math.floor(scale * 100) / 100));
      document.documentElement.style.setProperty("--scale", String(scale));
    }

    function goToCalendar(openToday){
      const url = new URL("./calendar.html", window.location.href);
      if(openToday){
        const iso = toISO(new Date());
        url.searchParams.set("date", iso);
        url.searchParams.set("open", "1");
      }else{
        url.search = "";
      }
      window.location.href = url.toString();
    }

    // ===== events (pointerdown + click 폴백) =====
    let isLight = loadUI();

    function bindBoth(el, fn){
      el.addEventListener("pointerdown", (e)=>{ e.preventDefault(); fn(); }, {passive:false});
      el.addEventListener("click", (e)=>{ e.preventDefault(); fn(); });
    }

    bindBoth(lightBtn, ()=>{ isLight = !isLight; saveUI(isLight); });
    bindBoth(calBtn, ()=> goToCalendar(false));
    bindBoth(goCalBtn, ()=> goToCalendar(false));
    bindBoth(todayOpenBtn, ()=> goToCalendar(true));
    bindBoth(openBtn, ()=> goToCalendar(true));

    tick();
    setInterval(tick, 1000);

    fitToFrame();
    window.addEventListener("resize", ()=> requestAnimationFrame(fitToFrame));
    window.visualViewport?.addEventListener("resize", ()=> requestAnimationFrame(fitToFrame));
  </script>
</body>
</html>
