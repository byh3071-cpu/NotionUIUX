<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock (No Clip)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;
      --accent:#7cc7ff;

      /* ✅ 기준 크기: 높이를 넉넉히(잘림 방지) */
      --baseW: 360;
      --baseH: 132;

      --scale: 1;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      width:100%; height:100%;
      background:transparent;
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    }

    .stage{
      width:100%;
      height:100%;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      overflow:hidden;
    }

    .wrap{
      width: calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      transform: scale(var(--scale));
      transform-origin: top left;

      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .top{
      height:36px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:8px;
    }

    .title{
      font-size:9px;
      color:var(--muted);
      letter-spacing:0.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip{
      height:24px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      line-height:1;
    }
    .chip:hover{ border-color:var(--accent); }
    .chip.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.12);
      color:var(--accent);
    }

    .main{
      flex:1;
      display:flex;
      align-items:stretch;
      justify-content:space-between;
      padding:10px 10px;
      gap:10px;
      min-height:0;
    }

    .leftBox{
      flex:1;
      border:2px solid var(--line);
      background:#0b0c10;
      /* ✅ 패딩 살짝 증가(글리프 잘림 방지) */
      padding:10px 12px;
      min-width:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .dateRow{
      font-size:9px;
      color:var(--muted);
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      margin-bottom:6px;
    }

    .timeRow{
      display:flex;
      align-items:baseline;
      gap:8px;
      white-space:nowrap;
      overflow:hidden;
    }

    .time{
      font-size:18px;
      color:var(--text);
      letter-spacing:1px;
      /* ✅ 핵심: line-height 여유 */
      line-height:1.25;
      padding-bottom:1px; /* 렌더링 오차용 */
    }

    .cursor{
      font-size:14px;
      color:var(--accent);
      line-height:1.25;      /* ✅ 같이 맞춰 */
      transform: translateY(-1px);
      opacity:1;
      user-select:none;
      pointer-events:none;
    }

    .note{
      margin-top:8px;
      font-size:8px;
      color:rgba(233,238,247,.75);
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rightBox{
      width:86px;
      border:2px solid var(--line);
      background:#0b0c10;
      padding:8px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
    }

    .meterLabel{
      font-size:8px;
      color:var(--muted);
      opacity:.95;
      line-height:1;
    }

    .meter{
      height:10px;
      border:2px solid var(--line2);
      background:#0e1016;
      position:relative;
      overflow:hidden;
    }
    .bar{
      position:absolute;
      left:0; top:0; bottom:0;
      width:0%;
      background:var(--accent);
    }

    @media (max-width: 330px){
      .rightBox{ display:none; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="wrap">
      <div class="top">
        <div class="title">PIXEL CLOCK</div>
        <div class="chip on" id="modeBtn" title="12/24 토글">24H</div>
      </div>

      <div class="main">
        <div class="leftBox">
          <div class="dateRow" id="dateText">0000-00-00 (월) · TODAY 0/0</div>
          <div class="timeRow">
            <div class="time" id="timeText">00:00</div>
            <div class="cursor" id="cursor">■</div>
          </div>
          <div class="note" id="noteText">오늘 할 일: 0 / 0</div>
        </div>

        <div class="rightBox">
          <div class="meterLabel">DAY</div>
          <div class="meter"><div class="bar" id="dayBar"></div></div>

          <div class="meterLabel">TODAY TASK</div>
          <div class="meter"><div class="bar" id="taskBar"></div></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    const dateText  = $("#dateText");
    const timeText  = $("#timeText");
    const cursorEl  = $("#cursor");
    const noteText  = $("#noteText");
    const dayBar  = $("#dayBar");
    const taskBar = $("#taskBar");
    const modeBtn = $("#modeBtn");

    const state = { is24h: true };
    const DOW_KR = ["일","월","화","수","목","금","토"];

    const STORE_KEYS = [
      "pixel_calendar_tasks_v5_backup_hideDone",
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview",
    ];

    const pad2 = (n) => String(n).padStart(2,"0");
    const toISO = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    const safeParse = (json) => { try { return JSON.parse(json); } catch(e){ return null; } };

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object") return { text: String(x.text ?? ""), done: Boolean(x.done) };
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function loadAllFromAnyKey(){
      for(const k of STORE_KEYS){
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const parsed = safeParse(raw);
        if(parsed && typeof parsed === "object" && !Array.isArray(parsed)) return parsed;
      }
      return {};
    }

    function getTodayProgress(iso){
      const data = loadAllFromAnyKey();
      const list = normalizeList(data[iso]);
      const total = list.length;
      const done = list.filter(t => t.done).length;
      return { done, total };
    }

    function formatTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      if(!state.is24h){
        const ampm = h < 12 ? "AM" : "PM";
        h = h % 12; if(h === 0) h = 12;
        return `${pad2(h)}:${pad2(m)} ${ampm}`;
      }
      return `${pad2(h)}:${pad2(m)}`;
    }

    function calcDayProgress(d){
      const total = 24*60*60;
      const now = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      return Math.max(0, Math.min(1, now/total));
    }

    function fitToFrame(){
      const rootStyle = getComputedStyle(document.documentElement);
      const baseW = Number(rootStyle.getPropertyValue("--baseW")) || 360;
      const baseH = Number(rootStyle.getPropertyValue("--baseH")) || 132;

      const vw = (window.visualViewport && window.visualViewport.width) ? window.visualViewport.width : window.innerWidth;
      const vh = (window.visualViewport && window.visualViewport.height) ? window.visualViewport.height : window.innerHeight;

      const availW = Math.max(1, vw - 2);
      const availH = Math.max(1, vh - 2);

      let scale = Math.min(availW / baseW, availH / baseH);
      if(!isFinite(scale) || scale <= 0) scale = 1;

      // ✅ 과도 확대만 제한
      scale = Math.min(3, Math.max(0.5, scale));
      document.documentElement.style.setProperty("--scale", String(scale));
    }

    function tick(){
      const d = new Date();
      const iso = toISO(d);

      const y = d.getFullYear();
      const mo = d.getMonth() + 1;
      const da = d.getDate();
      const dow = DOW_KR[d.getDay()];

      const { done, total } = getTodayProgress(iso);

      dateText.textContent = `${y}-${pad2(mo)}-${pad2(da)} (${dow}) · TODAY ${done}/${total}`;
      timeText.textContent = formatTime(d);
      cursorEl.style.opacity = (d.getSeconds() % 2 === 0) ? "1" : "0.15";

      dayBar.style.width = `${Math.round(calcDayProgress(d) * 100)}%`;
      const taskRatio = total === 0 ? 0 : (done / total);
      taskBar.style.width = `${Math.round(taskRatio * 100)}%`;

      noteText.textContent = `오늘 할 일: ${done} / ${total}`;
    }

    modeBtn.addEventListener("click", () => {
      state.is24h = !state.is24h;
      modeBtn.textContent = state.is24h ? "24H" : "12H";
      modeBtn.classList.toggle("on", state.is24h);
      tick();
    });

    // 노션에서 리사이즈 이벤트가 늦거나 안 올 때 대비
    fitToFrame();
    window.addEventListener("resize", fitToFrame);
    if("ResizeObserver" in window){
      const ro = new ResizeObserver(() => fitToFrame());
      ro.observe(document.documentElement);
      ro.observe(document.body);
    }
    setInterval(fitToFrame, 500);

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
