<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      /* THEME */
      --panel:#111319; --panel2:#0f1117;
      --card:#0b0c10; --card2:#0e1016;
      --line:#2a2f3a; --line2:#3a4150;
      --text:#e9eef7; --muted:#a7b0c2;
      --accent:#7cc7ff; --today:#ffe08a;

      /* LAYOUT (스샷 비율 느낌) */
  --baseW: 360;
  --baseH: 520;
  --scaleX: 1;
  --scaleY: 1;
}
    html[data-theme="light"]{
      --panel:#e3e6ec; --panel2:#d6dae2;
      --card:#f7f8fb; --card2:#eef1f6;
      --line:#c8cdd8; --line2:#9aa3b5;
      --text:#141821; --muted:#5b6476;
      --accent:#2f66ff; --today:#b36b2a;
    }
    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0; width:100%; height:100%;
      background:var(--panel); color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow:hidden;
    }

    /* === no margin frame + scaling === */
    .stage{
      width:100%; height:100%;
      display:flex; align-items:center; justify-content:center;
      background:var(--panel);
      padding:0; overflow:hidden;
    }
.scaler{
  width:100%;
  height:100%;
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
}

.wrap{
  width: calc(var(--baseW) * 1px);
  height: calc(var(--baseH) * 1px);
  transform: scale(var(--scaleX), var(--scaleY));
  transform-origin: top left;
  border:2px solid var(--line2);
  border-radius:0;
  background:var(--panel);
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

    /* TOP */
    .topbar{
      display:flex; align-items:center; justify-content:space-between;
      padding:10px 12px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:10px;
      flex:0 0 auto;
    }
    .leftBtns{ display:flex; gap:10px; align-items:center; }
    .btn{
      height:42px; min-width:88px;
      padding:0 12px;
      background:var(--card2); color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:12px;
      display:flex; align-items:center; justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover{ border-color:var(--accent); }
    .btn.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px color-mix(in srgb, var(--accent) 18%, transparent);
      color:var(--accent);
    }
    .title{
      flex:1;
      text-align:center;
      font-size:12px;
      letter-spacing:1px;
      user-select:none;
      opacity:.95;
    }
    .rightPad{ width:88px; } /* 스샷처럼 오른쪽 여백 느낌 */

    /* BODY */
    .body{
      flex:1 1 auto;
      min-height:0;
      padding:16px 14px;
      display:grid;
      grid-template-columns: 1.7fr 1fr;
      gap:14px;
      background:var(--panel);
    }
    .panel{
      border:2px solid var(--line2);
      background:linear-gradient(180deg, var(--card2), var(--card));
      padding:18px 16px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:10px;
      overflow:hidden;
    }

    .metaLine{
      font-size:10px;
      color:var(--muted);
      opacity:.95;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .timeRow{
      display:flex;
      align-items:flex-end;
      gap:10px;
    }
    .time{
      font-size:44px;
      letter-spacing:1px;
      line-height:1;
    }
    .blink{
      width:14px; height:14px;
      border:2px solid var(--line2);
      background: var(--accent);
      margin-bottom:8px;
      opacity:1;
    }

    .todoLine{
      font-size:11px;
      color:var(--muted);
      margin-top:6px;
    }
    .todoLine b{ color:var(--text); }

    /* RIGHT panel: progress blocks */
    .block{
      border:2px solid var(--line2);
      background:var(--card2);
      padding:14px 12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .blockTitle{
      font-size:11px;
      color:var(--muted);
      letter-spacing:.5px;
    }
    .bar{
      height:14px;
      border:2px solid var(--line2);
      background:var(--card);
      position:relative;
      overflow:hidden;
    }
    .fill{
      position:absolute; top:0; left:0; bottom:0;
      width:0%;
      background: color-mix(in srgb, var(--accent) 70%, transparent);
    }
    .small{
      font-size:11px;
      color:var(--muted);
    }
    .small b{ color:var(--text); }
  </style>
</head>

<body>
  <div class="stage">
    <div class="scaler">
      <div class="wrap">
        <div class="topbar">
          <div class="leftBtns">
            <button class="btn" id="btn24">24H</button>
            <!-- ✅ OPEN 버튼 완전 삭제 (캘린더 전환/모달 오픈 없음) -->
          </div>
          <div class="title">PIXEL CLOCK</div>
          <div class="rightPad"></div>
        </div>

        <div class="body">
          <!-- LEFT -->
          <div class="panel">
            <div class="metaLine" id="metaLine">0000-00-00 · TODAY 0/0</div>

            <div class="timeRow">
              <div class="time" id="timeText">00:00</div>
              <div class="blink" id="blinkBox"></div>
            </div>

            <div class="todoLine" id="todoLine">오늘 할 일 : <b>0</b> / <b>0</b></div>
          </div>

          <!-- RIGHT -->
          <div class="panel" style="gap:14px;">
            <div class="block">
              <div class="blockTitle">DAY</div>
              <div class="bar"><div class="fill" id="dayFill"></div></div>
            </div>

            <div class="block">
              <div class="blockTitle">TODAY TASK</div>
              <div class="bar"><div class="fill" id="taskFill"></div></div>
              <div class="small" id="taskInfo"><b>0</b>/<b>0</b> - <b>0%</b></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    // calendar와 동일 키를 읽어서 "오늘 TASK" 연동
    const CAL_STORE_KEY = "pixel_calendar_tasks_v6";
    const CAL_UI_KEY    = "pixel_calendar_ui_v6";

    const CLOCK_UI_KEY  = "pixel_clock_ui_v2";

    const metaLine = $("#metaLine");
    const timeText = $("#timeText");
    const blinkBox = $("#blinkBox");
    const todoLine = $("#todoLine");

    const dayFill  = $("#dayFill");
    const taskFill = $("#taskFill");
    const taskInfo = $("#taskInfo");

    const btn24 = $("#btn24");

    const pad2 = (n) => String(n).padStart(2, "0");
    const dayK = ["일","월","화","수","목","금","토"];

    function safeParse(s){ try{ return JSON.parse(s); }catch(e){ return null; } }

    function toISO(d){
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object") return { text:String(x.text ?? ""), done:Boolean(x.done) };
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function getTodayTasks(){
      const iso = toISO(new Date());
      const all = safeParse(localStorage.getItem(CAL_STORE_KEY)) || {};
      const list = normalizeList(all[iso]);
      const total = list.length;
      const done = list.filter(t => t.done).length;
      return { iso, total, done };
    }

    function applyThemeFromCalendar(){
      const ui = safeParse(localStorage.getItem(CAL_UI_KEY)) || {};
      const isLight = ui.isLight === true;
      document.documentElement.setAttribute("data-theme", isLight ? "light" : "dark");
    }

    function loadClockUI(){
      const ui = safeParse(localStorage.getItem(CLOCK_UI_KEY)) || {};
      return { is24: ui.is24 === true };
    }

    function saveClockUI(is24){
      localStorage.setItem(CLOCK_UI_KEY, JSON.stringify({ is24: !!is24 }));
    }

    function fmtTime(now, is24){
      let h = now.getHours();
      const m = now.getMinutes();
      if(is24){
        return `${pad2(h)}:${pad2(m)}`;
      }else{
        const hh = ((h + 11) % 12) + 1;
        return `${pad2(hh)}:${pad2(m)}`;
      }
    }

    function render(){
      applyThemeFromCalendar();

      const now = new Date();
      const iso = toISO(now);
      const dow = dayK[now.getDay()];

      const { total, done } = getTodayTasks();

      metaLine.textContent = `${iso} (${dow}) · TODAY ${done}/${total}`;
      todoLine.innerHTML   = `오늘 할 일 : <b>${done}</b> / <b>${total}</b>`;

      // DAY progress (0~100)
      const sec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
      const dayPct = Math.max(0, Math.min(100, (sec / 86400) * 100));
      dayFill.style.width = `${dayPct.toFixed(2)}%`;

      // TASK progress (0~100)
      const taskPct = total > 0 ? (done / total) * 100 : 0;
      taskFill.style.width = `${taskPct.toFixed(2)}%`;
      taskInfo.innerHTML = `<b>${done}</b>/<b>${total}</b> - <b>${Math.round(taskPct)}%</b>`;
    }

function fitToFrame(){
  const rootStyle = getComputedStyle(document.documentElement);
  const baseW = Number(rootStyle.getPropertyValue("--baseW")) || 360;
  const baseH = Number(rootStyle.getPropertyValue("--baseH")) || 520;

  const vv = window.visualViewport;
  const vw = vv?.width  ?? window.innerWidth;
  const vh = vv?.height ?? window.innerHeight;

  const scaleX = Math.max(0.1, vw / baseW);
  const scaleY = Math.max(0.1, vh / baseH);

  // ✅ 여백 0: iframe 가로/세로를 각각 정확히 채움
  document.documentElement.style.setProperty("--scaleX", String(Math.round(scaleX * 1000) / 1000));
  document.documentElement.style.setProperty("--scaleY", String(Math.round(scaleY * 1000) / 1000));
}

    // 24H toggle (OPEN 없음)
    let clockUI = loadClockUI();
    function sync24Btn(){
      btn24.classList.toggle("on", clockUI.is24);
      btn24.textContent = "24H";
    }

    btn24.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      clockUI.is24 = !clockUI.is24;
      saveClockUI(clockUI.is24);
      sync24Btn();
    }, { passive:false });

    // blink
    let blinkOn = true;

    function tick(){
      applyThemeFromCalendar();
      const now = new Date();
      timeText.textContent = fmtTime(now, clockUI.is24);
      blinkOn = !blinkOn;
      blinkBox.style.opacity = blinkOn ? "1" : "0.15";
      render();
    }

    // boot
    sync24Btn();
    fitToFrame();
    render();
    window.addEventListener("resize", fitToFrame);
    setInterval(fitToFrame, 500);
    setInterval(tick, 500);
  </script>
</body>
</html>
