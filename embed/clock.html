<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Calendar</title>

  <meta http-equiv="Cache-Control" content="no-store, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;
      --danger:#ff6b6b;

      --sun:#ff8f8f;
      --sat:#8fb6ff;

      --baseW: 360;
      --baseH: 440;
      --scale: 1;

      --cell: 46px;
      --gap: 4px;

      /* ✅ 기본: 투명(노션 배경 노출)
         흰 여백이 싫으면 아래를 var(--panel)로 바꿔.
         --stageBg: var(--panel);
      */
      --stageBg: transparent;
    }

    *{ box-sizing:border-box; }
    html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background: var(--panel);         /* ✅ 흰 여백 제거 */
    color:var(--text);
    font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow:hidden;                  /* ✅ 바깥 스크롤 방지 */
    }
    
    /* ✅ iframe 남는 영역도 패널로 채우고 싶으면 body를 flex로 */
    body{
    display:flex;
    align-items:flex-start;           /* top 고정(원하면 center로) */
    justify-content:flex-start;       /* left 고정(원하면 center로) */
    }
    
    .stage{
    width:100%;
    height:100%;
    background: var(--panel);
    display:flex;
    align-items:flex-start;   /* top 유지면 그대로 /
    justify-content:center;   / 가운데로 /
    overflow:hidden;
    padding: 8px;             / 테두리 잘림 방지 */
    }

    .wrap{
      width: calc(var(--baseW) * 1px);
      height: calc(var(--baseH) * 1px);
      zoom: var(--scale);

      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      position:relative;
    }
    @supports not (zoom: 1){
      .wrap{ transform: scale(var(--scale)); transform-origin: top left; }
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
    }
    .leftBtns, .rightBtns{ display:flex; gap:6px; align-items:center; }
    .btn{
      height:32px;
      padding:0 10px;
      background:#0e1016;
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }
    .monthTitle{
      flex:1;
      text-align:center;
      font-size:11px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      padding:8px 8px 6px;
      border-bottom:2px solid var(--line2);
      background:#0e1016;
    }
    .dow div{
      text-align:center;
      font-size:9px;
      color:var(--muted);
      padding:6px 0;
      border:2px solid var(--line);
      background:#0b0c10;
      user-select:none;
    }
    .dow .sunHead{ color:var(--sun); border-color:rgba(255,143,143,.45); }
    .dow .satHead{ color:var(--sat); border-color:rgba(143,182,255,.45); }

    .grid{
      padding:8px;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      background:var(--panel);
    }

    .day{
      height: var(--cell);
      border:2px solid var(--line);
      background:#0b0c10;
      position:relative;
      cursor:pointer;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:6px;
      user-select:none;
      transition: border-color .12s ease;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .day:hover{ border-color:var(--accent); }
    .day.disabled{ opacity:.35; cursor:default; }
    .day.sun:not(.disabled){ border-color: rgba(255,143,143,.30); }
    .day.sat:not(.disabled){ border-color: rgba(143,182,255,.30); }

    .num{ font-size:10px; color:var(--text); }

    .todoBadge{
      position:absolute; left:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      background: var(--accent);
      color:#0b0c10;
      display:flex; align-items:flex-end; justify-content:flex-start;
      font-size:9px; padding:0 0 2px 3px;
      pointer-events:none;
    }
    .doneBadge{
      position:absolute; right:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      background: rgba(124,199,255,.22);
      color: var(--accent);
      display:flex; align-items:flex-end; justify-content:flex-end;
      font-size:9px; padding:0 3px 2px 0;
      pointer-events:none;
    }

    /* ✅ 하트 더 아래 */
    .heartMarker{
      position:absolute;
      left:50%;
      bottom:2px;
      transform: translateX(-50%);
      font-size:11px;
      line-height:1;
      color:var(--accent);
      pointer-events:none;
    }

    .today{
      border-color: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(255,224,138,.25);
    }

    .modalBack{
      position:absolute; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:10px;
    }
    .modalBack.show{ display:flex; }

    .modal{
      width: 100%;
      max-width: 340px;
      height: 350px;
      background: #0e1016;
      border: 2px solid var(--line2);
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .modalHeader{
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:2px solid var(--line2);
      background:#0b0c10;
      gap:6px;
    }
    .modalTitle{
      font-size:10px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex:1;
      user-select:none;
    }
    .miniBtn{
      height:28px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      cursor:pointer;
      font-size:9px;
      user-select:none;
      touch-action: manipulation;
    }
    .miniBtn:hover{ border-color:var(--accent); }

    .closeBtn{
      width:32px; height:32px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      cursor:pointer;
      font-size:12px;
      user-select:none;
      touch-action: manipulation;
    }
    .closeBtn:hover{ border-color:var(--danger); }

    .modalBody{
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:100%;
      min-height:0;
    }
    .addRow{ display:flex; gap:6px; }
    .taskInput{
      flex:1;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      outline:none;
      padding:0 8px;
      font-size:10px;
    }
    .addBtn{
      width:70px;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      cursor:pointer;
      font-size:10px;
      touch-action: manipulation;
    }
    .addBtn:hover{ border-color:var(--accent); }

    .taskList{
      border:2px solid var(--line2);
      background:#0b0c10;
      padding:6px;
      overflow:auto;
      flex:1;
      min-height:0;
    }
    .taskItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px;
      border:2px solid var(--line);
      margin-bottom:6px;
      background:#0e1016;
    }
    .checkBtn{
      width:30px; height:28px;
      border:2px solid var(--accent);
      background:transparent;
      color:var(--text);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:11px;
      touch-action: manipulation;
    }
    .checkBtn.done{ background: var(--accent); color:#0b0c10; }
    .taskText{ font-size:10px; line-height:1.25; flex:1; word-break:break-word; }
    .taskText.done{ color: var(--muted); text-decoration: line-through; opacity:.9; }
    .taskActions{ display:flex; gap:6px; }
    .iconBtn{
      width:30px; height:28px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:11px;
      touch-action: manipulation;
    }
    .iconBtn:hover{ border-color:var(--accent); }
    .iconBtn.delete:hover{ border-color:var(--danger); }

    .help{ font-size:9px; color:var(--muted); opacity:.9; line-height:1.4; user-select:none; }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="app">
      <div class="topbar">
        <div class="leftBtns">
          <button class="btn" id="prevBtn">◀</button>
          <button class="btn" id="nextBtn">▶</button>
        </div>

        <div class="monthTitle" id="monthTitle">0000-00</div>

        <div class="rightBtns">
          <button class="btn" id="clockBtn">CLOCK</button>
          <button class="btn" id="todayBtn">TODAY</button>
        </div>
      </div>

      <div class="dow">
        <div class="sunHead">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="satHead">토</div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="modalBack" id="modalBack" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modalHeader">
            <div class="modalTitle" id="modalTitle">TASK</div>

            <button class="miniBtn" id="hideDoneBtn">HIDE</button>
            <button class="miniBtn" id="exportBtn">EXPORT</button>
            <button class="miniBtn" id="importBtn">IMPORT</button>

            <button class="closeBtn" id="closeBtn">X</button>
          </div>

          <div class="modalBody">
            <div class="addRow">
              <input class="taskInput" id="taskInput" placeholder="할 일 입력" maxlength="60" />
              <button class="addBtn" id="addBtn">추가</button>
            </div>

            <div class="taskList" id="taskList"></div>
            <div class="help">좌하단=총 · 우하단=완료 · ♡/♥=완료상태</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    const gridEl = $("#grid");
    const monthTitleEl = $("#monthTitle");

    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const todayBtn = $("#todayBtn");
    const clockBtn = $("#clockBtn");

    const modalBack = $("#modalBack");
    const closeBtn = $("#closeBtn");
    const modalTitle = $("#modalTitle");

    const hideDoneBtn = $("#hideDoneBtn");
    const exportBtn = $("#exportBtn");
    const importBtn = $("#importBtn");

    const taskInput = $("#taskInput");
    const addBtn = $("#addBtn");
    const taskList = $("#taskList");

    const STORE_KEY = "pixel_calendar_tasks_v6";
    const UI_KEY = "pixel_calendar_ui_v6";

    const LEGACY_KEYS = [
      "pixel_calendar_tasks_v5_backup_hideDone",
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview"
    ];

    const state = {
      viewDate: new Date(),
      selectedISO: null,
      editingIndex: null,
      hideDone: false,
      autoBackToClock: false
    };

    const pad2 = (n) => String(n).padStart(2, "0");
    const toISO = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;

    const isSameDay = (a, b) =>
      a.getFullYear() === b.getFullYear() &&
      a.getMonth() === b.getMonth() &&
      a.getDate() === b.getDate();

    function safeParse(s){ try{ return JSON.parse(s); }catch(e){ return null; } }

    function loadUI(){
      const ui = safeParse(localStorage.getItem(UI_KEY)) || {};
      state.hideDone = Boolean(ui.hideDone);
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
    }
    function saveUI(){
      localStorage.setItem(UI_KEY, JSON.stringify({ hideDone: state.hideDone }));
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
    }

    function loadAll(){
      const cur = safeParse(localStorage.getItem(STORE_KEY));
      if(cur && typeof cur === "object" && !Array.isArray(cur)) return cur;

      for(const k of LEGACY_KEYS){
        const v = safeParse(localStorage.getItem(k));
        if(v && typeof v === "object" && !Array.isArray(v)){
          localStorage.setItem(STORE_KEY, JSON.stringify(v));
          return v;
        }
      }
      return {};
    }
    function saveAll(obj){ localStorage.setItem(STORE_KEY, JSON.stringify(obj)); }

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object") return { text: String(x.text ?? ""), done: Boolean(x.done) };
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function getTasks(iso){
      const all = loadAll();
      return normalizeList(all[iso]);
    }
    function setTasks(iso, list){
      const all = loadAll();
      all[iso] = normalizeList(list);
      saveAll(all);
    }

    function fmtCount(n){ return n > 9 ? "9+" : String(n); }

    function fitToFrame(){
      const baseW = 360, baseH = 440;
      const vw = (window.visualViewport?.width) ?? window.innerWidth;
      const vh = (window.visualViewport?.height) ?? window.innerHeight;
      const availW = Math.max(1, vw - 24);
      const availH = Math.max(1, vh - 24);
      let scale = Math.min(availW / baseW, availH / baseH);
      if(!isFinite(scale) || scale <= 0) scale = 1;
      scale = Math.min(3, Math.max(0.55, scale));
      scale = Math.floor(scale * 100) / 100;
      document.documentElement.style.setProperty("--scale", String(scale));
    }

    function render(){
      gridEl.innerHTML = "";

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();
      monthTitleEl.textContent = `${y}-${pad2(m+1)}`;

      const first = new Date(y, m, 1);
      const firstDow = first.getDay();
      const last = new Date(y, m+1, 0);
      const lastDay = last.getDate();
      const prevLast = new Date(y, m, 0).getDate();

      for(let i=0; i<42; i++){
        const cell = document.createElement("div");
        cell.className = "day";

        const dayNum = i - firstDow + 1;

        let cellDate;
        let disabled = false;
        let displayNum;

        if(dayNum < 1){
          displayNum = prevLast + dayNum;
          cellDate = new Date(y, m-1, displayNum);
          disabled = true;
        }else if(dayNum > lastDay){
          displayNum = dayNum - lastDay;
          cellDate = new Date(y, m+1, displayNum);
          disabled = true;
        }else{
          displayNum = dayNum;
          cellDate = new Date(y, m, displayNum);
        }

        const iso = toISO(cellDate.getFullYear(), cellDate.getMonth()+1, cellDate.getDate());
        const dow = cellDate.getDay();

        if(disabled) cell.classList.add("disabled");
        if(dow === 0) cell.classList.add("sun");
        if(dow === 6) cell.classList.add("sat");

        const now = new Date();
        if(isSameDay(cellDate, now) && !disabled) cell.classList.add("today");

        const num = document.createElement("div");
        num.className = "num";
        num.textContent = displayNum;
        cell.appendChild(num);

        const tasks = getTasks(iso);
        if(tasks.length > 0){
          const total = tasks.length;
          const done = tasks.filter(t => t.done).length;
          const hasUndone = tasks.some(t => !t.done);

          const todoBadge = document.createElement("div");
          todoBadge.className = "todoBadge";
          todoBadge.textContent = fmtCount(total);
          cell.appendChild(todoBadge);

          if(done > 0){
            const doneBadge = document.createElement("div");
            doneBadge.className = "doneBadge";
            doneBadge.textContent = fmtCount(done);
            cell.appendChild(doneBadge);
          }

          const heart = document.createElement("div");
          heart.className = "heartMarker";
          heart.textContent = hasUndone ? "♡" : "♥";
          cell.appendChild(heart);
        }

        cell.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          if(disabled) return;
          openModal(iso);
        }, { passive:false });

        gridEl.appendChild(cell);
      }
    }

    function openModal(iso){
      state.selectedISO = iso;
      state.editingIndex = null;

      modalTitle.textContent = `TASK · ${iso}`;
      taskInput.value = "";
      renderTaskList();

      modalBack.classList.add("show");
      modalBack.setAttribute("aria-hidden", "false");
      setTimeout(() => taskInput.focus(), 0);
    }

    function goClock(){
      const base = new URL(".", window.location.href);
      const clk = new URL("clock.html", base);
      clk.searchParams.set("v", String(Date.now()));
      window.location.href = clk.toString();
    }

    function closeModal(){
      modalBack.classList.remove("show");
      modalBack.setAttribute("aria-hidden", "true");
      state.selectedISO = null;
      state.editingIndex = null;

      // ✅ clock에서 OPEN으로 들어온 흐름이면, 모달 닫는 순간 시계로 자동 복귀
      if(state.autoBackToClock){
        state.autoBackToClock = false;
        setTimeout(goClock, 80);
      }
    }

    function renderTaskList(){
      const iso = state.selectedISO;
      if(!iso) return;

      const all = getTasks(iso);
      const tasks = state.hideDone ? all.filter(t => !t.done) : all;

      taskList.innerHTML = "";

      if(all.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "등록된 TASK 없음";
        taskList.appendChild(empty);
        return;
      }

      if(state.hideDone && tasks.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "미완료 TASK 없음 (완료 숨김 ON)";
        taskList.appendChild(empty);
        return;
      }

      tasks.forEach((task) => {
        const listAll = getTasks(iso);
        const idx = listAll.findIndex(t => t.text === task.text && t.done === task.done);

        const item = document.createElement("div");
        item.className = "taskItem";

        const check = document.createElement("button");
        check.className = "checkBtn";
        check.textContent = task.done ? "✓" : "";
        if(task.done) check.classList.add("done");
        check.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          if(idx >= 0){
            list[idx].done = !list[idx].done;
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        }, { passive:false });

        item.appendChild(check);

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = task.text;
        if(task.done) text.classList.add("done");

        const actions = document.createElement("div");
        actions.className = "taskActions";

        const del = document.createElement("button");
        del.className = "iconBtn delete";
        del.textContent = "⌫";
        del.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          if(idx >= 0){
            list.splice(idx, 1);
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        }, { passive:false });

        actions.appendChild(del);

        item.appendChild(text);
        item.appendChild(actions);

        taskList.appendChild(item);
      });
    }

    function addTask(){
      const iso = state.selectedISO;
      if(!iso) return;

      const val = taskInput.value.trim();
      if(!val) return;

      const list = getTasks(iso);
      list.unshift({ text: val, done: false });
      setTasks(iso, list);

      taskInput.value = "";
      renderTaskList();
      render();
    }

    function parseQuery(){
      const sp = new URLSearchParams(location.search);
      const iso = sp.get("date");
      const open = sp.get("open") === "1";
      const from = sp.get("from"); // clock
      return { iso, open, from };
    }

    function setViewToISO(iso){
      const [Y,M] = iso.split("-").map(n => parseInt(n,10));
      if(!Y || !M) return;
      state.viewDate = new Date(Y, M-1, 1);
    }

    function bootFromQuery(){
      const q = parseQuery();
      if(q.from === "clock") state.autoBackToClock = true;

      if(q.iso && /^\d{4}-\d{2}-\d{2}$/.test(q.iso)){
        setViewToISO(q.iso);
      }
      render();

      if(q.open && q.iso){
        setTimeout(() => openModal(q.iso), 0);
      }
    }

    prevBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() - 1);
      state.viewDate = d;
      render();
    }, { passive:false });

    nextBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() + 1);
      state.viewDate = d;
      render();
    }, { passive:false });

    todayBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      state.viewDate = new Date();
      render();
    }, { passive:false });

    clockBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      goClock();
    }, { passive:false });

    closeBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      closeModal();
    }, { passive:false });

    modalBack.addEventListener("pointerdown", (e) => {
      if(e.target === modalBack) closeModal();
    }, { passive:false });

    taskInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") addTask();
      if(e.key === "Escape") closeModal();
    });

    addBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      addTask();
    }, { passive:false });

    hideDoneBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      state.hideDone = !state.hideDone;
      localStorage.setItem(UI_KEY, JSON.stringify({ hideDone: state.hideDone }));
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
      renderTaskList();
    }, { passive:false });

    exportBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const data = loadAll();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `pixel_calendar_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    }, { passive:false });

    importBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json";
      input.addEventListener("change", async () => {
        const file = input.files?.[0];
        if(!file) return;
        try{
          const text = await file.text();
          const obj = safeParse(text);
          if(!obj || typeof obj !== "object" || Array.isArray(obj)){
            alert("JSON 형식이 올바르지 않아요.");
            return;
          }
          saveAll(obj);
          render();
          if(state.selectedISO) renderTaskList();
          alert("가져오기 완료!");
        }catch(err){
          alert("가져오기 실패");
        }
      });
      input.click();
    }, { passive:false });

    function init(){
      loadUI();
      fitToFrame();
      window.addEventListener("resize", fitToFrame);
      window.visualViewport?.addEventListener("resize", fitToFrame);
      setInterval(fitToFrame, 500);

      render();
      bootFromQuery();
    }
    init();
  </script>
</body>
</html>
