<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Calendar (Tasks Only)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;
      --danger:#ff6b6b;

      --sun:#ff8f8f;
      --sat:#8fb6ff;

      --w: 360px;
      --h: 440px;
      --cell: 46px;
      --gap: 4px;

      --outerbg: transparent;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background: var(--panel) !important;
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow:hidden;
    }

    .stage{
      width:100%;
      height:100%;
      background: var(--panel) !important;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      overflow:hidden;
      padding:0;
      margin:0;
    }

    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      position:relative;
    }

    .grid{
      position:relative;
      z-index:1;
    }

    .modalBack{
      position:absolute;
      inset:0;
      z-index:1000;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:10px;
    }
    .modalBack.show{ display:flex; }

    .modal{
      position:relative;
      z-index:1001;
      width: 100%;
      max-width: 340px;
      height: 350px;
      background: #0e1016;
      border: 2px solid var(--line2);
      border-radius:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
    }

    .leftBtns, .rightBtns{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .btn{
      height:32px;
      padding:0 10px;
      background:#0e1016;
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }

    .monthTitle{
      flex:1;
      text-align:center;
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      padding:8px 8px 6px;
      border-bottom:2px solid var(--line2);
      background:#0e1016;
    }

    .dow div{
      text-align:center;
      font-size:9px;
      color:var(--muted);
      padding:6px 0;
      border:2px solid var(--line);
      border-radius:0;
      background:#0b0c10;
      user-select:none;
    }

    .dow .sunHead{ color:var(--sun); border-color:rgba(255,143,143,.45); }
    .dow .satHead{ color:var(--sat); border-color:rgba(143,182,255,.45); }

    .grid{
      padding:8px;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      background:var(--panel);
    }

    .day{
      height: var(--cell);
      border:2px solid var(--line);
      border-radius:0;
      background:#0b0c10;
      position:relative;
      cursor:pointer;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:6px;
      user-select:none;
      transition: border-color .12s ease;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      outline:none;
    }
    .day:hover{ border-color:var(--accent); }

    .day:focus-visible{
      border-color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.18);
    }

    .day.disabled{
      opacity:.35;
      cursor:default;
    }
    .day.disabled:hover{ border-color:var(--line); }

    .day.sun:not(.disabled){ border-color: rgba(255,143,143,.30); }
    .day.sat:not(.disabled){ border-color: rgba(143,182,255,.30); }

    .num{ font-size:10px; color:var(--text); }

    .todoBadge{
      position:absolute;
      left:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      background: var(--accent);
      color:#0b0c10;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      font-size:9px;
      line-height:1;
      padding:0 0 2px 3px;
      box-shadow: inset 0 0 0 2px rgba(11,12,16,.25);
      user-select:none;
      pointer-events:none;
      z-index:1;
    }

    .doneBadge{
      position:absolute;
      right:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      background: rgba(124,199,255,.22);
      color: var(--accent);
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      font-size:9px;
      line-height:1;
      padding:0 3px 2px 0;
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.25);
      user-select:none;
      pointer-events:none;
      z-index:1;
    }

    .heartMarker{
      position:absolute;
      left:50%;
      bottom:6px;
      transform: translateX(-50%);
      font-size:12px;
      line-height:1.2;
      color:var(--accent);
      opacity:1;
      user-select:none;
      pointer-events:none;
      z-index:2;
    }
    .heartMarker.doneAll{ filter: drop-shadow(0 0 2px rgba(124,199,255,.25)); }

    .today{
      border-color: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(255,224,138,.25);
    }

    .modalHeader{
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:2px solid var(--line2);
      background:#0b0c10;
      gap:6px;
    }

    .modalTitle{
      font-size:10px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex:1;
      user-select:none;
    }

    .miniBtn{
      height:28px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .miniBtn:hover{ border-color:var(--accent); }

    .closeBtn{
      width:32px;
      height:32px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .closeBtn:hover{ border-color:var(--danger); }

    .modalBody{
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:100%;
      min-height:0;
    }

    .addRow{ display:flex; gap:6px; }

    .taskInput{
      flex:1;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      outline:none;
      padding:0 8px;
      font-size:10px;
    }
    .taskInput::placeholder{ color:#7b8497; }

    .addBtn{
      width:70px;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .addBtn:hover{ border-color:var(--accent); }

    .taskList{
      border:2px solid var(--line2);
      background:#0b0c10;
      border-radius:0;
      padding:6px;
      overflow:auto;
      flex:1;
      min-height:0;
      -webkit-overflow-scrolling: touch;
    }

    .taskItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px;
      border:2px solid var(--line);
      border-radius:0;
      margin-bottom:6px;
      background:#0e1016;
      min-height: 44px;
    }

    .checkBtn{
      width:30px;
      height:28px;
      border:2px solid var(--line2);
      background:transparent;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      flex:0 0 auto;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .checkBtn:hover{ border-color:var(--accent); }
    .checkBtn.done{ background: var(--accent); border-color: var(--accent); color:#0b0c10; }

    .taskText{
      font-size:10px;
      color:var(--text);
      line-height:1.25;
      word-break:break-word;
      flex:1;
      min-height: 16px;
      display:flex;
      align-items:center;
    }
    .taskText.done{
      color: var(--muted);
      text-decoration: line-through;
      opacity:.9;
    }

    .editInput{
      flex:1;
      height:30px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      outline:none;
      padding:0 8px;
      font-size:10px;
    }

    .taskActions{ display:flex; gap:6px; flex:0 0 auto; }

    .iconBtn{
      width:30px;
      height:28px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .iconBtn:hover{ border-color:var(--accent); }
    .iconBtn.delete:hover{ border-color:var(--danger); }

    .help{
      font-size:9px;
      color:var(--muted);
      opacity:.9;
      line-height:1.4;
      user-select:none;
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="app">
      <div class="topbar">
        <div class="leftBtns">
          <button class="btn" id="prevBtn" type="button">◀</button>
          <button class="btn" id="nextBtn" type="button">▶</button>
        </div>

        <div class="monthTitle" id="monthTitle">2026-01</div>

        <div class="rightBtns">
          <button class="btn" id="clockBtn" type="button">CLOCK</button>
          <button class="btn" id="todayBtn" type="button">TODAY</button>
        </div>
      </div>

      <div class="dow" id="dow">
        <div class="sunHead">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="satHead">토</div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="modalBack" id="modalBack" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modalHeader">
            <div class="modalTitle" id="modalTitle">TASK</div>

            <button class="miniBtn" id="hideDoneBtn" type="button" title="완료 숨김 토글">HIDE</button>
            <button class="miniBtn" id="exportBtn" type="button" title="내보내기(JSON)">EXPORT</button>
            <button class="miniBtn" id="importBtn" type="button" title="가져오기(JSON)">IMPORT</button>

            <button class="closeBtn" id="closeBtn" type="button">X</button>
          </div>

          <div class="modalBody">
            <div class="addRow">
              <input class="taskInput" id="taskInput" placeholder="할 일 입력" maxlength="60" />
              <button class="addBtn" id="addBtn" type="button">추가</button>
            </div>

            <div class="taskList" id="taskList"></div>

            <div class="help">좌하단=총 · 우하단=완료 · ♡/♥=완료상태</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const $ = (sel) => document.querySelector(sel);

    // ✅ Notion/iframe에서 pointerdown이 씹힐 수 있어서 click + capture + stopPropagation
    function onPress(el, handler){
      if(!el) return;

      let locked = false;
      const run = (e) => {
        if(locked) return;
        locked = true;
        try{ handler(e); }
        finally{ setTimeout(() => (locked = false), 0); }
      };

      const wrap = (e) => {
        e.preventDefault();
        e.stopPropagation();
        run(e);
      };

      el.addEventListener("pointerdown", wrap, { passive:false, capture:true });
      el.addEventListener("click", wrap, { capture:true });

      el.addEventListener("keydown", (e) => {
        if(e.key === "Enter" || e.key === " "){
          e.preventDefault();
          e.stopPropagation();
          run(e);
        }
      }, { capture:true });
    }

    function lsGet(key){
      try { return localStorage.getItem(key); }
      catch(e){ return null; }
    }
    function lsSet(key, val){
      try { localStorage.setItem(key, val); return true; }
      catch(e){ return false; }
    }

    const gridEl = $("#grid");
    const monthTitleEl = $("#monthTitle");

    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const todayBtn = $("#todayBtn");
    const clockBtn = $("#clockBtn");

    const modalBack = $("#modalBack");
    const closeBtn = $("#closeBtn");
    const modalTitle = $("#modalTitle");

    const hideDoneBtn = $("#hideDoneBtn");
    const exportBtn = $("#exportBtn");
    const importBtn = $("#importBtn");

    const taskInput = $("#taskInput");
    const addBtn = $("#addBtn");
    const taskList = $("#taskList");

    const STORE_KEY = "pixel_calendar_tasks_v6";
    const UI_KEY = "pixel_calendar_ui_v6";

    const LEGACY_KEYS = [
      "pixel_calendar_tasks_v5_backup_hideDone",
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview"
    ];

    const state = {
      viewDate: new Date(),
      selectedISO: null,
      editingIndex: null,
      hideDone: false
    };

    const pad2 = (n) => String(n).padStart(2, "0");
    const toISO = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;

    const isSameDay = (a, b) =>
      a.getFullYear() === b.getFullYear() &&
      a.getMonth() === b.getMonth() &&
      a.getDate() === b.getDate();

    function safeParse(s){
      try{ return JSON.parse(s); }catch(e){ return null; }
    }

    function loadUI(){
      const ui = safeParse(lsGet(UI_KEY)) || {};
      state.hideDone = Boolean(ui.hideDone);
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
    }
    function saveUI(){
      lsSet(UI_KEY, JSON.stringify({ hideDone: state.hideDone }));
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
    }

    function loadAll(){
      const cur = safeParse(lsGet(STORE_KEY));
      if(cur && typeof cur === "object" && !Array.isArray(cur)) return cur;

      for(const k of LEGACY_KEYS){
        const v = safeParse(lsGet(k));
        if(v && typeof v === "object" && !Array.isArray(v)){
          lsSet(STORE_KEY, JSON.stringify(v));
          return v;
        }
      }
      return {};
    }

    function saveAll(obj){
      lsSet(STORE_KEY, JSON.stringify(obj));
    }

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object"){
          return { text: String(x.text ?? ""), done: Boolean(x.done) };
        }
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function getTasks(iso){
      const all = loadAll();
      return normalizeList(all[iso]);
    }

    function setTasks(iso, list){
      const all = loadAll();
      all[iso] = normalizeList(list);
      saveAll(all);
    }

    function fmtCount(n){
      return n > 9 ? "9+" : String(n);
    }

    function render(){
      gridEl.innerHTML = "";

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();

      monthTitleEl.textContent = `${y}-${pad2(m+1)}`;

      const first = new Date(y, m, 1);
      const firstDow = first.getDay();

      const last = new Date(y, m+1, 0);
      const lastDay = last.getDate();

      const prevLast = new Date(y, m, 0).getDate();
      const totalCells = 42;

      for(let i=0; i<totalCells; i++){
        const cell = document.createElement("div");
        cell.className = "day";

        const dayNum = i - firstDow + 1;

        let cellDate;
        let disabled = false;
        let displayNum;

        if(dayNum < 1){
          displayNum = prevLast + dayNum;
          cellDate = new Date(y, m-1, displayNum);
          disabled = true;
        }else if(dayNum > lastDay){
          displayNum = dayNum - lastDay;
          cellDate = new Date(y, m+1, displayNum);
          disabled = true;
        }else{
          displayNum = dayNum;
          cellDate = new Date(y, m, displayNum);
        }

        const iso = toISO(cellDate.getFullYear(), cellDate.getMonth()+1, cellDate.getDate());
        const dow = cellDate.getDay();

        if(disabled) cell.classList.add("disabled");
        if(dow === 0) cell.classList.add("sun");
        if(dow === 6) cell.classList.add("sat");

        const now = new Date();
        if(isSameDay(cellDate, now) && !disabled) cell.classList.add("today");

        const num = document.createElement("div");
        num.className = "num";
        num.textContent = displayNum;
        cell.appendChild(num);

        const tasks = getTasks(iso);
        if(tasks.length > 0){
          const total = tasks.length;
          const done = tasks.filter(t => t.done).length;
          const hasUndone = tasks.some(t => !t.done);

          const todoBadge = document.createElement("div");
          todoBadge.className = "todoBadge";
          todoBadge.textContent = fmtCount(total);
          cell.appendChild(todoBadge);

          if(done > 0){
            const doneBadge = document.createElement("div");
            doneBadge.className = "doneBadge";
            doneBadge.textContent = fmtCount(done);
            cell.appendChild(doneBadge);
          }

          const heart = document.createElement("div");
          heart.className = "heartMarker";
          heart.textContent = hasUndone ? "♡" : "♥";
          if(!hasUndone) heart.classList.add("doneAll");
          cell.appendChild(heart);
        }

        cell.tabIndex = disabled ? -1 : 0;
        onPress(cell, () => {
          if(disabled) return;
          openModal(iso);
        });

        gridEl.appendChild(cell);
      }
    }

    function openModal(iso){
      state.selectedISO = iso;
      state.editingIndex = null;

      modalTitle.textContent = `TASK · ${iso}`;
      taskInput.value = "";
      renderTaskList();

      modalBack.classList.add("show");
      modalBack.setAttribute("aria-hidden", "false");
      setTimeout(() => taskInput.focus(), 0);
    }

    function closeModal(){
      modalBack.classList.remove("show");
      modalBack.setAttribute("aria-hidden", "true");

      if(state.selectedISO) renderTaskList();

      state.selectedISO = null;
      state.editingIndex = null;
    }

    function renderTaskList(){
      const iso = state.selectedISO;
      if(!iso) return;

      const all = getTasks(iso);
      const tasks = state.hideDone ? all.filter(t => !t.done) : all;

      taskList.innerHTML = "";

      if(all.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "등록된 TASK 없음";
        taskList.appendChild(empty);
        return;
      }

      if(state.hideDone && tasks.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "미완료 TASK 없음 (완료 숨김 ON)";
        taskList.appendChild(empty);
        return;
      }

      tasks.forEach((task) => {
        const listAll = getTasks(iso);
        const idx = listAll.findIndex(t => t.text === task.text && t.done === task.done);

        const item = document.createElement("div");
        item.className = "taskItem";

        const check = document.createElement("button");
        check.type = "button";
        check.className = "checkBtn";
        check.textContent = task.done ? "✓" : "";
        if(task.done) check.classList.add("done");
        check.title = "완료 체크";

        onPress(check, () => {
          const list = getTasks(iso);
          if(idx >= 0){
            list[idx].done = !list[idx].done;
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        });

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = task.text;
        if(task.done) text.classList.add("done");

        const actions = document.createElement("div");
        actions.className = "taskActions";

        const edit = document.createElement("button");
        edit.type = "button";
        edit.className = "iconBtn";
        edit.textContent = "✎";
        edit.title = "수정";

        onPress(edit, () => {
          state.editingIndex = idx;
          renderTaskListEditMode();
        });

        const del = document.createElement("button");
        del.type = "button";
        del.className = "iconBtn delete";
        del.textContent = "⌫";
        del.title = "삭제";

        onPress(del, () => {
          const list = getTasks(iso);
          if(idx >= 0){
            list.splice(idx, 1);
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        });

        actions.appendChild(edit);
        actions.appendChild(del);

        item.appendChild(check);
        item.appendChild(text);
        item.appendChild(actions);

        taskList.appendChild(item);
      });
    }

    function renderTaskListEditMode(){
      const iso = state.selectedISO;
      if(!iso) return;

      const tasks = getTasks(iso);
      const idx = state.editingIndex;

      taskList.innerHTML = "";

      tasks.forEach((task, i) => {
        const item = document.createElement("div");
        item.className = "taskItem";

        const check = document.createElement("button");
        check.type = "button";
        check.className = "checkBtn";
        check.textContent = task.done ? "✓" : "";
        if(task.done) check.classList.add("done");

        onPress(check, () => {
          const list = getTasks(iso);
          list[i].done = !list[i].done;
          setTasks(iso, list);
          renderTaskListEditMode();
          render();
        });

        item.appendChild(check);

        if(i === idx){
          const input = document.createElement("input");
          input.className = "editInput";
          input.value = task.text;
          input.maxLength = 60;

          const actions = document.createElement("div");
          actions.className = "taskActions";

          const save = document.createElement("button");
          save.type = "button";
          save.className = "iconBtn";
          save.textContent = "✔";
          save.title = "저장";

          onPress(save, () => {
            const v = input.value.trim();
            if(!v) return;
            const list = getTasks(iso);
            list[i].text = v;
            setTasks(iso, list);
            state.editingIndex = null;
            renderTaskList();
            render();
          });

          const cancel = document.createElement("button");
          cancel.type = "button";
          cancel.className = "iconBtn delete";
          cancel.textContent = "↩";
          cancel.title = "취소";

          onPress(cancel, () => {
            state.editingIndex = null;
            renderTaskList();
          });

          actions.appendChild(save);
          actions.appendChild(cancel);

          item.appendChild(input);
          item.appendChild(actions);

          setTimeout(() => input.focus(), 0);
          input.addEventListener("keydown", (e) => {
            if(e.key === "Enter") save.click();
            if(e.key === "Escape") cancel.click();
          });

          taskList.appendChild(item);
          return;
        }

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = task.text;
        if(task.done) text.classList.add("done");

        const actions = document.createElement("div");
        actions.className = "taskActions";

        const edit = document.createElement("button");
        edit.type = "button";
        edit.className = "iconBtn";
        edit.textContent = "✎";

        onPress(edit, () => {
          state.editingIndex = i;
          renderTaskListEditMode();
        });

        const del = document.createElement("button");
        del.type = "button";
        del.className = "iconBtn delete";
        del.textContent = "⌫";

        onPress(del, () => {
          const list = getTasks(iso);
          list.splice(i, 1);
          setTasks(iso, list);
          renderTaskListEditMode();
          render();
        });

        actions.appendChild(edit);
        actions.appendChild(del);

        item.appendChild(text);
        item.appendChild(actions);

        taskList.appendChild(item);
      });
    }

    function addTask(){
      const iso = state.selectedISO;
      if(!iso) return;

      const val = taskInput.value.trim();
      if(!val) return;

      const list = getTasks(iso);
      list.unshift({ text: val, done: false });
      setTasks(iso, list);

      taskInput.value = "";
      renderTaskList();
      render();
    }

    function copyTextFallback(text){
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.position = "fixed";
      ta.style.left = "-9999px";
      ta.style.top = "0";
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      let ok = false;
      try{ ok = document.execCommand("copy"); }catch(_){}
      ta.remove();
      return ok;
    }

    function showManualExport(text){
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.width = "100%";
      ta.style.height = "180px";
      ta.style.background = "#0b0c10";
      ta.style.color = "var(--text)";
      ta.style.border = "2px solid var(--line2)";
      ta.style.padding = "8px";
      ta.style.fontSize = "10px";
      ta.style.fontFamily = 'ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace';

      taskList.innerHTML = "";
      taskList.appendChild(ta);
      ta.focus();
      ta.select();

      alert("EXPORT가 막혀서 텍스트창을 띄웠어요. 전체 선택 후 복사(Ctrl+C)하세요.\n복사 후엔 모달을 닫았다 다시 열면 목록이 돌아옵니다.");
    }

    function parseISODateParam(){
      const sp = new URLSearchParams(location.search);
      const iso = sp.get("date");
      const open = sp.get("open");
      if(!iso) return null;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return null;
      return { iso, open: open === "1" };
    }

    function setViewToISO(iso){
      const [Y,M] = iso.split("-").map(n => parseInt(n,10));
      if(!Y || !M) return;
      state.viewDate = new Date(Y, M-1, 1);
    }

    function bootFromQuery(){
      const q = parseISODateParam();
      if(!q) return;
      setViewToISO(q.iso);
      render();
      if(q.open){
        setTimeout(() => openModal(q.iso), 0);
      }
    }

    window.addEventListener("DOMContentLoaded", () => {
      loadUI();
      render();
      bootFromQuery();

      // ✅ 상단 버튼/모달 버튼: onPress로 통일
      onPress(prevBtn, () => {
        const d = new Date(state.viewDate);
        d.setMonth(d.getMonth() - 1);
        state.viewDate = d;
        render();
      });

      onPress(nextBtn, () => {
        const d = new Date(state.viewDate);
        d.setMonth(d.getMonth() + 1);
        state.viewDate = d;
        render();
      });

      onPress(todayBtn, () => {
        state.viewDate = new Date();
        render();
      });

      onPress(clockBtn, () => {
        const url = new URL("/embed/clock.html", window.location.origin);
        window.location.href = url.toString();
      });

      onPress(closeBtn, closeModal);

      // ✅ 모달 밖 클릭 닫기(여긴 stopPropagation 걸면 내부 클릭 막을 수 있어서 onPress 금지)
      modalBack.addEventListener("pointerdown", (e) => {
        if(e.target === modalBack) closeModal();
      }, { passive:true });

      taskInput.addEventListener("keydown", (e) => {
        if(e.key === "Enter") addTask();
        if(e.key === "Escape") closeModal();
      });

      onPress(addBtn, addTask);

      onPress(hideDoneBtn, () => {
        state.hideDone = !state.hideDone;
        saveUI();
        renderTaskList();
      });

      onPress(exportBtn, async () => {
        try{
          const data = loadAll();
          const json = JSON.stringify(data, null, 2);

          try{
            if(navigator.clipboard?.writeText){
              await navigator.clipboard.writeText(json);
              alert("EXPORT: JSON이 클립보드에 복사됐어요.");
              return;
            }
          }catch(_){}

          const ok = copyTextFallback(json);
          if(ok){
            alert("EXPORT: JSON이 클립보드에 복사됐어요.(fallback)");
            return;
          }

          showManualExport(json);
        }catch(err){
          alert("EXPORT 실패(오류): " + (err?.message || err));
        }
      });

      onPress(importBtn, () => {
        const input = document.createElement("input");
        input.type = "file";
        input.accept = "application/json";
        input.addEventListener("change", async () => {
          const file = input.files?.[0];
          if(!file) return;
          try{
            const text = await file.text();
            const obj = safeParse(text);
            if(!obj || typeof obj !== "object" || Array.isArray(obj)){
              alert("JSON 형식이 올바르지 않아요.");
              return;
            }
            saveAll(obj);
            render();
            if(state.selectedISO) renderTaskList();
            alert("가져오기 완료!");
          }catch(_){
            alert("가져오기 실패");
          }
        });
        input.click();
      });
    });
  </script>
</body>
</html>
