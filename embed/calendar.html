<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Calendar (Tasks Only)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;
      --danger:#ff6b6b;

      --sun:#ff8f8f;
      --sat:#8fb6ff;

      --w: 360px;
      --h: 440px;
      --cell: 46px;
      --gap: 4px;
    }

    *{ box-sizing:border-box; }

    /* ✅ 요청한 형태 그대로 */
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background: var(--panel);         /* ✅ 흰 여백 제거 */
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow:hidden;                  /* ✅ 바깥 스크롤 방지 */
    }

    body{
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
    }

    .stage{
      width:100%;
      height:100%;
      background: var(--panel);
      display:flex;
      align-items:flex-start;
      justify-content:center;           /* ✅ 가운데 */
      overflow:hidden;
      padding: 8px;                     /* ✅ 테두리 잘림 방지 */
    }

    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      position:relative;
    }

    /* --- 이하 스타일은 기존 그대로 --- */
    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
    }

    .leftBtns, .rightBtns{ display:flex; gap:6px; align-items:center; }

    .btn{
      height:32px;
      padding:0 10px;
      background:#0e1016;
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }

    .monthTitle{
      flex:1;
      text-align:center;
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      padding:8px 8px 6px;
      border-bottom:2px solid var(--line2);
      background:#0e1016;
    }
    .dow div{
      text-align:center;
      font-size:9px;
      color:var(--muted);
      padding:6px 0;
      border:2px solid var(--line);
      border-radius:0;
      background:#0b0c10;
      user-select:none;
    }
    .dow .sunHead{ color:var(--sun); border-color:rgba(255,143,143,.45); }
    .dow .satHead{ color:var(--sat); border-color:rgba(143,182,255,.45); }

    .grid{
      padding:8px;
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      background:var(--panel);
    }

    .day{
      height: var(--cell);
      border:2px solid var(--line);
      border-radius:0;
      background:#0b0c10;
      position:relative;
      cursor:pointer;
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      padding:6px;
      user-select:none;
      transition: border-color .12s ease;
      overflow:hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .day:hover{ border-color:var(--accent); }
    .day.disabled{ opacity:.35; cursor:default; }
    .day.sun:not(.disabled){ border-color: rgba(255,143,143,.30); }
    .day.sat:not(.disabled){ border-color: rgba(143,182,255,.30); }
    .num{ font-size:10px; color:var(--text); }

    .todoBadge{
      position:absolute; left:0; bottom:0; width:18px; height:18px;
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      background: var(--accent); color:#0b0c10;
      display:flex; align-items:flex-end; justify-content:flex-start;
      font-size:9px; line-height:1; padding:0 0 2px 3px;
      box-shadow: inset 0 0 0 2px rgba(11,12,16,.25);
      user-select:none; pointer-events:none; z-index:1;
    }

    .doneBadge{
      position:absolute; right:0; bottom:0; width:18px; height:18px;
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      background: rgba(124,199,255,.22); color: var(--accent);
      display:flex; align-items:flex-end; justify-content:flex-end;
      font-size:9px; line-height:1; padding:0 3px 2px 0;
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.25);
      user-select:none; pointer-events:none; z-index:1;
    }

    .heartMarker{
      position:absolute;
      left:50%;
      bottom:1px;
      transform: translateX(-50%);
      font-size:12px;
      line-height:1;
      color:var(--accent);
      user-select:none;
      pointer-events:none;
      z-index:2;
    }
    .heartMarker.doneAll{ filter: drop-shadow(0 0 2px rgba(124,199,255,.25)); }

    .today{
      border-color: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(255,224,138,.25);
    }

    /* 모달 스타일/JS는 너가 쓰던 기존 그대로 붙여서 사용 */
    .modalBack{ position:absolute; inset:0; background: rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; padding:10px; }
    .modalBack.show{ display:flex; }
    .modal{ width: 100%; max-width: 340px; height: 350px; background: #0e1016; border: 2px solid var(--line2); border-radius:0; display:flex; flex-direction:column; overflow:hidden; }
    .modalHeader{ padding:8px; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--line2); background:#0b0c10; gap:6px; }
    .modalTitle{ font-size:10px; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; user-select:none; }
    .miniBtn{ height:28px; padding:0 8px; border:2px solid var(--line2); background:#0e1016; color:var(--text); border-radius:0; cursor:pointer; font-size:9px; display:flex; align-items:center; justify-content:center; user-select:none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .miniBtn:hover{ border-color:var(--accent); }
    .closeBtn{ width:32px; height:32px; border:2px solid var(--line2); background:#0e1016; color:var(--text); border-radius:0; cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; user-select:none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .closeBtn:hover{ border-color:var(--danger); }
    .modalBody{ padding:8px; display:flex; flex-direction:column; gap:8px; height:100%; min-height:0; }
    .addRow{ display:flex; gap:6px; }
    .taskInput{ flex:1; height:34px; border:2px solid var(--line2); background:#0b0c10; color:var(--text); border-radius:0; outline:none; padding:0 8px; font-size:10px; }
    .taskInput::placeholder{ color:#7b8497; }
    .addBtn{ width:70px; height:34px; border:2px solid var(--line2); background:#0b0c10; color:var(--text); border-radius:0; cursor:pointer; font-size:10px; user-select:none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .addBtn:hover{ border-color:var(--accent); }
    .taskList{ border:2px solid var(--line2); background:#0b0c10; border-radius:0; padding:6px; overflow:auto; flex:1; min-height:0; }
    .taskItem{ display:flex; align-items:center; justify-content:space-between; gap:8px; padding:6px; border:2px solid var(--line); border-radius:0; margin-bottom:6px; background:#0e1016; }
    .checkBtn{ width:30px; height:28px; border:2px solid var(--accent); background:transparent; color:var(--text); border-radius:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; flex:0 0 auto; user-select:none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .checkBtn.done{ background: var(--accent); color:#0b0c10; }
    .taskText{ font-size:10px; color:var(--text); line-height:1.25; word-break:break-word; flex:1; }
    .taskText.done{ color: var(--muted); text-decoration: line-through; opacity:.9; }
    .editInput{ flex:1; height:30px; border:2px solid var(--line2); background:#0b0c10; color:var(--text); border-radius:0; outline:none; padding:0 8px; font-size:10px; }
    .taskActions{ display:flex; gap:6px; flex:0 0 auto; }
    .iconBtn{ width:30px; height:28px; border:2px solid var(--line2); background:#0b0c10; color:var(--text); border-radius:0; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; user-select:none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
    .iconBtn:hover{ border-color:var(--accent); }
    .iconBtn.delete:hover{ border-color:var(--danger); }
    .help{ font-size:9px; color:var(--muted); opacity:.9; line-height:1.4; user-select:none; }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="app">
      <div class="topbar">
        <div class="leftBtns">
          <button class="btn" id="prevBtn">◀</button>
          <button class="btn" id="nextBtn">▶</button>
        </div>

        <div class="monthTitle" id="monthTitle">2026-01</div>

        <div class="rightBtns">
          <button class="btn" id="clockBtn">CLOCK</button>
          <button class="btn" id="todayBtn">TODAY</button>
        </div>
      </div>

      <div class="dow" id="dow">
        <div class="sunHead">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="satHead">토</div>
      </div>

      <div class="grid" id="grid"></div>

      <div class="modalBack" id="modalBack" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modalHeader">
            <div class="modalTitle" id="modalTitle">TASK</div>

            <button class="miniBtn" id="hideDoneBtn">HIDE</button>
            <button class="miniBtn" id="exportBtn">EXPORT</button>
            <button class="miniBtn" id="importBtn">IMPORT</button>

            <button class="closeBtn" id="closeBtn">X</button>
          </div>

          <div class="modalBody">
            <div class="addRow">
              <input class="taskInput" id="taskInput" placeholder="할 일 입력" maxlength="60" />
              <button class="addBtn" id="addBtn">추가</button>
            </div>

            <div class="taskList" id="taskList"></div>
            <div class="help">좌하단=총 · 우하단=완료 · ♡/♥=완료상태</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ✅ 여기 아래 <script>는 너가 쓰던 기존 calendar.js(통째) 그대로 붙이면 됨 -->
  <!-- (clockBtn 클릭 이벤트만 "/embed/clock.html"로 이동하도록 유지) -->
  <script>
    /* ⚠️ 너가 기존에 쓰던 calendar.html의 JS를 그대로 붙여 넣어라.
       단, clockBtn은 아래처럼만 고정하면 된다. */

    // 예시로 clockBtn만 넣어둠(나머지 JS는 기존 것을 그대로)
    document.getElementById("clockBtn").addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = new URL("/embed/clock.html", window.location.origin).toString();
    });
  </script>
</body>
</html>
