<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Calendar (Tasks Only)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;
      --danger:#ff6b6b;

      --sun:#ff8f8f;
      --sat:#8fb6ff;

      --w: 360px;
      --h: 440px;
      --cell: 46px;
      --gap: 4px;

      /* 하단바 높이(겹침 방지용) */
      --bottomBarH: 46px;
      --backupPanelH: 150px;
    }

    *{ box-sizing:border-box; }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background: var(--panel);
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
      overflow:hidden;
    }

    .stage{
      width:100%;
      height:100%;
      background: var(--panel);
      display:flex;
      align-items:flex-start;
      justify-content:flex-start;
      overflow:hidden;
      padding:0; /* ✅ */
      margin:0;
    }

    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      position:relative; /* ✅ 하단바/백업패널 absolute용 */
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:8px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:6px;
    }

    .leftBtns, .rightBtns{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .btn{
      height:32px;
      padding:0 10px;
      background:#0e1016;
      color:var(--text);
      border:2px solid var(--line2);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      transition: transform .05s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active{ transform: translateY(1px); }
    .btn:hover{ border-color:var(--accent); }

    .monthTitle{
      flex:1;
      text-align:center;
      font-size:11px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      user-select:none;
    }

    .dow{
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      padding:8px 8px 6px;
      border-bottom:2px solid var(--line2);
      background:#0e1016;
    }

    .dow div{
      text-align:center;
      font-size:9px;
      color:var(--muted);
      padding:6px 0;
      border:2px solid var(--line);
      border-radius:0;
      background:#0b0c10;
      user-select:none;
    }

    .dow .sunHead{ color:var(--sun); border-color:rgba(255,143,143,.45); }
    .dow .satHead{ color:var(--sat); border-color:rgba(143,182,255,.45); }

    .grid{
      padding:8px;
      padding-bottom: calc(8px + var(--bottomBarH)); /* ✅ 하단바 겹침 방지 */
      display:grid;
      grid-template-columns: repeat(7, 1fr);
      gap: var(--gap);
      background:var(--panel);
    }

.day{
  height: var(--cell);
  border:2px solid rgba(233,238,247,.22);     /* 기존 var(--line)보다 대비↑ */
  border-radius:0;
  background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
  position:relative;
  cursor:pointer;
  display:flex;
  align-items:flex-start;
  justify-content:flex-start;
  padding:6px;
  user-select:none;
  transition: border-color .12s ease, background .12s ease;
  overflow:hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,.25); /* 칸 경계 또렷 */
}
.day:hover{ border-color:var(--accent); }

/* ✅ 이전/다음 달(disabled) : "회색칸" 느낌을 실제 톤으로 분리 */
.day.disabled{
  opacity: 1;                 /* 흐림 처리(opacity) 대신 톤으로 구분 */
  cursor:default;
  background: rgba(255,255,255,.015);
  border-color: rgba(233,238,247,.10);
  box-shadow: none;
}
.day.disabled .num{
  color: rgba(167,176,194,.40);  /* 숫자 더 연하게(진짜 회색칸) */
}
.day.disabled:hover{ border-color: rgba(233,238,247,.10); }

/* ✅ 날짜 숫자: 기본은 더 선명하게 */
.num{
  font-size:10px;
  color: var(--text);
  text-shadow: 0 1px 0 rgba(0,0,0,.35);
}

/* ✅ 주말: 테두리뿐 아니라 숫자도 살짝 강조 */
.day.sun:not(.disabled){ border-color: rgba(255,143,143,.40); }
.day.sat:not(.disabled){ border-color: rgba(143,182,255,.40); }
.day.sun:not(.disabled) .num{ color: rgba(255,200,200,.95); }
.day.sat:not(.disabled) .num{ color: rgba(200,220,255,.95); }

    .todoBadge{
      position:absolute;
      left:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(0 0, 0 100%, 100% 100%);
      background: var(--accent);
      color:#0b0c10;
      display:flex;
      align-items:flex-end;
      justify-content:flex-start;
      font-size:9px;
      line-height:1;
      padding:0 0 2px 3px;
      box-shadow: inset 0 0 0 2px rgba(11,12,16,.25);
      user-select:none;
      pointer-events:none;
      z-index:1;
    }

    .doneBadge{
      position:absolute;
      right:0; bottom:0;
      width:18px; height:18px;
      clip-path: polygon(100% 0, 0 100%, 100% 100%);
      background: rgba(124,199,255,.22);
      color: var(--accent);
      display:flex;
      align-items:flex-end;
      justify-content:flex-end;
      font-size:9px;
      line-height:1;
      padding:0 3px 2px 0;
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.25);
      user-select:none;
      pointer-events:none;
      z-index:1;
    }

    .heartMarker{
      position:absolute;
      left:50%;
      bottom:6px;
      transform: translateX(-50%);
      font-size:12px;
      line-height:1.2;
      color:var(--accent);
      opacity:1;
      user-select:none;
      pointer-events:none;
      z-index:2;
    }
    .heartMarker.doneAll{ filter: drop-shadow(0 0 2px rgba(124,199,255,.25)); }

    .today{
      border-color: var(--today) !important;
      box-shadow: inset 0 0 0 2px rgba(255,224,138,.25);
    }

    .modalBack{
      position:absolute;
      inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:10px;
      z-index:50;
    }
    .modalBack.show{ display:flex; }

    .modal{
      width: 100%;
      max-width: 340px;
      height: 350px;
      background: #0e1016;
      border: 2px solid var(--line2);
      border-radius:0;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    .modalHeader{
      padding:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:2px solid var(--line2);
      background:#0b0c10;
      gap:6px;
    }

    .modalTitle{
      font-size:10px;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex:1;
      user-select:none;
    }

    .miniBtn{
      height:28px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .miniBtn:hover{ border-color:var(--accent); }

    .closeBtn{
      width:32px;
      height:32px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .closeBtn:hover{ border-color:var(--danger); }

    .modalBody{
      padding:8px;
      display:flex;
      flex-direction:column;
      gap:8px;
      height:100%;
      min-height:0;
    }

    .addRow{ display:flex; gap:6px; }

    .taskInput{
      flex:1;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      outline:none;
      padding:0 8px;
      font-size:10px;
    }
    .taskInput::placeholder{ color:#7b8497; }

    .addBtn{
      width:70px;
      height:34px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:10px;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .addBtn:hover{ border-color:var(--accent); }

    .taskList{
      border:2px solid var(--line2);
      background:#0b0c10;
      border-radius:0;
      padding:6px;
      overflow:auto;
      flex:1;
      min-height:0;
      -webkit-overflow-scrolling: touch;
    }

    .taskItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px;
      border:2px solid var(--line);
      border-radius:0;
      margin-bottom:6px;
      background:#0e1016;
    }

    .checkBtn{
      width:30px;
      height:28px;
      border:2px solid var(--accent);
      background:transparent;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      flex:0 0 auto;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .checkBtn.done{ background: var(--accent); color:#0b0c10; }

    .taskText{
      font-size:10px;
      color:var(--text);
      line-height:1.25;
      word-break:break-word;
      flex:1;
    }
    .taskText.done{
      color: var(--muted);
      text-decoration: line-through;
      opacity:.9;
    }

    .editInput{
      flex:1;
      height:30px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      outline:none;
      padding:0 8px;
      font-size:10px;
    }

    .taskActions{ display:flex; gap:6px; flex:0 0 auto; }

    .iconBtn{
      width:30px;
      height:28px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .iconBtn:hover{ border-color:var(--accent); }
    .iconBtn.delete:hover{ border-color:var(--danger); }

    .help{
      font-size:9px;
      color:var(--muted);
      opacity:.9;
      line-height:1.4;
      user-select:none;
    }

    /* =========================
       ✅ 하단 바(백업/리스트/테마)
       ========================= */
    .bottomBar{
      position:absolute;
      left:0; right:0; bottom:0;
      height: var(--bottomBarH);
      padding:8px;
      border-top:2px solid var(--line2);
      background:#0e1016;
      display:flex;
      gap:6px;
      align-items:center;
      justify-content:space-between;
      z-index:10;
    }

    .bottomLeft, .bottomRight{
      display:flex;
      gap:6px;
      align-items:center;
    }

    .bottomBtn{
      height:30px;
      padding:0 10px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:9px;
      user-select:none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .bottomBtn:hover{ border-color: var(--accent); }

    .bottomBtn.on{
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.12);
    }

    /* ✅ 백업 목록 드로어(하단에서 올라옴) */
    .backupPanel{
      position:absolute;
      left:0; right:0;
      bottom: var(--bottomBarH);
      height: var(--backupPanelH);
      display:none;
      border-top:2px solid var(--line2);
      background:#0b0c10;
      padding:8px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      z-index:11;
    }
    .backupPanel.show{ display:block; }

    .backupItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:6px;
      border:2px solid var(--line);
      background:#0e1016;
      margin-bottom:6px;
    }

    .backupMeta{
      font-size:9px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      flex:1;
    }

    .backupActions{
      display:flex;
      gap:6px;
      flex:0 0 auto;
    }

    .smallBtn{
      height:26px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0b0c10;
      color:var(--text);
      border-radius:0;
      cursor:pointer;
      font-size:9px;
      user-select:none;
    }
    .smallBtn:hover{ border-color: var(--accent); }
    .smallBtn.danger:hover{ border-color: var(--danger); }

    /* =========================
       ✅ 라이트 모드
       ========================= */
/* ✅ LIGHT 모드에서 "고정 다크 배경"들을 밝게 덮어쓰기 */
    html.light{
  --panel:#f6f7fb;
  --panel2:#ffffff;
  --line:#d6dbe7;
  --line2:#b9c2d7;
  --text:#111319;
  --muted:#4c5569;

  --accent:#2a7cff;
  --today:#ffcc66;
  --danger:#e23b3b;

  --sun:#d14a4a;
  --sat:#2a5bd6;
}
    
html.light .num{ text-shadow: none; }  
html.light .day.sun:not(.disabled) .num{ color: var(--sun); }
html.light .day.sat:not(.disabled) .num{ color: var(--sat); }
    
html.light .btn,
html.light .miniBtn,
html.light .closeBtn,
html.light .bottomBtn,
html.light .smallBtn,
html.light .iconBtn,
html.light .taskInput,
html.light .editInput,
html.light .addBtn,
html.light .modal,
html.light .modalHeader,
html.light .taskList,
html.light .taskItem,
html.light .bottomBar,
html.light .backupPanel,
html.light .backupItem{
  background: var(--panel2);
  color: var(--text);
}

html.light .dow{ background: var(--panel2); }

html.light .dow div{
  background: #f0f2f8;
  border-color: var(--line2);
  color: var(--muted);
}

html.light .day{
  background: #ffffff;
  border-color: var(--line2);
  box-shadow: inset 0 0 0 1px rgba(17,19,25,.06);
}

html.light .day.disabled{
  background:#e9edf6;
  border-color: rgba(17,19,25,.18);
}
html.light .day.disabled .num{
  color: rgba(76,85,105,.45);
}

.day.hasTasks{ border-color: rgba(124,199,255,.55); }

html.light .day.hasTasks{
  border-color: rgba(42,124,255,.75);
  box-shadow: inset 0 0 0 1px rgba(42,124,255,.20);
}

html.light .todoBadge{ color:#0b0c10; }



    @media (max-width: 340px){
      .rightBtns{ gap:4px; }
    }
  </style>
</head>

<body>
  <div class="stage">
    <div class="wrap" id="app">
      <div class="topbar">
        <div class="leftBtns">
          <button class="btn" id="prevBtn">◀</button>
          <button class="btn" id="nextBtn">▶</button>
        </div>

        <div class="monthTitle" id="monthTitle">2026-01</div>

        <div class="rightBtns">
          <button class="btn" id="todayBtn">TODAY</button>
        </div>
      </div>

      <div class="dow" id="dow">
        <div class="sunHead">일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div class="satHead">토</div>
      </div>

      <div class="grid" id="grid"></div>

      <!-- ✅ 백업 목록 드로어 -->
      <div class="backupPanel" id="backupPanel" aria-hidden="true">
        <div class="help" id="backupEmptyText">백업 없음 (최근 10개까지 저장)</div>
        <div id="backupList"></div>
      </div>

      <!-- ✅ 하단 바 -->
      <div class="bottomBar">
        <div class="bottomLeft">
          <button class="bottomBtn" id="backupNowBtn" title="현재 상태 백업 저장(메모 입력)">BACKUP</button>
          <button class="bottomBtn" id="toggleBackupListBtn" title="백업 목록 열기/닫기">LIST</button>
        </div>
        <div class="bottomRight">
          <button class="bottomBtn" id="themeBtn" title="라이트/다크 토글">DARK</button>
        </div>
      </div>

      <div class="modalBack" id="modalBack" aria-hidden="true">
        <div class="modal" role="dialog" aria-modal="true">
          <div class="modalHeader">
            <div class="modalTitle" id="modalTitle">TASK</div>

            <button class="miniBtn" id="hideDoneBtn" title="완료 숨김 토글">HIDE</button>
            <button class="miniBtn" id="exportBtn" title="내보내기(JSON)">EXPORT</button>
            <button class="miniBtn" id="importBtn" title="가져오기(JSON)">IMPORT</button>

            <button class="closeBtn" id="closeBtn">X</button>
          </div>

          <div class="modalBody">
            <div class="addRow">
              <input class="taskInput" id="taskInput" placeholder="할 일 입력" maxlength="60" />
              <button class="addBtn" id="addBtn">추가</button>
            </div>

            <div class="taskList" id="taskList"></div>

            <div class="help">좌하단=총 · 우하단=완료 · ♡/♥=완료상태</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    
    // ✅ Notion에서 콘솔 못 볼 때: 에러를 화면에 표시
const __err = document.createElement("pre");
__err.style.cssText =
  "position:fixed;left:8px;right:8px;bottom:8px;max-height:45vh;overflow:auto;z-index:9999;" +
  "padding:8px;border:2px solid #ff6b6b;background:#0b0c10;color:#ffecec;" +
  "font:12px/1.4 ui-monospace,monospace;white-space:pre-wrap;";
__err.textContent = "";
if (document.body) document.body.appendChild(__err);
else document.addEventListener("DOMContentLoaded", ()=>document.body.appendChild(__err));

window.addEventListener("error", (e)=>{
  __err.textContent = "[ERROR]\n" + (e.message || e.error || e) + "\n" + (e.filename||"") + ":" + (e.lineno||"") + ":" + (e.colno||"");
});
window.addEventListener("unhandledrejection", (e)=>{
  __err.textContent = "[PROMISE]\n" + (e.reason?.message || String(e.reason));
});
    const $ = (sel) => document.querySelector(sel);

    const gridEl = $("#grid");
    const monthTitleEl = $("#monthTitle");
    if(!gridEl || !monthTitleEl) throw new Error("필수 DOM(#grid 또는 #monthTitle) 못 찾음");

    const prevBtn = $("#prevBtn");
    const nextBtn = $("#nextBtn");
    const todayBtn = $("#todayBtn");

    const modalBack = $("#modalBack");
    const closeBtn = $("#closeBtn");
    const modalTitle = $("#modalTitle");

    const hideDoneBtn = $("#hideDoneBtn");
    const exportBtn = $("#exportBtn");
    const importBtn = $("#importBtn");

    const taskInput = $("#taskInput");
    const addBtn = $("#addBtn");
    const taskList = $("#taskList");

    // ✅ 하단 백업/테마 UI
    const backupNowBtn = $("#backupNowBtn");
    const toggleBackupListBtn = $("#toggleBackupListBtn");
    const themeBtn = $("#themeBtn");
    const backupPanel = $("#backupPanel");
    const backupList = $("#backupList");
    const backupEmptyText = $("#backupEmptyText");

    const STORE_KEY = "pixel_calendar_tasks_v6";
    const UI_KEY = "pixel_calendar_ui_v6";

    // ✅ 백업 저장 키 (최근 10개)
    const BACKUP_KEY = "pixel_calendar_backups_v6";
    const MAX_BACKUPS = 10;

    const LEGACY_KEYS = [
      "pixel_calendar_tasks_v5_backup_hideDone",
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview"
    ];

    const state = {
      viewDate: new Date(),
      selectedISO: null,
      editingIndex: null,
      hideDone: false,

      theme: "dark",       // "dark" | "light"
      backupListOpen: false
    };

    const pad2 = (n) => String(n).padStart(2, "0");
    const toISO = (y,m,d) => `${y}-${pad2(m)}-${pad2(d)}`;

    const isSameDay = (a, b) =>
      a.getFullYear() === b.getFullYear() &&
      a.getMonth() === b.getMonth() &&
      a.getDate() === b.getDate();

    const storage = {
  get(k){ try{ return localStorage.getItem(k); } catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem(k,v); } catch(e){} }
};

    function safeParse(s){
      try{ return JSON.parse(s); }catch(e){ return null; }
    }

    function applyTheme(){
      document.documentElement.classList.toggle("light", state.theme === "light");
      themeBtn.textContent = (state.theme === "light") ? "LIGHT" : "DARK";
      themeBtn.classList.toggle("on", state.theme === "light");
    }

    function loadUI(){
      const ui = safeParse(storage.get(UI_KEY)) || {};
      state.hideDone = Boolean(ui.hideDone);
      state.theme = (ui.theme === "light") ? "light" : "dark";

      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
      applyTheme();
    }
    function saveUI(){
       storage.set(UI_KEY, JSON.stringify({
        hideDone: state.hideDone, 
        theme: state.theme
      }));
      hideDoneBtn.textContent = state.hideDone ? "SHOW" : "HIDE";
      applyTheme();
    }

    function loadAll(){
      const cur = safeParse(storage.get(STORE_KEY));
      if(cur && typeof cur === "object" && !Array.isArray(cur)) return cur;

      for(const k of LEGACY_KEYS){
        const v = safeParse(storage.get(k));
        if(v && typeof v === "object" && !Array.isArray(v)){
          storage.set(STORE_KEY, JSON.stringify(v));  
          return v;
        }
      }
      return {};
    }

    function saveAll(obj){
      storage.set(STORE_KEY, JSON.stringify(obj));
    }

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object"){
          return { text: String(x.text ?? ""), done: Boolean(x.done) };
        }
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function getTasks(iso){
      const all = loadAll();
      return normalizeList(all[iso]);
    }

    function setTasks(iso, list){
      const all = loadAll();
      all[iso] = normalizeList(list);
      saveAll(all);
      // ✅ AUTO 백업 없음 (요청사항)
    }

    function fmtCount(n){
      return n > 9 ? "9+" : String(n);
    }

    /* =========================
       ✅ 백업/복원 (수동, 최근 10개)
       ========================= */
    function loadBackups(){
     const arr = safeParse(storage.get(BACKUP_KEY));
      return Array.isArray(arr) ? arr : [];
    }

    function saveBackups(arr){
      const trimmed = arr.slice(0, MAX_BACKUPS);
      storage.set(BACKUP_KEY, JSON.stringify(trimmed));
      return trimmed;
    }

    function nowStamp(){
      const d = new Date();
      const pad = (n)=>String(n).padStart(2,"0");
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    }

    function makeBackup(memo){
      const data = loadAll();
      const item = {
        id: `${Date.now()}_${Math.random().toString(16).slice(2)}`,
        ts: Date.now(),
        stamp: nowStamp(),
        memo: String(memo ?? "").trim(),
        data
      };

      const list = loadBackups();
      list.unshift(item);
      saveBackups(list);
      renderBackupList();
    }

    function restoreBackup(id){
      const list = loadBackups();
      const found = list.find(x => x.id === id);
      if(!found) return;

      const label = `${found.stamp}${found.memo ? " · " + found.memo : ""}`;
      const ok = confirm(`이 백업으로 복원할까요?\n\n${label}\n\n※ 현재 데이터는 덮어써집니다.`);
      if(!ok) return;

      saveAll(found.data);

      render();
      if(state.selectedISO) renderTaskList();
      renderBackupList();
    }

    function deleteBackup(id){
      const label = "이 백업을 삭제할까요?";
      if(!confirm(label)) return;

      const list = loadBackups().filter(x => x.id !== id);
      saveBackups(list);
      renderBackupList();
    }

    function renderBackupList(){
      const list = loadBackups();
      backupList.innerHTML = "";

      if(list.length === 0){
        backupEmptyText.style.display = "block";
        return;
      }
      backupEmptyText.style.display = "none";

      list.forEach(b => {
        const row = document.createElement("div");
        row.className = "backupItem";

        const meta = document.createElement("div");
        meta.className = "backupMeta";
        meta.textContent = `${b.stamp}${b.memo ? " · " + b.memo : ""}`;

        const actions = document.createElement("div");
        actions.className = "backupActions";

        const restoreBtn = document.createElement("button");
        restoreBtn.className = "smallBtn";
        restoreBtn.textContent = "RESTORE";
        restoreBtn.addEventListener("click", (e)=>{
          e.preventDefault();
          restoreBackup(b.id);
        });

        const delBtn = document.createElement("button");
        delBtn.className = "smallBtn danger";
        delBtn.textContent = "DEL";
        delBtn.addEventListener("click", (e)=>{
          e.preventDefault();
          deleteBackup(b.id);
        });

        actions.appendChild(restoreBtn);
        actions.appendChild(delBtn);

        row.appendChild(meta);
        row.appendChild(actions);
        backupList.appendChild(row);
      });
    }

    function setBackupPanel(open){
      state.backupListOpen = open;
      backupPanel.classList.toggle("show", open);
      backupPanel.setAttribute("aria-hidden", open ? "false" : "true");
      toggleBackupListBtn.classList.toggle("on", open);
    }

    /* =========================
       ✅ 캘린더 렌더
       ========================= */
    function render(){
      gridEl.innerHTML = "";

      const y = state.viewDate.getFullYear();
      const m = state.viewDate.getMonth();

      monthTitleEl.textContent = `${y}-${pad2(m+1)}`;

      const first = new Date(y, m, 1);
      const firstDow = first.getDay();

      const last = new Date(y, m+1, 0);
      const lastDay = last.getDate();

      const prevLast = new Date(y, m, 0).getDate();

      const totalCells = 42;

      for(let i=0; i<totalCells; i++){
        const cell = document.createElement("div");
        cell.className = "day";

        const dayNum = i - firstDow + 1;

        let cellDate;
        let disabled = false;
        let displayNum;

        if(dayNum < 1){
          displayNum = prevLast + dayNum;
          cellDate = new Date(y, m-1, displayNum);
          disabled = true;
        }else if(dayNum > lastDay){
          displayNum = dayNum - lastDay;
          cellDate = new Date(y, m+1, displayNum);
          disabled = true;
        }else{
          displayNum = dayNum;
          cellDate = new Date(y, m, displayNum);
        }

        const iso = toISO(cellDate.getFullYear(), cellDate.getMonth()+1, cellDate.getDate());
        const dow = cellDate.getDay();

        if(disabled) cell.classList.add("disabled");
        if(dow === 0) cell.classList.add("sun");
        if(dow === 6) cell.classList.add("sat");

        const now = new Date();
        if(isSameDay(cellDate, now) && !disabled) cell.classList.add("today");

        const num = document.createElement("div");
        num.className = "num";
        num.textContent = displayNum;
        cell.appendChild(num);

        const tasks = getTasks(iso);
        if(tasks.length > 0) cell.classList.add("hasTasks");
        if(tasks.length > 0){
          const total = tasks.length;
          const done = tasks.filter(t => t.done).length;
          const hasUndone = tasks.some(t => !t.done);

          const todoBadge = document.createElement("div");
          todoBadge.className = "todoBadge";
          todoBadge.textContent = fmtCount(total);
          cell.appendChild(todoBadge);

          if(done > 0){
            const doneBadge = document.createElement("div");
            doneBadge.className = "doneBadge";
            doneBadge.textContent = fmtCount(done);
            cell.appendChild(doneBadge);
          }

          const heart = document.createElement("div");
          heart.className = "heartMarker";
          heart.textContent = hasUndone ? "♡" : "♥";
          if(!hasUndone) heart.classList.add("doneAll");
          cell.appendChild(heart);
        }
    cell.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      if(disabled) return;
      openModal(iso);
    }, { passive:false });
        
        gridEl.appendChild(cell);
      }
    }

    /* =========================
       ✅ 모달
       ========================= */
    function openModal(iso){
      state.selectedISO = iso;
      state.editingIndex = null;

      modalTitle.textContent = `TASK · ${iso}`;
      taskInput.value = "";
      renderTaskList();

      modalBack.classList.add("show");
      modalBack.setAttribute("aria-hidden", "false");
      setTimeout(() => taskInput.focus(), 0);
    }

    function closeModal(){
      modalBack.classList.remove("show");
      modalBack.setAttribute("aria-hidden", "true");
      state.selectedISO = null;
      state.editingIndex = null;
    }

    function renderTaskList(){
      const iso = state.selectedISO;
      if(!iso) return;

      const all = getTasks(iso);
      const tasks = state.hideDone ? all.filter(t => !t.done) : all;

      taskList.innerHTML = "";

      if(all.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "등록된 TASK 없음";
        taskList.appendChild(empty);
        return;
      }

      if(state.hideDone && tasks.length === 0){
        const empty = document.createElement("div");
        empty.className = "help";
        empty.textContent = "미완료 TASK 없음 (완료 숨김 ON)";
        taskList.appendChild(empty);
        return;
      }

      tasks.forEach((task) => {
        const listAll = getTasks(iso);
        const idx = listAll.findIndex(t => t.text === task.text && t.done === task.done);

        const item = document.createElement("div");
        item.className = "taskItem";

        const check = document.createElement("button");
        check.className = "checkBtn";
        check.textContent = task.done ? "✓" : "";
        if(task.done) check.classList.add("done");
        check.title = "완료 체크";
        check.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          if(idx >= 0){
            list[idx].done = !list[idx].done;
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        }, { passive:false });

        item.appendChild(check);

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = task.text;
        if(task.done) text.classList.add("done");

        const actions = document.createElement("div");
        actions.className = "taskActions";

        const edit = document.createElement("button");
        edit.className = "iconBtn";
        edit.textContent = "✎";
        edit.title = "수정";
        edit.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          state.editingIndex = idx;
          renderTaskListEditMode();
        }, { passive:false });

        const del = document.createElement("button");
        del.className = "iconBtn delete";
        del.textContent = "⌫";
        del.title = "삭제";
        del.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          if(idx >= 0){
            list.splice(idx, 1);
            setTasks(iso, list);
          }
          renderTaskList();
          render();
        }, { passive:false });

        actions.appendChild(edit);
        actions.appendChild(del);

        item.appendChild(text);
        item.appendChild(actions);

        taskList.appendChild(item);
      });
    }

    function renderTaskListEditMode(){
      const iso = state.selectedISO;
      if(!iso) return;

      const tasks = getTasks(iso);
      const idx = state.editingIndex;

      taskList.innerHTML = "";

      tasks.forEach((task, i) => {
        const item = document.createElement("div");
        item.className = "taskItem";

        const check = document.createElement("button");
        check.className = "checkBtn";
        check.textContent = task.done ? "✓" : "";
        if(task.done) check.classList.add("done");
        check.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          list[i].done = !list[i].done;
          setTasks(iso, list);
          renderTaskListEditMode();
          render();
        }, { passive:false });

        item.appendChild(check);

        if(i === idx){
          const input = document.createElement("input");
          input.className = "editInput";
          input.value = task.text;
          input.maxLength = 60;

          const actions = document.createElement("div");
          actions.className = "taskActions";

          const save = document.createElement("button");
          save.className = "iconBtn";
          save.textContent = "✔";
          save.title = "저장";
          save.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            const v = input.value.trim();
            if(!v) return;
            const list = getTasks(iso);
            list[i].text = v;
            setTasks(iso, list);
            state.editingIndex = null;
            renderTaskList();
            render();
          }, { passive:false });

          const cancel = document.createElement("button");
          cancel.className = "iconBtn delete";
          cancel.textContent = "↩";
          cancel.title = "취소";
          cancel.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            state.editingIndex = null;
            renderTaskList();
          }, { passive:false });

          actions.appendChild(save);
          actions.appendChild(cancel);

          item.appendChild(input);
          item.appendChild(actions);

          setTimeout(() => input.focus(), 0);
          input.addEventListener("keydown", (e) => {
            if(e.key === "Enter") save.click();
            if(e.key === "Escape") cancel.click();
          });

          taskList.appendChild(item);
          return;
        }

        const text = document.createElement("div");
        text.className = "taskText";
        text.textContent = task.text;
        if(task.done) text.classList.add("done");

        const actions = document.createElement("div");
        actions.className = "taskActions";

        const edit = document.createElement("button");
        edit.className = "iconBtn";
        edit.textContent = "✎";
        edit.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          state.editingIndex = i;
          renderTaskListEditMode();
        }, { passive:false });

        const del = document.createElement("button");
        del.className = "iconBtn delete";
        del.textContent = "⌫";
        del.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          const list = getTasks(iso);
          list.splice(i, 1);
          setTasks(iso, list);
          renderTaskListEditMode();
          render();
        }, { passive:false });

        actions.appendChild(edit);
        actions.appendChild(del);

        item.appendChild(text);
        item.appendChild(actions);

        taskList.appendChild(item);
      });
    }

    function addTask(){
      const iso = state.selectedISO;
      if(!iso) return;

      const val = taskInput.value.trim();
      if(!val) return;

      const list = getTasks(iso);
      list.unshift({ text: val, done: false });
      setTasks(iso, list);

      taskInput.value = "";
      renderTaskList();
      render();
    }

    /* =========================
       ✅ 네비/기타
       ========================= */
    if(prevBtn) prevBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() - 1);
      state.viewDate = d;
      render();
    }, { passive:false });

    if(nextBtn) nextBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const d = new Date(state.viewDate);
      d.setMonth(d.getMonth() + 1);
      state.viewDate = d;
      render();
    }, { passive:false });

    if(todayBtn) todayBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      state.viewDate = new Date();
      render();
    }, { passive:false });


    closeBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      closeModal();
    }, { passive:false });

    modalBack.addEventListener("pointerdown", (e) => {
      if(e.target === modalBack) closeModal();
    }, { passive:false });

    taskInput.addEventListener("keydown", (e) => {
      if(e.key === "Enter") addTask();
      if(e.key === "Escape") closeModal();
    });

    addBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      addTask();
    }, { passive:false });

    hideDoneBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      state.hideDone = !state.hideDone;
      saveUI();
      renderTaskList();
    }, { passive:false });

    exportBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const data = loadAll();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `pixel_calendar_backup_${new Date().toISOString().slice(0,10)}.json`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 2000);
    }, { passive:false });

    importBtn.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json";
      input.addEventListener("change", async () => {
        const file = input.files?.[0];
        if(!file) return;
        try{
          const text = await file.text();
          const obj = safeParse(text);
          if(!obj || typeof obj !== "object" || Array.isArray(obj)){
            alert("JSON 형식이 올바르지 않아요.");
            return;
          }
          saveAll(obj);
          render();
          if(state.selectedISO) renderTaskList();
          alert("가져오기 완료!");
        }catch(err){
          alert("가져오기 실패");
        }
      });
      input.click();
    }, { passive:false });

    /* =========================
       ✅ 하단 백업/테마 이벤트
       ========================= */
    backupNowBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      const memo = prompt("백업 메모를 입력하세요. (비워도 저장됨)", "");
      if(memo === null) return; // 취소
      makeBackup(memo.trim());
      // 리스트가 열려있으면 바로 최신이 보이도록
      if(!state.backupListOpen) setBackupPanel(true);
    });

    toggleBackupListBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      setBackupPanel(!state.backupListOpen);
    });

    themeBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      state.theme = (state.theme === "light") ? "dark" : "light";
      saveUI();
    });

    // 백업 패널 바깥 클릭 닫기(원하면 유지)
    backupPanel.addEventListener("pointerdown", (e)=>{
      // 패널 내부 클릭은 유지
      e.stopPropagation();
    });

    // ESC로 백업 패널 닫기 + 모달 닫기
    window.addEventListener("keydown", (e)=>{
      if(e.key === "Escape"){
        if(modalBack.classList.contains("show")) closeModal();
        if(state.backupListOpen) setBackupPanel(false);
      }
    });

    /* ✅ URL 쿼리로 자동 오픈: ?date=YYYY-MM-DD&open=1 */
    function parseISODateParam(){
      const sp = new URLSearchParams(location.search);
      const iso = sp.get("date");
      const open = sp.get("open");
      if(!iso) return null;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)) return null;
      return { iso, open: open === "1" };
    }

    function setViewToISO(iso){
      const [Y,M] = iso.split("-").map(n => parseInt(n,10));
      if(!Y || !M) return;
      state.viewDate = new Date(Y, M-1, 1);
    }

    function bootFromQuery(){
      const q = parseISODateParam();
      if(!q) return;
      setViewToISO(q.iso);
      render();
      if(q.open){
        setTimeout(() => openModal(q.iso), 0);
      }
    }

    loadUI();
    render();
    renderBackupList();
    setBackupPanel(false);
    bootFromQuery();
  </script>
</body>
</html>
