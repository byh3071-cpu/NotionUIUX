<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Tracker</title>
<style>
  :root {
    --bg: #f8f9fb;
    --surface: #ffffff;
    --border: #d1d5db;
    --border-strong: #9ca3af;
    --text: #1a1a2e;
    --text-secondary: #6b7280;
    --accent: #374151;
    --accent-hover: #1f2937;
    --income-color: #166534;
    --income-bg: #f0fdf4;
    --expense-color: #991b1b;
    --expense-bg: #fef2f2;
    --radius: 6px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  :root.dark {
    --bg: #0f1115;
    --surface: #1a1d27;
    --border: #2d3348;
    --border-strong: #3b4261;
    --text: #dbe6f5;
    --text-secondary: #8892a8;
    --accent: #82aaff;
    --accent-hover: #a8c4ff;
    --income-color: #4ade80;
    --income-bg: rgba(74, 222, 128, 0.08);
    --expense-color: #f87171;
    --expense-bg: rgba(248, 113, 113, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-size: 13px;
  }

  .container {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    border: 1.5px solid var(--border);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .header-status {
    font-size: 10px;
    color: var(--text-secondary);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .header-status.show { opacity: 1; }

  .tab-bar {
    display: flex;
    border-bottom: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .tab {
    flex: 1;
    padding: 8px 0;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab:first-child { border-right: 1px solid var(--border); }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab:hover:not(.active) { color: var(--text); }

  .form-area {
    flex: 1;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
    background: var(--bg);
  }

  .field { display: flex; flex-direction: column; gap: 3px; }

  .field label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    color: var(--text-secondary);
  }

  .field input, .field select {
    font-family: var(--font);
    font-size: 13px;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus, .field select:focus { border-color: var(--border-strong); }
  .field input::placeholder { color: var(--text-secondary); opacity: 0.6; }

  .row { display: flex; gap: 8px; }
  .row .field { flex: 1; }

  .amount-wrap { position: relative; }
  .amount-wrap input { width: 100%; padding-right: 30px; }
  .amount-wrap .currency {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 11px; color: var(--text-secondary); pointer-events: none;
  }

  .chip-group { display: flex; flex-wrap: wrap; gap: 4px; }

  .chip {
    padding: 4px 10px; font-size: 11px;
    border: 1.5px solid var(--border); border-radius: 20px;
    background: var(--surface); color: var(--text-secondary);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .chip:hover { border-color: var(--border-strong); color: var(--text); }
  .chip.selected { background: var(--accent); color: #fff; border-color: var(--accent); }
  :root.dark .chip.selected { color: #0f1115; }

  .expense-only { display: block; }
  body.income-mode .expense-only { display: none; }

  .submit-bar {
    padding: 10px 14px;
    border-top: 1.5px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .submit-btn {
    width: 100%; padding: 9px 0;
    font-family: var(--font); font-size: 12px; font-weight: 600;
    letter-spacing: 0.3px;
    border: 1.5px solid var(--accent); border-radius: var(--radius);
    background: var(--accent); color: #fff;
    cursor: pointer; transition: all 0.2s;
  }
  :root.dark .submit-btn { color: #0f1115; }
  .submit-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .submit-btn.success { background: var(--income-color); border-color: var(--income-color); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <span class="header-title">Finance</span>
    <span class="header-status" id="status"></span>
  </div>

  <div class="tab-bar">
    <button class="tab active" data-type="expense" id="tab-expense">지출</button>
    <button class="tab" data-type="income" id="tab-income">소득</button>
  </div>

  <div class="form-area">
    <div class="field">
      <label>내역</label>
      <input type="text" id="f-title" placeholder="무엇에 사용했나요?" autocomplete="off">
    </div>

    <div class="row">
      <div class="field">
        <label>금액</label>
        <div class="amount-wrap">
          <input type="number" id="f-amount" placeholder="0" min="0" inputmode="numeric">
          <span class="currency">원</span>
        </div>
      </div>
      <div class="field">
        <label id="date-label">지출 날짜</label>
        <input type="date" id="f-date" onclick="this.showPicker()">
      </div>
    </div>

    <div class="field expense-only">
      <label>고정비 분류</label>
      <div class="chip-group" id="chips-fixed"></div>
    </div>

    <div class="field">
      <label>결제 수단</label>
      <div class="chip-group" id="chips-payment"></div>
    </div>

    <div class="field">
      <label>소비 유형</label>
      <div class="chip-group" id="chips-spend"></div>
    </div>
  </div>

  <div class="submit-bar">
    <button class="submit-btn" id="submit-btn">기록하기</button>
  </div>

</div>

<script>
(function() {
  // Theme — 기본 라이트모드
  var params = new URLSearchParams(window.location.search);
  if (params.get('mode') === 'dark') {
    document.documentElement.classList.add('dark');
  }

  // State
  var currentType = 'expense';
  var selectedPayment = '';
  var selectedSpendType = '';
  var selectedFixedCategory = '';
  var PAYMENTS = {
    income:  ['현금', '토스카드', '토스 통장', '농협 통장'],
    expense: ['현금', '토스카드', '토스통장', '농협카드', '농협통장', '하나은행통장', 'IBK 기업은행통장', '삼성카드']
  };
  var SPEND_TYPES = ['행복', '낭비', '미래', '성장', '필수'];
  var FIXED_CATEGORIES = ['식비', '저축', '오프라인 고정비', '온라인 구독', 'AI 구독', '비상금', '카페', '기타'];

  // Set today's date
  var now = new Date();
  var y = now.getFullYear();
  var m = String(now.getMonth() + 1).padStart(2, '0');
  var d = String(now.getDate()).padStart(2, '0');
  var today = y + '-' + m + '-' + d;
  document.getElementById('f-date').value = today;

  // Build chips helper
  function buildChips(container, items, selectedValue, groupName) {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      var cls = selectedValue === item ? 'chip selected' : 'chip';
      html += '<span class="' + cls + '" data-group="' + groupName + '" data-value="' + item + '">' + item + '</span>';
    }
    container.innerHTML = html;
  }

  function renderAllChips() {
    buildChips(document.getElementById('chips-payment'), PAYMENTS[currentType], selectedPayment, 'payment');
    buildChips(document.getElementById('chips-spend'), SPEND_TYPES, selectedSpendType, 'spend');
    var fixedEl = document.getElementById('chips-fixed');
    if (fixedEl) {
      buildChips(fixedEl, FIXED_CATEGORIES, selectedFixedCategory, 'fixed');
    }
  }

  // Chip click delegation
  document.addEventListener('click', function(e) {
    var chip = e.target.closest('.chip');
    if (!chip) return;
    var group = chip.getAttribute('data-group');
    var value = chip.getAttribute('data-value');
    if (!group || !value) return;

    if (group === 'payment') {
      selectedPayment = selectedPayment === value ? '' : value;
    } else if (group === 'spend') {
      selectedSpendType = selectedSpendType === value ? '' : value;
    } else if (group === 'fixed') {
      selectedFixedCategory = selectedFixedCategory === value ? '' : value;
    }
    renderAllChips();
  });

  // Tab switch
  document.getElementById('tab-expense').addEventListener('click', function() { switchTab('expense'); });
  document.getElementById('tab-income').addEventListener('click', function() { switchTab('income'); });

  function switchTab(type) {
    currentType = type;
    selectedPayment = '';
    selectedSpendType = '';
    selectedFixedCategory = '';

    document.getElementById('tab-expense').className = type === 'expense' ? 'tab active' : 'tab';
    document.getElementById('tab-income').className = type === 'income' ? 'tab active' : 'tab';

    document.getElementById('f-title').placeholder = type === 'expense' ? '무엇에 사용했나요?' : '어디서 들어온 소득인가요?';
    document.getElementById('date-label').textContent = type === 'expense' ? '지출 날짜' : '소득 날짜';

    if (type === 'income') {
      document.body.classList.add('income-mode');
    } else {
      document.body.classList.remove('income-mode');
    }

    renderAllChips();
  }

  // Status flash
  function showStatus(msg, duration) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, duration || 2000);
  }

  // Submit
  document.getElementById('submit-btn').addEventListener('click', function() { submitEntry(); });

  function submitEntry() {
    var titleEl = document.getElementById('f-title');
    var amountEl = document.getElementById('f-amount');
    var dateEl = document.getElementById('f-date');

    var title = titleEl.value.trim();
    var amount = parseInt(amountEl.value, 10);
    var date = dateEl.value;

    if (!title) { showStatus('내역을 입력하세요'); return; }
    if (!amount || amount <= 0) { showStatus('금액을 입력하세요'); return; }

    var btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    var body = {
      action: currentType === 'income' ? 'createIncome' : 'createExpense',
      title: title,
      amount: amount,
      date: date,
      payment: selectedPayment || null,
      spendType: selectedSpendType || null
    };

    if (currentType === 'expense' && selectedFixedCategory) {
      body.fixedCategory = selectedFixedCategory;
    }

    // 즉시 폼 리셋 — 바로 다음 입력 가능
    titleEl.value = '';
    amountEl.value = '';
    selectedPayment = '';
    selectedSpendType = '';
    selectedFixedCategory = '';
    renderAllChips();
    titleEl.focus();

    btn.textContent = '저장 완료';
    btn.classList.add('success');
    btn.disabled = false;
    setTimeout(function() { btn.textContent = '기록하기'; btn.classList.remove('success'); }, 800);

    // 백그라운드 API 호출
    fetch('/api/notion', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
    .then(function(result) {
      if (!result.ok || !result.data.success) {
        showStatus('동기화 실패', 2000);
      }
    })
    .catch(function(err) {
      showStatus('동기화 실패: ' + err.message, 3000);
    });
  }

  // Enter key submits
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      submitEntry();
    }
  });

  // Init
  renderAllChips();
})();
</script>

</body>
</html>
