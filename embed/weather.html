<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Yohan's System Weather Blue</title>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 요한 님의 픽셀 시계와 깔맞춤한 색상 */
            --bg-color: #0f1115;       /* 딥 네이비 배경 */
            --border-color: #3b4261;   /* 은은한 테두리 */
            --accent-color: #82aaff;   /* 핵심! 사이버 블루 */
            --text-color: #dbe6f5;     /* 읽기 편한 연한 회색 */
            --cloud-color: #3b4261;    /* 구름 색상 */
        }

        body {
            margin: 0; padding: 0;
            background-color: transparent;
            font-family: 'Silkscreen', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-color);
        }

        .weather-container {
            position: relative;
            width: 240px;  /* 시계 위젯과 비율 맞춤 */
            height: 140px;
            background: var(--bg-color);
            border: 2px solid var(--border-color);
            box-shadow: 4px 4px 0px #08090b; /* 깊이감 있는 그림자 */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 윈도우 헤더 스타일 */
        .header-bar {
            height: 24px;
            border-bottom: 2px solid var(--border-color);
            background: rgba(59, 66, 97, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px;
            font-size: 10px;
            color: var(--accent-color);
        }
        
        /* 내용물 영역 */
        .content {
            flex: 1;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2; /* 구름보다 위에 글씨 표시 */
        }

        .info-left {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .city {
            font-size: 11px;
            color: #697098;
            letter-spacing: 1px;
        }

        .temp {
            font-size: 38px;
            color: var(--accent-color);
            text-shadow: 2px 2px 0px #000;
        }

        .desc {
            font-size: 10px;
            color: var(--text-color);
        }

        /* 배경 애니메이션 효과 */
        .bg-effect {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 픽셀 구름 스타일 */
        .cloud-pixel {
            position: absolute;
            width: 50px; height: 16px;
            background: var(--cloud-color);
            box-shadow: 
                10px -10px 0 0 var(--cloud-color), 
                20px -10px 0 0 var(--cloud-color), 
                10px 10px 0 0 var(--cloud-color),
                20px 10px 0 0 var(--cloud-color),
                30px 0 0 0 var(--cloud-color);
            opacity: 0.4;
        }

        /* 구름 움직임 */
        .c1 { top: 40px; left: -60px; animation: float 18s linear infinite; }
        .c2 { top: 80px; left: -40px; animation: float 25s linear infinite; animation-delay: 5s; transform: scale(0.8); }

        @keyframes float {
            from { left: -70px; }
            to { left: 260px; }
        }

        /* 비 내리는 효과 (필요시 활성화) */
        .rain-drop {
            position: absolute;
            width: 2px; height: 8px;
            background: var(--accent-color);
            opacity: 0.6;
            animation: rain 1s linear infinite;
        }
        @keyframes rain { from { transform: translateY(-20px); } to { transform: translateY(160px); } }

    </style>
</head>
<body>

    <div class="weather-container">
        <div class="header-bar">
            <span>WEATHER.MOD</span>
            <span>KR-SEOUL</span>
        </div>

        <div class="content">
            <div class="info-left">
                <span class="city">CURRENT TEMP</span>
                <span class="temp" id="temp">--°</span>
                <span class="desc" id="weather-desc">SCANNING...</span>
            </div>
        </div>

        <div id="weather-effect" class="bg-effect">
            <div class="cloud-pixel c1"></div>
            <div class="cloud-pixel c2"></div>
        </div>
    </div>

    <script>
        // ==========================================
        // 아까 사용하신 그 키를 여기에 다시 넣어주세요!
        const API_KEY = "28d973834adf062cd5ce35560b8d1091"; 
        // ==========================================

        const CITY = "Seoul";

        async function fetchWeather() {
            try {
                if (API_KEY === "YOUR_API_KEY") {
                    // 키가 없을 때 보여줄 데모 화면
                    document.getElementById("temp").innerText = "24°";
                    document.getElementById("weather-desc").innerText = "> SYSTEM: CLEAR";
                    return;
                }

                const url = `https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${API_KEY}&units=metric`;
                const response = await fetch(url);
                const data = await response.json();

                // 온도 업데이트
                const temp = Math.round(data.main.temp);
                document.getElementById("temp").innerText = `${temp}°`;

                // 상태 업데이트
                const weatherMain = data.weather[0].main;
                document.getElementById("weather-desc").innerText = `> ${weatherMain.toUpperCase()}`;

                // 날씨 효과 (비 올 때만 추가 연출)
                const effectBox = document.getElementById("weather-effect");
                if (weatherMain === "Rain" || weatherMain === "Drizzle") {
                    effectBox.innerHTML = ''; // 구름 제거
                    for(let i=0; i<15; i++) {
                        let drop = document.createElement("div");
                        drop.className = "rain-drop";
                        drop.style.left = Math.random() * 240 + "px";
                        drop.style.animationDuration = (Math.random() * 0.5 + 0.5) + "s";
                        drop.style.animationDelay = Math.random() + "s";
                        effectBox.appendChild(drop);
                    }
                }

            } catch (error) {
                console.error("Error:", error);
            }
        }

        fetchWeather();
        setInterval(fetchWeather, 600000); 
    </script>
</body>
</html>
