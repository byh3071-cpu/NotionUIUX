<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0"
  <title>YOHAN OS / Pixel Calendar Embed</title>

  <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff;
      --ink:#111;
      --muted:#9aa0a6;
      --line:#e8e8e8;
      --soft:#f7f7f7;
      --pink:#f09ab1;
      --pink2:#ffe2ea;
      --shadow:rgba(0,0,0,.06);
      --radius:22px;
    }

    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      padding:0;
      background:var(--bg);
      font-family:'Silkscreen', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--ink);
      overflow:hidden; /* ✅ 노션 임베드 스크롤 최소화 */
    }

    .wrap{
      width:100%;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .card{
      width:min(1060px, 100%);
      background:#fff;
      border:3px solid #1d1d1d;
      border-radius:28px;
      box-shadow:8px 10px 0 var(--shadow);
      padding:18px 18px 14px;
      position:relative;

      /* ✅ 바텀 패널 때문에 카드가 너무 커지지 않게 */
      height: min(720px, calc(100vh - 28px));
      overflow:hidden;
    }

    /* top label */
    .topline{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .brand{
      display:flex;
      align-items:flex-start;
      gap:10px;
      min-width:260px;
    }
    .dots{
      display:flex;
      gap:7px;
      margin-top:2px;
    }
    .dot{
      width:18px; height:18px;
      border:3px solid #1d1d1d;
      border-radius:7px;
      background:#fff;
    }
    .title{
      line-height:1.1;
    }
    .title .mini{
      font-size:12px;
      color:var(--muted);
      letter-spacing:1px;
    }
    .title .big{
      font-size:26px;
      letter-spacing:2px;
      margin-top:2px;
    }

    .controls{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .btn{
      border:3px solid #1d1d1d;
      background:#fff;
      border-radius:18px;
      padding:10px 16px;
      font-size:14px;
      cursor:pointer;
      box-shadow:3px 4px 0 var(--shadow);
      user-select:none;
    }
    .btn:active{ transform:translateY(1px); box-shadow:2px 3px 0 var(--shadow); }
    .btn.icon{ width:54px; padding:10px 0; display:flex; justify-content:center; }

    .divider{
      width:100%;
      border-top:3px dashed var(--line);
      margin:10px 0 12px;
    }

    .main{
      display:grid;
      grid-template-columns: 1fr 340px;
      gap:14px;
      align-items:start;
      height: calc(100% - 110px); /* ✅ 상단+divider 공간 제외 */
      overflow:hidden;
    }

    .leftcol{
      height:100%;
      overflow:hidden;
      padding-bottom: 10px;
    }

    .badge-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }

    .picked{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 14px;
      display:flex;
      gap:10px;
      align-items:center;
      width:fit-content;
      background:#fff;
    }
    .picked .k{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
    }
    .picked .v{
      font-size:14px;
      letter-spacing:1px;
    }

    .mode{
      border:3px solid #1d1d1d;
      border-radius:20px;
      padding:10px 16px;
      background:var(--pink2);
      box-shadow:3px 4px 0 var(--shadow);
      font-size:14px;
      letter-spacing:1px;
    }

    .calendar{
      padding:8px 6px 6px;
      height: calc(100% - 54px);
      overflow:hidden;
    }

    .dow{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:10px;
      padding:6px 10px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:2px;
      text-align:center;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(7, 1fr);
      gap:12px;
      padding:0 10px 10px;
    }

    .cell{
      height:58px;
      border:3px solid var(--line);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      cursor:pointer;
      background:#fff;
      transition:transform .06s ease;
      user-select:none;
    }
    .cell:hover{ transform:translateY(-1px); }
    .cell.empty{
      border-color:transparent;
      background:transparent;
      cursor:default;
    }
    .cell.today{
      border-color:#1d1d1d;
      background:var(--pink2);
    }
    .cell.selected{
      border-color:#1d1d1d;
      background:var(--pink);
      color:#fff;
    }
    .cell.weekend{ color:#7b7b7b; }
    .cell.sun{ color:#b84a5a; }
    .cell.sat{ color:#3b66d6; }

    /* side panel */
    .side{
      border:3px solid var(--line);
      border-radius:24px;
      padding:14px;
      background:#fff;
    }

    .side-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .side-head .h{
      font-size:16px;
      letter-spacing:2px;
    }
    .weekchip{
      border:3px solid var(--line);
      border-radius:16px;
      padding:8px 10px;
      color:var(--muted);
      font-size:12px;
      letter-spacing:1px;
      background:#fff;
    }

    .routine{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:6px;
    }

    .rbox{
      border:3px solid var(--line);
      border-radius:20px;
      padding:14px;
      display:flex;
      gap:12px;
      align-items:center;
      background:#fff;
    }

    .chk{
      width:26px; height:26px;
      border:3px solid #1d1d1d;
      border-radius:7px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      flex:0 0 auto;
    }
    .chk.on{
      background:var(--pink2);
      position:relative;
    }
    .chk.on::after{
      content:"✔";
      font-size:14px;
      line-height:1;
    }

    .rtext .rt{
      font-size:14px;
      letter-spacing:2px;
    }
    .rtext .rd{
      margin-top:6px;
      font-size:11px;
      color:var(--muted);
      letter-spacing:1px;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .side-actions{
      display:flex;
      gap:12px;
      margin-top:12px;
    }
    .side-actions .btn{
      flex:1;
      padding:12px 10px;
    }

    /* ✅ footer */
    .foot{
      position:absolute;
      left:18px;
      right:18px;
      bottom:10px;
      display:flex;
      gap:10px;
      color:var(--muted);
      font-size:11px;
      letter-spacing:2px;
      pointer-events:none;
    }
    .foot .left{ flex:1; }
    .foot .right{ text-align:right; }

    /* ==============================
       ✅ Bottom Tasks Sheet (Overlay)
       ============================== */

    .sheet-dim{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.12);
      opacity:0;
      pointer-events:none;
      transition:opacity .14s ease;
    }
    .sheet-dim.on{
      opacity:1;
      pointer-events:auto;
    }

    .tasks-sheet{
      position:absolute;
      left:18px;
      right:18px;
      bottom:34px; /* ✅ footer 위로 살짝 띄움 */
      background:#fff;
      border:3px solid #1d1d1d;
      border-radius:24px;
      box-shadow:8px 10px 0 var(--shadow);

      /* ✅ 크기: 작게 + 내부 스크롤 */
      max-height:240px;
      height:240px;

      transform:translateY(120%);
      opacity:0;
      pointer-events:none;
      transition:transform .18s ease, opacity .18s ease;
      overflow:hidden;
    }

    .tasks-sheet.open{
      transform:translateY(0);
      opacity:1;
      pointer-events:auto;
    }

    .tasks-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:3px solid var(--line);
      background:#fff;
    }
    .tasks-head .t{
      font-size:14px;
      letter-spacing:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tasks-body{
      padding:12px 14px 14px;
      height: calc(240px - 54px);
      overflow:auto;
    }

    .tasklist{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .task{
      border:3px solid var(--line);
      border-radius:18px;
      padding:10px 12px;
      display:flex;
      align-items:center;
      gap:12px;
      background:#fff;
    }
    .task input[type="text"]{
      width:100%;
      border:none;
      outline:none;
      font-size:13px;
      letter-spacing:1px;
      background:transparent;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    /* responsive */
    @media (max-width: 940px){
      html, body{ overflow:auto; } /* 모바일에선 스크롤 허용 */
      .wrap{ height:auto; }
      .card{ height:auto; overflow:visible; }
      .main{ grid-template-columns:1fr; height:auto; overflow:visible; }
      .side{ order:2; }

      .tasks-sheet{
        position:relative;
        left:auto; right:auto; bottom:auto;
        transform:none;
        opacity:1;
        pointer-events:auto;
        margin-top:12px;
      }
      .sheet-dim{ display:none; }
      .foot{ position:relative; left:auto; right:auto; bottom:auto; margin-top:10px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <div class="topline">
        <div class="brand">
          <div class="dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
          </div>
          <div class="title">
            <div class="mini">YOHAN OS / DASHBOARD</div>
            <div class="big" id="monthLabel">----</div>
          </div>
        </div>

        <div class="controls">
          <button class="btn icon" id="prevBtn">◀</button>
          <button class="btn" id="todayBtn">TODAY</button>
          <button class="btn icon" id="nextBtn">▶</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="main">
        <!-- left -->
        <div class="leftcol">
          <div class="badge-row">
            <div class="picked">
              <div class="k">PICKED:</div>
              <div class="v" id="pickedLabel">NONE</div>
            </div>
            <div class="mode">MODE: YOHAN OS</div>
          </div>

          <div class="calendar">
            <div class="dow">
              <div>SUN</div><div>MON</div><div>TUE</div><div>WED</div><div>THU</div><div>FRI</div><div>SAT</div>
            </div>
            <div class="grid" id="grid"></div>
          </div>
        </div>

        <!-- right -->
        <div class="side">
          <div class="side-head">
            <div class="h">THIS WEEK ROUTINE</div>
            <div class="weekchip" id="weekChip">WEEK --</div>
          </div>

          <div class="routine">
            <div class="rbox">
              <div class="chk" id="r_workout"></div>
              <div class="rtext">
                <div class="rt">WORKOUT</div>
                <div class="rd">운동 1회 이상</div>
              </div>
            </div>

            <div class="rbox">
              <div class="chk" id="r_reading"></div>
              <div class="rtext">
                <div class="rt">READING</div>
                <div class="rd">독서 10P 이상</div>
              </div>
            </div>

            <div class="rbox">
              <div class="chk" id="r_budget"></div>
              <div class="rtext">
                <div class="rt">BUDGET</div>
                <div class="rd">가계부 기록</div>
              </div>
            </div>
          </div>

          <div class="side-actions">
            <button class="btn" id="resetRoutineBtn">RESET</button>
            <button class="btn" id="allRoutineBtn">ALL</button>
          </div>
        </div>
      </div>

      <!-- ✅ Dim -->
      <div class="sheet-dim" id="dim"></div>

      <!-- ✅ Bottom Sheet -->
      <div class="tasks-sheet" id="tasksPanel">
        <div class="tasks-head">
          <div class="t" id="tasksTitle">TODAY TASKS</div>
          <button class="btn" id="closeTasksBtn">CLOSE</button>
        </div>

        <div class="tasks-body">
          <div class="tasklist">
            <div class="task">
              <div class="chk" data-taskcheck="0"></div>
              <input type="text" id="task1" placeholder="TASK 1 (클릭해서 입력)" />
            </div>
            <div class="task">
              <div class="chk" data-taskcheck="1"></div>
              <input type="text" id="task2" placeholder="TASK 2" />
            </div>
            <div class="task">
              <div class="chk" data-taskcheck="2"></div>
              <input type="text" id="task3" placeholder="TASK 3" />
            </div>
          </div>
        </div>
      </div>

      <div class="foot">
        <div class="left">NOTION EMBED SAFE</div>
        <div class="right">v2.3</div>
      </div>

    </div>
  </div>

  <script>
    (function(){
      const $ = (id) => document.getElementById(id);

      const monthLabel = $("monthLabel");
      const pickedLabel = $("pickedLabel");
      const grid = $("grid");

      const prevBtn = $("prevBtn");
      const nextBtn = $("nextBtn");
      const todayBtn = $("todayBtn");

      const tasksPanel = $("tasksPanel");
      const tasksTitle = $("tasksTitle");
      const closeTasksBtn = $("closeTasksBtn");
      const dim = $("dim");

      const taskInputs = [ $("task1"), $("task2"), $("task3") ];

      const rWorkout = $("r_workout");
      const rReading = $("r_reading");
      const rBudget = $("r_budget");
      const resetRoutineBtn = $("resetRoutineBtn");
      const allRoutineBtn = $("allRoutineBtn");
      const weekChip = $("weekChip");

      const KEY = "yohan_os_calendar_v23";

      const months = [
        "JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
        "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"
      ];

      const pad2 = (n) => String(n).padStart(2,"0");
      const fmt = (d) => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;

      function getWeekNumber(date){
        const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
        const dayNum = d.getUTCDay() || 7;
        d.setUTCDate(d.getUTCDate() + 4 - dayNum);
        const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
        return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      }

      function load(){
        try{ return JSON.parse(localStorage.getItem(KEY)) || null; }
        catch(e){ return null; }
      }

      function save(){
        localStorage.setItem(KEY, JSON.stringify(state));
      }

      const now = new Date();
      let state = load() || {
        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),
        picked: null,
        tasks: {},
        routine: { workout:false, reading:false, budget:false }
      };

      function setRoutineUI(){
        rWorkout.classList.toggle("on", !!state.routine.workout);
        rReading.classList.toggle("on", !!state.routine.reading);
        rBudget.classList.toggle("on", !!state.routine.budget);
      }

      function setWeekChip(){
        const ref = state.picked ? new Date(state.picked) : new Date(state.viewYear, state.viewMonth, 1);
        const w = getWeekNumber(ref);
        weekChip.textContent = `WEEK ${pad2(w)}`;
      }

      function render(){
        monthLabel.textContent = `${state.viewYear} ${months[state.viewMonth]}`;
        pickedLabel.textContent = state.picked ? state.picked : "NONE";
        setWeekChip();

        const first = new Date(state.viewYear, state.viewMonth, 1);
        const firstDay = first.getDay();
        const lastDate = new Date(state.viewYear, state.viewMonth+1, 0).getDate();

        const todayStr = fmt(new Date());
        grid.innerHTML = "";

        for(let i=0;i<firstDay;i++){
          const e = document.createElement("div");
          e.className = "cell empty";
          grid.appendChild(e);
        }

        for(let d=1; d<=lastDate; d++){
          const dateObj = new Date(state.viewYear, state.viewMonth, d);
          const dateStr = fmt(dateObj);

          const cell = document.createElement("div");
          cell.className = "cell";
          cell.textContent = d;

          const dow = dateObj.getDay();
          if(dow === 0) cell.classList.add("sun");
          if(dow === 6) cell.classList.add("sat");
          if(dow === 0 || dow === 6) cell.classList.add("weekend");

          if(dateStr === todayStr) cell.classList.add("today");
          if(state.picked === dateStr) cell.classList.add("selected");

          cell.addEventListener("click", ()=>{
            state.picked = dateStr;
            pickedLabel.textContent = dateStr;

            openTasks(dateStr);
            save();
            render();
          });

          grid.appendChild(cell);
        }
      }

      function ensureTask(dateStr){
        if(!state.tasks[dateStr]){
          state.tasks[dateStr] = { text:["","",""], done:[false,false,false] };
        }
        return state.tasks[dateStr];
      }

      function openTasks(dateStr){
        const t = ensureTask(dateStr);

        tasksTitle.textContent = `TODAY TASKS / ${dateStr}`;
        tasksPanel.classList.add("open");
        dim.classList.add("on");

        for(let i=0;i<3;i++){
          taskInputs[i].value = t.text[i] || "";
          const chk = tasksPanel.querySelector(`.chk[data-taskcheck="${i}"]`);
          chk.classList.toggle("on", !!t.done[i]);
        }
      }

      function closeTasks(){
        tasksPanel.classList.remove("open");
        dim.classList.remove("on");
      }

      // month controls
      prevBtn.addEventListener("click", ()=>{
        state.viewMonth--;
        if(state.viewMonth < 0){ state.viewMonth = 11; state.viewYear--; }
        save(); render();
      });

      nextBtn.addEventListener("click", ()=>{
        state.viewMonth++;
        if(state.viewMonth > 11){ state.viewMonth = 0; state.viewYear++; }
        save(); render();
      });

      todayBtn.addEventListener("click", ()=>{
        const t = new Date();
        state.viewYear = t.getFullYear();
        state.viewMonth = t.getMonth();
        state.picked = fmt(t);
        save();
        render();
        openTasks(state.picked);
      });

      closeTasksBtn.addEventListener("click", closeTasks);
      dim.addEventListener("click", closeTasks);

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape") closeTasks();
      });

      // task save
      taskInputs.forEach((inp, idx)=>{
        inp.addEventListener("input", ()=>{
          if(!state.picked) return;
          const t = ensureTask(state.picked);
          t.text[idx] = inp.value;
          save();
        });
      });

      // task checkbox
      tasksPanel.addEventListener("click", (e)=>{
        const chk = e.target.closest(".chk");
        if(!chk) return;

        const i = chk.getAttribute("data-taskcheck");
        if(i === null) return;
        if(!state.picked) return;

        const t = ensureTask(state.picked);
        const n = Number(i);

        t.done[n] = !t.done[n];
        chk.classList.toggle("on", t.done[n]);
        save();
      });

      // routine toggles
      rWorkout.addEventListener("click", ()=>{ state.routine.workout = !state.routine.workout; setRoutineUI(); save(); });
      rReading.addEventListener("click", ()=>{ state.routine.reading = !state.routine.reading; setRoutineUI(); save(); });
      rBudget.addEventListener("click", ()=>{ state.routine.budget = !state.routine.budget; setRoutineUI(); save(); });

      resetRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=false;
        state.routine.reading=false;
        state.routine.budget=false;
        setRoutineUI(); save();
      });

      allRoutineBtn.addEventListener("click", ()=>{
        state.routine.workout=true;
        state.routine.reading=true;
        state.routine.budget=true;
        setRoutineUI(); save();
      });

      // init
      setRoutineUI();
      render();

    })();
  </script>
</body>
</html>
