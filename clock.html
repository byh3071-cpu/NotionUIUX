<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock (Linked)</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;

      --w: 360px;
      --h: 110px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0; padding:0;
      background:transparent;
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    }

    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .top{
      height:36px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:8px;
    }

    .title{
      font-size:9px;
      color:var(--muted);
      letter-spacing:0.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chipRow{ display:flex; gap:6px; align-items:center; }

    .chip{
      height:24px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }
    .chip:hover{ border-color:var(--accent); }
    .chip.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.12);
      color:var(--accent);
    }

    .main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 10px;
      gap:10px;
    }

    .leftBox{
      flex:1;
      border:2px solid var(--line);
      background:#0b0c10;
      padding:8px 10px;
      min-width:0;
    }

    .dateRow{
      font-size:9px;
      color:var(--muted);
      line-height:1.3;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .timeRow{
      margin-top:6px;
      display:flex;
      align-items:baseline;
      gap:8px;
      white-space:nowrap;
      overflow:hidden;
    }

    .time{
      font-size:16px;
      color:var(--text);
      letter-spacing:1px;
    }

    /* ✅ 초 대신 픽셀 커서 */
    .cursor{
      font-size:14px;
      color:var(--accent);
      line-height:1;
      transform: translateY(-1px);
      opacity:1;
      user-select:none;
      pointer-events:none;
    }

    .note{
      font-size:8px;
      color:rgba(233,238,247,.75);
      margin-top:2px;
      line-height:1.35;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .rightBox{
      width:86px;
      height:100%;
      border:2px solid var(--line);
      background:#0b0c10;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      padding:8px;
    }

    .meterLabel{
      font-size:8px;
      color:var(--muted);
      opacity:.95;
    }

    .meter{
      height:10px;
      border:2px solid var(--line2);
      background:#0e1016;
      position:relative;
      overflow:hidden;
    }
    .bar{
      position:absolute;
      left:0; top:0; bottom:0;
      width:50%;
      background:var(--accent);
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="top">
      <div class="title" id="titleText">PIXEL CLOCK</div>
      <div class="chipRow">
        <div class="chip on" id="modeBtn" title="12/24 토글">24H</div>
      </div>
    </div>

    <div class="main">
      <div class="leftBox">
        <div class="dateRow" id="dateText">0000-00-00 (월) · TODAY 0/0</div>
        <div class="timeRow">
          <div class="time" id="timeText">00:00</div>
          <div class="cursor" id="cursor">■</div>
        </div>
        <div class="note" id="noteText">오늘 할 일: 0 / 0</div>
      </div>

      <div class="rightBox">
        <div class="meterLabel">DAY</div>
        <div class="meter"><div class="bar" id="dayBar"></div></div>

        <div class="meterLabel">TODAY TASK</div>
        <div class="meter"><div class="bar" id="taskBar"></div></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    const titleText = $("#titleText");
    const dateText  = $("#dateText");
    const timeText  = $("#timeText");
    const cursorEl  = $("#cursor");
    const noteText  = $("#noteText");

    const dayBar  = $("#dayBar");
    const taskBar = $("#taskBar");

    const modeBtn = $("#modeBtn");

    const state = {
      is24h: true,
      cursorOn: true
    };

    const DOW_KR = ["일","월","화","수","목","금","토"];

    // ✅ 캘린더가 쓰는 저장키(기본) + 혹시 바뀌었을 때 탐색용 후보
    const STORE_KEYS = [
      "pixel_calendar_tasks_v5_backup_hideDone",      // 너 최신 캘린더 코드
      "pixel_calendar_tasks_v4_bottomTriangles",
      "pixel_calendar_tasks_v3_bottomBadges",
      "pixel_calendar_tasks_v2_heart_preview",
    ];

    function pad2(n){ return String(n).padStart(2,"0"); }

    function toISO(d){
      return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
    }

    function formatDate(d, done, total){
      const y = d.getFullYear();
      const mo = d.getMonth() + 1;
      const da = d.getDate();
      const dow = DOW_KR[d.getDay()];
      return `${y}-${pad2(mo)}-${pad2(da)} (${dow}) · TODAY ${done}/${total}`;
    }

    function formatTime(d){
      let h = d.getHours();
      const m = d.getMinutes();

      if(!state.is24h){
        const ampm = h < 12 ? "AM" : "PM";
        h = h % 12;
        if(h === 0) h = 12;
        return `${pad2(h)}:${pad2(m)} ${ampm}`;
      }
      return `${pad2(h)}:${pad2(m)}`;
    }

    function safeParse(json){
      try{ return JSON.parse(json); }catch(e){ return null; }
    }

    function normalizeList(list){
      if(!Array.isArray(list)) return [];
      return list.map(x => {
        if(typeof x === "string") return { text:x, done:false };
        if(x && typeof x === "object"){
          return { text: String(x.text ?? ""), done: Boolean(x.done) };
        }
        return { text:"", done:false };
      }).filter(t => t.text.trim().length > 0);
    }

    function loadAllFromAnyKey(){
      // 1) 후보 키들 중 먼저 발견되는 걸 사용
      for(const k of STORE_KEYS){
        const raw = localStorage.getItem(k);
        if(!raw) continue;
        const parsed = safeParse(raw);
        if(parsed && typeof parsed === "object" && !Array.isArray(parsed)){
          return { key: k, data: parsed };
        }
      }
      // 2) 못 찾으면 null
      return { key: null, data: {} };
    }

    function getTodayProgress(iso){
      const { key, data } = loadAllFromAnyKey();

      // key가 없으면 안내만(노션 임베드 환경에 따라 localStorage 공유 안될 수 있음)
      if(!key){
        return { done: 0, total: 0, ok: false, msg: "캘린더 데이터 없음" };
      }

      const list = normalizeList(data[iso]);
      const total = list.length;
      const done = list.filter(t => t.done).length;
      return { done, total, ok: true, msg: key };
    }

    function calcDayProgress(d){
      const total = 24*60*60;
      const now = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      return Math.max(0, Math.min(1, now/total));
    }

    function tick(){
      const d = new Date();
      const iso = toISO(d);

      // ✅ 오늘 TASK 진행률(캘린더 연동)
      const prog = getTodayProgress(iso);
      const done = prog.done;
      const total = prog.total;

      dateText.textContent = formatDate(d, done, total);
      timeText.textContent = formatTime(d);

      // ✅ 픽셀 커서 깜빡임 (초 기반)
      const even = d.getSeconds() % 2 === 0;
      cursorEl.style.opacity = even ? "1" : "0.15";

      // ✅ 진행바: 하루 / 오늘 할 일
      dayBar.style.width = `${Math.round(calcDayProgress(d)*100)}%`;
      const taskRatio = total === 0 ? 0 : (done / total);
      taskBar.style.width = `${Math.round(taskRatio*100)}%`;

      // ✅ 하단 문구
      if(total === 0){
        noteText.textContent = "오늘 할 일: 0 / 0";
      }else{
        noteText.textContent = `오늘 할 일: ${done} / ${total}`;
      }

      // (선택) 디버그성 제목: 어떤 키를 읽는지 보고 싶으면 잠깐 켜도 됨
      // titleText.textContent = prog.ok ? `PIXEL CLOCK · LINKED` : `PIXEL CLOCK · NO LINK`;
    }

    // 12/24 토글
    modeBtn.addEventListener("click", () => {
      state.is24h = !state.is24h;
      modeBtn.textContent = state.is24h ? "24H" : "12H";
      modeBtn.classList.toggle("on", state.is24h);
      tick();
    });

    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
