<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion Pixel Clock</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <style>
    :root{
      --panel:#111319;
      --panel2:#0f1117;
      --line:#2a2f3a;
      --line2:#3a4150;
      --text:#e9eef7;
      --muted:#a7b0c2;

      --accent:#7cc7ff;
      --today:#ffe08a;

      /* ✅ 노션 임베드 추천 사이즈 */
      --w: 360px;
      --h: 110px;
    }

    *{ box-sizing:border-box; }
    html,body{
      margin:0;
      padding:0;
      background:transparent;
      color:var(--text);
      font-family: ui-monospace, Menlo, Monaco, Consolas, "Press Start 2P", monospace;
    }

    .wrap{
      width:var(--w);
      height:var(--h);
      background:var(--panel);
      border:2px solid var(--line2);
      border-radius:0;
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .top{
      height:36px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 8px;
      border-bottom:2px solid var(--line2);
      background:linear-gradient(180deg, var(--panel2), var(--panel));
      gap:8px;
    }

    .title{
      font-size:9px;
      color:var(--muted);
      letter-spacing:0.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip{
      height:24px;
      padding:0 8px;
      border:2px solid var(--line2);
      background:#0e1016;
      color:var(--text);
      font-size:9px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
    }
    .chip:hover{ border-color:var(--accent); }
    .chip.on{
      border-color:var(--accent);
      box-shadow: inset 0 0 0 2px rgba(124,199,255,.12);
      color:var(--accent);
    }

    .main{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 10px;
      gap:10px;
    }

    .leftBox{
      flex:1;
      border:2px solid var(--line);
      background:#0b0c10;
      padding:8px 10px;
      min-width:0;
    }

    .dateRow{
      font-size:9px;
      color:var(--muted);
      line-height:1.3;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .timeRow{
      margin-top:6px;
      display:flex;
      align-items:baseline;
      gap:10px;
      white-space:nowrap;
      overflow:hidden;
    }

    .time{
      font-size:16px;
      color:var(--text);
      letter-spacing:1px;
    }

    .sec{
      font-size:10px;
      color:var(--accent);
      opacity:.95;
    }

    /* ✅ 픽셀 느낌 작은 상태바 */
    .rightBox{
      width:86px;
      height:100%;
      border:2px solid var(--line);
      background:#0b0c10;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:6px;
      padding:8px;
    }

    .meterLabel{
      font-size:8px;
      color:var(--muted);
      opacity:.95;
    }

    .meter{
      height:10px;
      border:2px solid var(--line2);
      background:#0e1016;
      position:relative;
      overflow:hidden;
    }
    .bar{
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:50%;
      background:var(--accent);
    }

    .note{
      font-size:8px;
      color:rgba(233,238,247,.75);
      margin-top:2px;
      line-height:1.35;
    }
  </style>
</head>

<body>
  <div class="wrap" id="app">
    <div class="top">
      <div class="title">PIXEL CLOCK</div>
      <div style="display:flex; gap:6px;">
        <div class="chip on" id="modeBtn" title="12/24 토글">24H</div>
        <div class="chip" id="syncBtn" title="초 단위 반짝임">SYNC</div>
      </div>
    </div>

    <div class="main">
      <div class="leftBox">
        <div class="dateRow" id="dateText">2026-01-26 (월)</div>
        <div class="timeRow">
          <div class="time" id="timeText">00:00</div>
          <div class="sec" id="secText">00</div>
        </div>
        <div class="note" id="noteText">오늘도 한 칸씩.</div>
      </div>

      <div class="rightBox">
        <div class="meterLabel">DAY PROGRESS</div>
        <div class="meter"><div class="bar" id="dayBar"></div></div>

        <div class="meterLabel">WEEK PROGRESS</div>
        <div class="meter"><div class="bar" id="weekBar"></div></div>
      </div>
    </div>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);

    const dateText = $("#dateText");
    const timeText = $("#timeText");
    const secText  = $("#secText");
    const noteText = $("#noteText");

    const dayBar = $("#dayBar");
    const weekBar = $("#weekBar");

    const modeBtn = $("#modeBtn");
    const syncBtn = $("#syncBtn");

    const state = {
      is24h: true,
      syncBlink: false,
    };

    const DOW_KR = ["일","월","화","수","목","금","토"];

    function pad2(n){ return String(n).padStart(2,"0"); }

    function formatTime(d){
      let h = d.getHours();
      const m = d.getMinutes();
      const s = d.getSeconds();

      if(!state.is24h){
        const ampm = h < 12 ? "AM" : "PM";
        h = h % 12;
        if(h === 0) h = 12;
        return { hhmm: `${pad2(h)}:${pad2(m)} ${ampm}`, ss: pad2(s) };
      }
      return { hhmm: `${pad2(h)}:${pad2(m)}`, ss: pad2(s) };
    }

    function formatDate(d){
      const y = d.getFullYear();
      const mo = d.getMonth() + 1;
      const da = d.getDate();
      const dow = DOW_KR[d.getDay()];
      return `${y}-${pad2(mo)}-${pad2(da)} (${dow})`;
    }

    function calcDayProgress(d){
      const total = 24*60*60;
      const now = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      return Math.max(0, Math.min(1, now/total));
    }

    function calcWeekProgress(d){
      // ✅ 월요일 시작(0) 기준 진행률
      const jsDay = d.getDay(); // 0=일
      const mondayBased = (jsDay + 6) % 7; // 월=0 ... 일=6
      const total = 7*24*60*60;
      const daySeconds = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds();
      const now = mondayBased*24*60*60 + daySeconds;
      return Math.max(0, Math.min(1, now/total));
    }

    function tick(){
      const d = new Date();

      dateText.textContent = formatDate(d);

      const t = formatTime(d);
      timeText.textContent = t.hhmm;
      secText.textContent = t.ss;

      // ✅ 진행 바 업데이트
      dayBar.style.width = `${Math.round(calcDayProgress(d)*100)}%`;
      weekBar.style.width = `${Math.round(calcWeekProgress(d)*100)}%`;

      // ✅ 초 단위 SYNC 깜빡임(옵션)
      if(state.syncBlink){
        const even = d.getSeconds() % 2 === 0;
        secText.style.opacity = even ? "1" : "0.25";
      }else{
        secText.style.opacity = "0.95";
      }
    }

    // 버튼: 12/24 토글
    modeBtn.addEventListener("click", () => {
      state.is24h = !state.is24h;
      modeBtn.textContent = state.is24h ? "24H" : "12H";
      modeBtn.classList.toggle("on", state.is24h);
      tick();
    });

    // 버튼: SYNC(초 깜빡임)
    syncBtn.addEventListener("click", () => {
      state.syncBlink = !state.syncBlink;
      syncBtn.classList.toggle("on", state.syncBlink);
      tick();
    });

    // ✅ 1초마다 갱신
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
